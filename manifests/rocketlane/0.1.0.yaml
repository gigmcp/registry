schemaVersion: 1
name: rocketlane
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/rocketlane-mcp
  digest: sha256:1d0518a2b87ccdd6eb1be92513dad5e2b45e87c3a5a4cc763c674738c163624c
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: Rocketlane
category: productivity
icon: icons/rocketlane.svg
entitlements:
  egress:
    - api.rocketlane.com
credentials:
  - id: rocketlane_api_key
    type: api_key
    provider: rocketlane
    inject:
      header: api-key
      format: "{token}"
tools:
  - name: list_projects
    default: true
  - name: get_project_by_id
    default: true
  - name: create_project
    default: false
  - name: get_all_tasks
    default: true
  - name: create_task
    default: false
  - name: get_time_entries
    default: true
  - name: create_time_entry
    default: false
  - name: list_users
    default: true
  - name: create_comment
    default: false
