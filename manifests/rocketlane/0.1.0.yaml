schemaVersion: 1
name: rocketlane
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/rocketlane-mcp
  digest: sha256:a3ca44ba2356796b43f6a5f0552fec1282e2c61bbb07fa666203cdf2d918cc99
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.rocketlane.com
credentials:
  - id: rocketlane_api_key
    type: api_key
    provider: rocketlane
    inject:
      header: api-key
      format: "{token}"
tools:
  - name: list_projects
    default: true
  - name: get_project_by_id
    default: true
  - name: create_project
    default: false
  - name: get_all_tasks
    default: true
  - name: create_task
    default: false
  - name: get_time_entries
    default: true
  - name: create_time_entry
    default: false
  - name: list_users
    default: true
  - name: create_comment
    default: false
