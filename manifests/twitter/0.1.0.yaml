schemaVersion: 1
name: twitter
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/twitter-mcp
  digest: sha256:d726febee563e449ab98085929c7a2f7ebf147504b654b748d96d5d7453c9cf5
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.twitter.com
    - api.x.com
    - upload.twitter.com
credentials:
  - id: twitter_token
    type: oauth2
    provider: twitter
    scopes: [tweet.read, tweet.write, users.read, like.write, offline.access]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: search_recent_tweets
    default: true
  - name: get_tweet_by_id
    default: true
  - name: get_user_by_username
    default: true
  - name: get_authenticated_user
    default: true
  - name: get_user_followers
    default: true
  - name: create_tweet
    default: false
  - name: delete_tweet
    default: false
  - name: like_tweet
    default: false
  - name: retweet_post
    default: false
  - name: send_direct_message
    default: false
