schemaVersion: 1
name: zendesk
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/zendesk-mcp
  digest: sha256:6e1dc7ef72ceb6743c505eaadb4abe4b6f949511b5dd9ed076090db67adeaa35
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: Zendesk
category: support
entitlements:
  egress:
    - "*.zendesk.com"
credentials:
  - id: zendesk_token
    type: oauth2
    provider: zendesk
    vendor: zendesk
    scopes: ["read", "write", "tickets:read", "tickets:write"]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_tickets
    default: true
  - name: get_ticket
    default: true
  - name: search_tickets
    default: true
  - name: list_users
    default: true
  - name: list_organizations
    default: true
  - name: create_ticket
    default: false
  - name: update_ticket
    default: false
  - name: add_comment_to_ticket
    default: false
  - name: create_user
    default: false
  - name: create_organization
    default: false
