schemaVersion: 1
name: zendesk
version: 0.1.0
# Zendesk is a per-tenant SaaS: each account lives at <subdomain>.zendesk.com.
# The baseUrl below uses a representative subdomain that satisfies the *.zendesk.com
# egress allowlist; the runtime engine substitutes the actual tenant subdomain.
baseUrl: https://yoursubdomain.zendesk.com
tools:
  - name: list_tickets
    description: List tickets in the Zendesk account with optional pagination and sorting
    method: GET
    path: /api/v2/tickets
    params:
      - {name: sort_by, in: query, type: string, description: "Field to sort by: id, subject, deleted_at, created_at, updated_at, status, requester, requester.name, group, assignee, or assignee.name"}
      - {name: sort_order, in: query, type: string, description: "Sort direction: asc or desc (default desc)"}
      - {name: page, in: query, type: integer, description: "Page number for offset-based pagination"}
      - {name: per_page, in: query, type: integer, description: "Number of tickets per page (max 100)"}

  - name: get_ticket
    description: Retrieve a single Zendesk ticket by its ID
    method: GET
    path: /api/v2/tickets/{id}
    params:
      - {name: id, in: path, type: integer, required: true, description: "The ID of the ticket to retrieve"}

  - name: search_tickets
    description: Search Zendesk tickets and other resources using a query expression
    method: GET
    path: /api/v2/search
    params:
      - {name: query, in: query, type: string, required: true, description: "Search query expression (e.g. 'type:ticket status:open priority:high')"}
      - {name: sort_by, in: query, type: string, description: "Field to sort results by: updated_at, created_at, priority, status, or ticket_type"}
      - {name: sort_order, in: query, type: string, description: "Sort direction: asc or desc (default desc)"}
      - {name: page, in: query, type: integer, description: "Page number for pagination (max 10 pages, 100 results per page)"}

  - name: list_users
    description: List users in the Zendesk account with optional role filtering
    method: GET
    path: /api/v2/users
    params:
      - {name: role, in: query, type: string, description: "Filter by role: end-user, agent, or admin"}
      - {name: page, in: query, type: integer, description: "Page number for offset-based pagination"}
      - {name: per_page, in: query, type: integer, description: "Number of users per page (max 100)"}

  - name: list_organizations
    description: List organizations in the Zendesk account with optional pagination
    method: GET
    path: /api/v2/organizations
    params:
      - {name: page, in: query, type: integer, description: "Page number for offset-based pagination"}
      - {name: per_page, in: query, type: integer, description: "Number of organizations per page (max 100)"}

  - name: create_ticket
    description: Create a new support ticket in Zendesk
    method: POST
    path: /api/v2/tickets
    params:
      - {name: subject, in: body, type: string, required: true, description: "Subject line of the ticket"}
      - {name: comment, in: body, type: object, required: true, description: "Initial comment/description object with a 'body' field containing the ticket description text"}
      - {name: requester_id, in: body, type: integer, description: "ID of the user requesting support"}
      - {name: priority, in: body, type: string, description: "Ticket priority: urgent, high, normal, or low"}
      - {name: status, in: body, type: string, description: "Ticket status: new, open, pending, hold, solved, or closed"}
      - {name: type, in: body, type: string, description: "Ticket type: problem, incident, question, or task"}
      - {name: assignee_id, in: body, type: integer, description: "ID of the agent to assign the ticket to"}
      - {name: group_id, in: body, type: integer, description: "ID of the support group to assign the ticket to"}
      - {name: organization_id, in: body, type: integer, description: "ID of the organization to associate with the ticket"}
      - {name: tags, in: body, type: array, description: "Array of tag strings to attach to the ticket"}

  - name: update_ticket
    description: Update fields of an existing Zendesk ticket by ID
    method: PUT
    path: /api/v2/tickets/{id}
    params:
      - {name: id, in: path, type: integer, required: true, description: "ID of the ticket to update"}
      - {name: subject, in: body, type: string, description: "Updated subject line"}
      - {name: status, in: body, type: string, description: "Updated ticket status: new, open, pending, hold, solved, or closed"}
      - {name: priority, in: body, type: string, description: "Updated ticket priority: urgent, high, normal, or low"}
      - {name: type, in: body, type: string, description: "Updated ticket type: problem, incident, question, or task"}
      - {name: assignee_id, in: body, type: integer, description: "ID of the agent to assign the ticket to"}
      - {name: group_id, in: body, type: integer, description: "ID of the support group to assign the ticket to"}
      - {name: tags, in: body, type: array, description: "Array of tag strings to attach to the ticket"}

  - name: add_comment_to_ticket
    description: Add a public reply or internal note comment to an existing Zendesk ticket
    method: PUT
    path: /api/v2/tickets/{id}
    params:
      - {name: id, in: path, type: integer, required: true, description: "ID of the ticket to comment on"}
      - {name: comment, in: body, type: object, required: true, description: "Comment object with a 'body' field (plain text) and optional 'public' boolean (true=public reply, false=internal note)"}

  - name: create_user
    description: Create a new user in the Zendesk account
    method: POST
    path: /api/v2/users
    params:
      - {name: name, in: body, type: string, required: true, description: "Full name of the user"}
      - {name: email, in: body, type: string, description: "Primary email address of the user"}
      - {name: role, in: body, type: string, description: "User role: end-user, agent, or admin (default end-user)"}
      - {name: organization_id, in: body, type: integer, description: "ID of the organization to associate the user with"}
      - {name: phone, in: body, type: string, description: "Primary phone number of the user"}

  - name: create_organization
    description: Create a new organization in the Zendesk account
    method: POST
    path: /api/v2/organizations
    params:
      - {name: name, in: body, type: string, required: true, description: "Unique name for the organization"}
      - {name: domain_names, in: body, type: array, description: "Array of domain name strings associated with the organization"}
      - {name: group_id, in: body, type: integer, description: "ID of the default group to associate with the organization"}
      - {name: external_id, in: body, type: string, description: "External identifier for the organization"}
      - {name: tags, in: body, type: array, description: "Array of tag strings to attach to the organization"}
      - {name: notes, in: body, type: string, description: "Additional notes about the organization"}
