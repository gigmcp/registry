schemaVersion: 1
name: firecrawl
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/firecrawl-mcp
  digest: sha256:981fb81481fc1161031c2e8bcfab3ba9668e465b583e795451f93563178f3ab3
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: Firecrawl
category: search
icon: icons/firecrawl.svg
entitlements:
  egress:
    - api.firecrawl.dev
credentials:
  - id: firecrawl_api_key
    type: api_key
    provider: firecrawl
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: scrape
    default: true
  - name: batch_scrape
    default: true
  - name: crawl
    default: true
  - name: get_crawl_status
    default: true
  - name: cancel_crawl
    default: false
  - name: map_urls
    default: true
  - name: search
    default: true
  - name: extract
    default: true
  - name: get_credit_usage
    default: true
