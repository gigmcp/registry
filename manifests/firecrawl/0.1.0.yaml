schemaVersion: 1
name: firecrawl
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/firecrawl-mcp
  digest: sha256:35f923bd8205fdcef11c18e6555ef0de7e78df9d1e759ad3373e40d48f86844f
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.firecrawl.dev
credentials:
  - id: firecrawl_api_key
    type: api_key
    provider: firecrawl
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: scrape
    default: true
  - name: batch_scrape
    default: true
  - name: crawl
    default: true
  - name: get_crawl_status
    default: true
  - name: cancel_crawl
    default: false
  - name: map_urls
    default: true
  - name: search
    default: true
  - name: extract
    default: true
  - name: get_credit_usage
    default: true
