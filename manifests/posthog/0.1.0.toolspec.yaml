schemaVersion: 1
name: posthog
version: 0.1.0
baseUrl: https://us.posthog.com
tools:
  - name: list_projects
    description: List all projects in an organization
    method: GET
    path: /api/organizations/{organization_id}/projects/
    params:
      - {name: organization_id, in: path, type: string, required: true, description: The organization ID}
      - {name: limit, in: query, type: integer, description: Number of results to return}
      - {name: offset, in: query, type: integer, description: Pagination offset}
      - {name: search, in: query, type: string, description: Filter projects by name}

  - name: list_insights
    description: List all insights in a project
    method: GET
    path: /api/environments/{project_id}/insights/
    params:
      - {name: project_id, in: path, type: integer, required: true, description: The project (environment) ID}
      - {name: limit, in: query, type: integer, description: Number of results to return}
      - {name: offset, in: query, type: integer, description: Pagination offset}
      - {name: search, in: query, type: string, description: Filter by name}
      - {name: insight, in: query, type: string, description: "Filter by insight type (TRENDS, FUNNELS, RETENTION, etc.)"}
      - {name: saved, in: query, type: boolean, description: Show only saved insights}
      - {name: favorited, in: query, type: boolean, description: Show only favorited insights}

  - name: get_insight
    description: Retrieve a single insight by ID
    method: GET
    path: /api/environments/{project_id}/insights/{id}/
    params:
      - {name: project_id, in: path, type: integer, required: true, description: The project (environment) ID}
      - {name: id, in: path, type: integer, required: true, description: The insight ID}

  - name: list_dashboards
    description: List all dashboards in a project
    method: GET
    path: /api/environments/{project_id}/dashboards/
    params:
      - {name: project_id, in: path, type: integer, required: true, description: The project (environment) ID}
      - {name: limit, in: query, type: integer, description: Number of results to return}
      - {name: offset, in: query, type: integer, description: Pagination offset}
      - {name: search, in: query, type: string, description: Filter dashboards by name}

  - name: list_feature_flags
    description: List all feature flags in a project
    method: GET
    path: /api/projects/{project_id}/feature_flags/
    params:
      - {name: project_id, in: path, type: integer, required: true, description: The project ID}
      - {name: limit, in: query, type: integer, description: Number of results to return}
      - {name: offset, in: query, type: integer, description: Pagination offset}
      - {name: search, in: query, type: string, description: Filter by name or key}
      - {name: active, in: query, type: boolean, description: Filter by active status}

  - name: create_feature_flag
    description: Create a new feature flag in a project
    method: POST
    path: /api/projects/{project_id}/feature_flags/
    params:
      - {name: project_id, in: path, type: integer, required: true, description: The project ID}
      - {name: key, in: body, type: string, required: true, description: Unique key for the feature flag}
      - {name: name, in: body, type: string, description: Display name for the feature flag}
      - {name: active, in: body, type: boolean, description: Whether the feature flag is active}
      - {name: filters, in: body, type: object, description: Rollout conditions and targeting rules}
      - {name: tags, in: body, type: array, description: Tags to categorize the feature flag}

  - name: update_feature_flag
    description: Update an existing feature flag
    method: PATCH
    path: /api/projects/{project_id}/feature_flags/{id}/
    params:
      - {name: project_id, in: path, type: integer, required: true, description: The project ID}
      - {name: id, in: path, type: integer, required: true, description: The feature flag ID}
      - {name: key, in: body, type: string, description: Unique key for the feature flag}
      - {name: name, in: body, type: string, description: Display name for the feature flag}
      - {name: active, in: body, type: boolean, description: Whether the feature flag is active}
      - {name: filters, in: body, type: object, description: Rollout conditions and targeting rules}
      - {name: tags, in: body, type: array, description: Tags to categorize the feature flag}

  - name: capture_event
    description: Capture a single analytics event
    method: POST
    baseUrl: https://us.i.posthog.com
    path: /i/v0/e/
    params:
      - {name: api_key, in: body, type: string, required: true, description: Your PostHog project token}
      - {name: distinct_id, in: body, type: string, required: true, description: Unique identifier for the user}
      - {name: event, in: body, type: string, required: true, description: Name of the event to capture}
      - {name: properties, in: body, type: object, description: Custom event properties}
      - {name: timestamp, in: body, type: string, description: ISO 8601 formatted timestamp for the event}

  - name: query_events
    description: Query events using HogQL (PostHog SQL)
    method: POST
    path: /api/projects/{project_id}/query/
    params:
      - {name: project_id, in: path, type: integer, required: true, description: The project ID}
      - {name: query, in: body, type: object, required: true, description: "Query object with kind (e.g. HogQLQuery) and query (SQL string)"}

  - name: create_annotation
    description: Create an annotation on a project timeline
    method: POST
    path: /api/projects/{project_id}/annotations/
    params:
      - {name: project_id, in: path, type: integer, required: true, description: The project ID}
      - {name: content, in: body, type: string, description: Text content of the annotation}
      - {name: date_marker, in: body, type: string, description: ISO 8601 date/time the annotation marks}
      - {name: scope, in: body, type: string, description: "Scope of the annotation (e.g. project or dashboard)"}
      - {name: dashboard_item, in: body, type: integer, description: ID of the insight this annotation belongs to}
      - {name: dashboard_id, in: body, type: integer, description: ID of the dashboard this annotation belongs to}
