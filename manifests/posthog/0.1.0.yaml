schemaVersion: 1
name: posthog
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/posthog-mcp
  digest: sha256:01e8354b5b60cc0614f4772be07234807e33ecd746a085252f4a81493c77cce0
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: PostHog
category: analytics
icon: icons/posthog.svg
entitlements:
  egress:
    - app.posthog.com
    - us.posthog.com
    - eu.posthog.com
    - us.i.posthog.com
    - eu.i.posthog.com
credentials:
  - id: posthog_api_key
    type: api_key
    provider: posthog
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_projects
    default: true
  - name: list_insights
    default: true
  - name: get_insight
    default: true
  - name: list_dashboards
    default: true
  - name: list_feature_flags
    default: true
  - name: create_feature_flag
    default: false
  - name: update_feature_flag
    default: false
  - name: capture_event
    default: false
  - name: query_events
    default: true
  - name: create_annotation
    default: false
