schemaVersion: 1
name: posthog
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/posthog-mcp
  digest: sha256:3df4fedd05d6b656ddf3834e19a0070880b0ea664187546e21566595576b1f86
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - app.posthog.com
    - us.posthog.com
    - eu.posthog.com
    - us.i.posthog.com
    - eu.i.posthog.com
credentials:
  - id: posthog_api_key
    type: api_key
    provider: posthog
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_projects
    default: true
  - name: list_insights
    default: true
  - name: get_insight
    default: true
  - name: list_dashboards
    default: true
  - name: list_feature_flags
    default: true
  - name: create_feature_flag
    default: false
  - name: update_feature_flag
    default: false
  - name: capture_event
    default: false
  - name: query_events
    default: true
  - name: create_annotation
    default: false
