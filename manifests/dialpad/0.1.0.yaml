schemaVersion: 1
name: dialpad
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/dialpad-mcp
  digest: sha256:3a1d1259182aefbe557e74bfa44b123fb654029de6ce172d555984efa471903f
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - dialpad.com
credentials:
  - id: dialpad_token
    type: oauth2
    provider: dialpad
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_access_control_policies
    default: true
  - name: create_contact
    default: false
  - name: delete_contact
    default: false
  - name: create_user
    default: false
  - name: create_callback_request
    default: false
  - name: add_call_participant
    default: false
  - name: create_webhook
    default: false
  - name: assign_phone_number
    default: false
