schemaVersion: 1
name: lmnt
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/lmnt-mcp
  digest: sha256:18bf2c44e6cb34b5f02cd9dabb6989608460d6285c24d8a59434660391a7dbf4
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.lmnt.com
credentials:
  - id: lmnt_api_key
    type: api_key
    provider: lmnt
    inject:
      header: X-API-Key
      format: "{token}"
tools:
  - name: get_voices_list
    default: true
  - name: get_voice_info
    default: true
  - name: get_account
    default: true
  - name: synthesize_speech
    default: false
  - name: generate_speech_with_metadata
    default: false
  - name: create_voice
    default: false
  - name: update_voice_info
    default: false
  - name: delete_voice
    default: false
