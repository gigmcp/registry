schemaVersion: 1
name: docmosis
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/docmosis-mcp
  digest: sha256:1753cc5c15f3c00e987cf8a30ba0ff95c074e7e2ce274f063c84f194cedff8a3
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - "*.dws4.docmosis.com"
    - "*.dws3.docmosis.com"
credentials:
  - id: docmosis_api_key
    type: api_key
    provider: docmosis
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_templates
    default: true
  - name: get_template_details
    default: true
  - name: get_template_structure
    default: true
  - name: get_template_sample_data
    default: true
  - name: list_images
    default: true
  - name: get_render_queue
    default: true
  - name: get_environment_summary
    default: true
  - name: delete_template
    default: false
  - name: delete_image
    default: false
  - name: ping_service
    default: true
