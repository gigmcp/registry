schemaVersion: 1
name: zenserp
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/zenserp-mcp
  digest: sha256:c13b660075e3d4be1e46b444d30a94b529ea201bccd4877cefe62ad14af1f94b
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - app.zenserp.com
credentials:
  - id: zenserp_api_key
    type: api_key
    provider: zenserp
    inject:
      header: apikey
      format: "{token}"
tools:
  - name: google_search
    default: true
  - name: bing_search
    default: true
  - name: yandex_search
    default: true
  - name: google_trends
    default: true
  - name: google_reverse_image_search
    default: true
  - name: get_shopping_product_details
    default: true
  - name: get_api_status
    default: true
  - name: list_locations
    default: true
  - name: list_search_engines
    default: true
