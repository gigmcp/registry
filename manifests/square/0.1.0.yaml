schemaVersion: 1
name: square
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/square-mcp
  digest: sha256:0fa06213d7ebc40b75e715be1ccc266d87fc14e11d4aa0c4d3a51e9d3f603265
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - connect.squareup.com
credentials:
  - id: square_token
    type: oauth2
    provider: square
    vendor: square
    scopes: [CUSTOMERS_READ, CUSTOMERS_WRITE, ORDERS_READ, PAYMENTS_READ, INVOICES_READ]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: search_customers
    default: true
  - name: retrieve_order
    default: true
  - name: search_orders
    default: true
  - name: list_invoices
    default: true
  - name: list_locations
    default: true
  - name: get_merchant
    default: true
  - name: list_disputes
    default: true
  - name: create_customer
    default: false
  - name: update_customer
    default: false
  - name: cancel_payment
    default: false
