schemaVersion: 1
name: demio
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/demio-mcp
  digest: sha256:e107fab1ae423c3f23839a639f6e72c2848bc925ae91380fdec37629052420bb
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: Demio
category: marketing
icon: icons/demio.svg
entitlements:
  egress:
    # Demio webinar platform REST API
    - my.demio.com
credentials:
  - id: demio_api_key
    type: api_key
    provider: demio
    inject:
      header: Api-Key
      format: "{token}"
tools:
  - name: ping
    default: true
  - name: list_events
    default: true
  - name: get_event
    default: true
  - name: list_event_dates
    default: true
  - name: list_event_date_participants
    default: true
  - name: create_join_link
    default: false
