schemaVersion: 1
name: googlesheets
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/googlesheets-mcp
  digest: sha256:00fed3f0c0f95c0f5bc3b149a198f0d91934f9f18676f6df8fd994c5af67f8df
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: Google Sheets
category: productivity
entitlements:
  egress:
    - sheets.googleapis.com
credentials:
  - id: googlesheets_token
    type: oauth2
    provider: googlesheets
    vendor: google
    scopes:
      [
        https://www.googleapis.com/auth/spreadsheets,
        https://www.googleapis.com/auth/spreadsheets.readonly,
        https://www.googleapis.com/auth/drive.file,
      ]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_spreadsheet_info
    default: true
  - name: get_sheet_names
    default: true
  - name: batch_get_spreadsheet_values
    default: true
  - name: lookup_spreadsheet_row
    default: true
  - name: create_google_sheet
    default: false
  - name: append_values_to_spreadsheet
    default: false
  - name: update_values_single_range
    default: false
  - name: clear_spreadsheet_values
    default: false
  - name: delete_sheet
    default: false
