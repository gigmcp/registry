schemaVersion: 1
name: blackbaud
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/blackbaud-mcp
  digest: sha256:f815c1875acfbe6e3f126fb2b5b425525d9cbcb9fd438ef32dbaecee9bcb955d
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.sky.blackbaud.com
    - oauth2.sky.blackbaud.com
credentials:
  - id: blackbaud_token
    type: oauth2
    provider: blackbaud
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_gift_by_id
    default: true
  - name: add_gifts_to_batch
    default: false
  - name: get_membership_details
    default: true
  - name: get_payment_transaction
    default: true
  - name: query_oneroster_api
    default: true
