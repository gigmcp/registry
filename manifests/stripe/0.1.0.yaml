schemaVersion: 1
name: stripe
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/stripe-mcp
  digest: sha256:32dce28f2b95bdc0592cde44b6fed12d5f79ba5964451d1a71a6d5a73cc2a4e0
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.stripe.com
credentials:
  - id: stripe_api_key
    type: api_key
    provider: stripe
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_customers
    default: true
  - name: get_customer
    default: true
  - name: create_customer
    default: false
  - name: list_payment_intents
    default: true
  - name: create_payment_intent
    default: false
  - name: list_invoices
    default: true
  - name: create_invoice
    default: false
  - name: create_refund
    default: false
  - name: list_subscriptions
    default: true
  - name: cancel_subscription
    default: false
