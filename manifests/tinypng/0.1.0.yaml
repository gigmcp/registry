schemaVersion: 1
name: tinypng
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/tinypng-mcp
  digest: sha256:c9bbf454788d2dcf384cb49d2c30a5674b0053747b31e4aeaa4debbe10247f60
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: TinyPNG
category: design
icon: icons/tinypng.svg
entitlements:
  egress:
    # Tinify (TinyPNG) image compression API.
    - api.tinify.com
credentials:
  - id: tinypng_api_key
    # Tinify uses HTTP Basic auth: user "api", password = API key;
    # {token} is the base64("api:<key>") credential.
    type: basic
    provider: tinypng
    inject:
      header: Authorization
      format: "Basic {token}"
tools:
  - name: get_compression_count
    default: true
  - name: download_compressed_image
    default: true
  - name: shrink_image
    default: false
  - name: transform_image
    default: false
  - name: compress_and_store_in_azure
    default: false
