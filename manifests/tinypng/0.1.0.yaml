schemaVersion: 1
name: tinypng
version: 0.1.0
source:
  repo: github.com/gigmcp/tinypng-mcp
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/tinypng-mcp
  # PLACEHOLDER until build-images CI emits the real digest — see README.
  digest: sha256:2c249430cdd2176b880e30e31ff5e85460ec6641856b1e927eeefeac7e9d6eeb
  entrypoint: /app/server
tier: sealed
entitlements:
  egress:
    # Tinify (TinyPNG) image compression API.
    - api.tinify.com
credentials:
  - id: tinypng_api_key
    # Tinify uses HTTP Basic auth: user "api", password = API key;
    # {token} is the base64("api:<key>") credential.
    type: basic
    provider: tinypng
    inject:
      header: Authorization
      format: "Basic {token}"
tools:
  - name: get_compression_count
    default: true
  - name: download_compressed_image
    default: true
  - name: shrink_image
    default: false
  - name: transform_image
    default: false
  - name: compress_and_store_in_azure
    default: false
