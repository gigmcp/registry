schemaVersion: 1
name: contentful
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/contentful-mcp
  digest: sha256:e0354c7633e43b7e373d2877bd1b1104ce6cce537060fb77e7886da2e47d5ddd
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.contentful.com
credentials:
  - id: contentful_token
    type: oauth2
    provider: contentful
    scopes: [content_management_read, content_management_manage]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_spaces
    default: true
  - name: get_space
    default: true
  - name: get_content_types
    default: true
  - name: list_entries
    default: true
  - name: create_entry
    default: false
  - name: publish_entry
    default: false
  - name: archive_entry
    default: false
  - name: delete_asset
    default: false
  - name: create_environment
    default: false
