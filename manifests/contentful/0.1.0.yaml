schemaVersion: 1
name: contentful
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/contentful-mcp
  digest: sha256:8e5fc9cad4b4c7c31c75a0e19b7f5f3d2d755852549ccfdae97691ce53fec891
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: Contentful
category: dev-tools
icon: icons/contentful.svg
entitlements:
  egress:
    - api.contentful.com
credentials:
  - id: contentful_token
    type: oauth2
    provider: contentful
    vendor: contentful
    scopes: [content_management_read, content_management_manage]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_spaces
    default: true
  - name: get_space
    default: true
  - name: get_content_types
    default: true
  - name: list_entries
    default: true
  - name: create_entry
    default: false
  - name: publish_entry
    default: false
  - name: archive_entry
    default: false
  - name: delete_asset
    default: false
  - name: create_environment
    default: false
