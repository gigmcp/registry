schemaVersion: 1
name: slack
version: 0.1.0
source:
  repo: github.com/korotovsky/slack-mcp-server
  tag: v1.3.0
  package: cmd/slack-mcp-server
image:
  ref: ghcr.io/gigmcp/slack-mcp
  digest: sha256:1a91a1fe92353b7d7d1997e8c1c1b11201cc1f697133e7fc4a7293fe3f740c8c
  entrypoint: /app/server
tier: sealed
entitlements:
  egress:
    - slack.com
    - edgeapi.slack.com
credentials:
  - id: slack_token
    type: oauth2
    provider: slack
    scopes: ["chat:write", "channels:read", "channels:history", "users:read"]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: channels_list
    default: true
  - name: conversations_history
    default: true
  - name: conversations_replies
    default: true
  - name: conversations_search_messages
    default: true
  - name: conversations_unreads
    default: true
  - name: users_search
    default: true
  - name: usergroups_list
    default: true
  - name: saved_list
    default: true
  - name: conversations_add_message
    default: false
  - name: conversations_mark
    default: false
  - name: reactions_add
    default: false
  - name: reactions_remove
    default: false
  - name: usergroups_create
    default: false
  - name: usergroups_update
    default: false
  - name: usergroups_users_update
    default: false
  - name: usergroups_me
    default: false
  - name: saved_update
    default: false
  - name: saved_clear_completed
    default: false
