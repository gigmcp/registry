schemaVersion: 1
name: google-maps
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/google-maps-mcp
  digest: sha256:341771fa42e85b369d06d8d2777675b75d116c9f25444a77c2381ec9f61a05b6
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - geocode.googleapis.com
    - places.googleapis.com
    - routes.googleapis.com
credentials:
  - id: google_maps_api_key
    type: api_key
    provider: google-maps
    inject:
      header: X-Goog-Api-Key
      format: "{token}"
tools:
  - name: text_search
    default: true
  - name: nearby_search
    default: true
  - name: get_place_details
    default: true
  - name: autocomplete
    default: true
  - name: geocode_address
    default: true
  - name: geocode_location
    default: true
  - name: get_direction
    default: true
  - name: compute_route_matrix
    default: true
