schemaVersion: 1
name: google-maps
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/google-maps-mcp
  digest: sha256:d847e4fff5942262deefeb296ad2fabf47e84ca7b909cc4523d493c8d4a9c3bb
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: Google Maps
category: data
entitlements:
  egress:
    - geocode.googleapis.com
    - places.googleapis.com
    - routes.googleapis.com
credentials:
  - id: google_maps_api_key
    type: api_key
    provider: google-maps
    inject:
      header: X-Goog-Api-Key
      format: "{token}"
tools:
  - name: text_search
    default: true
  - name: nearby_search
    default: true
  - name: get_place_details
    default: true
  - name: autocomplete
    default: true
  - name: geocode_address
    default: true
  - name: geocode_location
    default: true
  - name: get_direction
    default: true
  - name: compute_route_matrix
    default: true
