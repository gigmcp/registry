schemaVersion: 1
name: asana
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/asana-mcp
  digest: sha256:085d409916397fb07b953a8fa378fa4cab814c7097cba0d1c473f5191d2f326a
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - app.asana.com
credentials:
  - id: asana_token
    type: oauth2
    provider: asana
    scopes: [tasks:read, tasks:write, projects:read, projects:write, users:read]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_workspaces
    default: true
  - name: get_multiple_projects
    default: true
  - name: get_multiple_tasks
    default: true
  - name: get_task
    default: true
  - name: get_current_user
    default: true
  - name: create_task
    default: false
  - name: create_subtask
    default: false
  - name: create_project
    default: false
  - name: create_task_comment
    default: false
  - name: delete_task
    default: false
