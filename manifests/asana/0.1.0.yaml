schemaVersion: 1
name: asana
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/asana-mcp
  digest: sha256:42032ab3fd2daf593be8ff368a9c91b42a60dee56924d6ddd9165943c7df19e8
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: Asana
category: productivity
icon: icons/asana.svg
entitlements:
  egress:
    - app.asana.com
credentials:
  - id: asana_token
    type: oauth2
    provider: asana
    vendor: asana
    scopes: [tasks:read, tasks:write, projects:read, projects:write, users:read]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_workspaces
    default: true
  - name: get_multiple_projects
    default: true
  - name: get_multiple_tasks
    default: true
  - name: get_task
    default: true
  - name: get_current_user
    default: true
  - name: create_task
    default: false
  - name: create_subtask
    default: false
  - name: create_project
    default: false
  - name: create_task_comment
    default: false
  - name: delete_task
    default: false
