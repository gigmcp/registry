schemaVersion: 1
name: beeminder
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/beeminder-mcp
  digest: sha256:ce9f826da1e81475f549f9ea26c2f187a74ee4108202bdcc820905f5dcd4fcf9
  entrypoint: /app/server
  builder: toolpack
# Beeminder's API accepts auth only via the auth_token/access_token query
# parameter — header injection cannot work, so this is entrusted (env-only).
tier: entrusted
entitlements:
  egress:
    - www.beeminder.com
credentials:
  - id: beeminder_api_key
    type: api_key
    provider: beeminder
    inject:
      env: BEEMINDER_API_KEY
tools:
  - name: get_user_information
    default: true
  - name: get_all_goals
    default: true
  - name: get_archived_goals
    default: true
  - name: create_datapoint
    default: false
  - name: create_charge
    default: false
