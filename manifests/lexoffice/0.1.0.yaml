schemaVersion: 1
name: lexoffice
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/lexoffice-mcp
  digest: sha256:c656650dee5d71657eae288a676ac2a598b4f2dde0d2ac8a3f0d81589e0e8229
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.lexware.io
credentials:
  - id: lexoffice_api_key
    type: api_key
    provider: lexoffice
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_contacts
    default: true
  - name: get_contact
    default: true
  - name: get_invoice
    default: true
  - name: list_voucherlist
    default: true
  - name: list_articles
    default: true
  - name: get_profile
    default: true
  - name: create_contact
    default: false
  - name: create_quotation
    default: false
  - name: create_credit_note
    default: false
  - name: create_voucher
    default: false
