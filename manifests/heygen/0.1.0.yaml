schemaVersion: 1
name: heygen
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/heygen-mcp
  digest: sha256:2ccad2baa046c32f943b9da92eb80904e7f53a001a111d839da37bea0dbee17b
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.heygen.com
    - upload.heygen.com
credentials:
  - id: heygen_api_key
    type: api_key
    provider: heygen
    inject:
      header: X-Api-Key
      format: "{token}"
tools:
  - name: list_avatars
    default: true
  - name: list_voices
    default: true
  - name: list_videos
    default: true
  - name: retrieve_video_status
    default: true
  - name: retrieve_all_templates
    default: true
  - name: retrieve_user_remaining_quota
    default: true
  - name: generate_video
    default: false
  - name: generate_text_to_speech_audio
    default: false
  - name: upload_asset
    default: false
  - name: delete_video
    default: false
