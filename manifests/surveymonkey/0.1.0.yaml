schemaVersion: 1
name: surveymonkey
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/surveymonkey-mcp
  digest: sha256:4e11c466e56f732ca06b4dfff8654afd970f6e3767613d7d3f3efa935c19d82b
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.surveymonkey.com
credentials:
  - id: surveymonkey_token
    type: oauth2
    provider: surveymonkey
    scopes: [surveys_read, surveys_write, responses_read, contacts_read, contacts_write]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_surveys
    default: true
  - name: get_survey_details
    default: true
  - name: get_survey_responses
    default: true
  - name: get_survey_collectors
    default: true
  - name: get_contacts
    default: true
  - name: list_contact_lists
    default: true
  - name: create_survey
    default: false
  - name: create_contact
    default: false
  - name: create_contact_list
    default: false
  - name: delete_survey
    default: false
