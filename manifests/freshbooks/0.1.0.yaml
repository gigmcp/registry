schemaVersion: 1
name: freshbooks
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/freshbooks-mcp
  digest: sha256:748baeb691edb35060f54a5e1a2e4e1181f908eb526f7bcec8caba195ee61a29
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.freshbooks.com
    - auth.freshbooks.com
credentials:
  - id: freshbooks_token
    type: oauth2
    provider: freshbooks
    scopes:
      - user:profile:read
      - user:clients:read
      - user:projects:read
      - user:journal_entries:read
      - user:webhooks:write
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_businesses
    default: true
  - name: get_business_users
    default: true
  - name: list_clients
    default: true
  - name: list_projects
    default: true
  - name: list_journal_entries
    default: true
  - name: list_webhooks
    default: true
  - name: create_webhook
    default: false
  - name: update_webhook
    default: false
  - name: delete_webhook
    default: false
