schemaVersion: 1
name: pipedrive
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/pipedrive-mcp
  digest: sha256:41f11d9fa29caaebb4f138f73ebc5b60adfc16b83886961df1268a01a71b0312
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: Pipedrive
category: CRM
icon: icons/pipedrive.svg
entitlements:
  egress:
    - api.pipedrive.com
    - "*.pipedrive.com"
credentials:
  - id: pipedrive_token
    type: oauth2
    provider: pipedrive
    vendor: pipedrive
    scopes: [deals:read, deals:full, contacts:read, contacts:full, activities:full]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_deals
    default: true
  - name: search_deals
    default: true
  - name: get_persons
    default: true
  - name: get_organizations
    default: true
  - name: get_activities
    default: true
  - name: add_deal
    default: false
  - name: add_person
    default: false
  - name: add_activity
    default: false
  - name: add_note
    default: false
  - name: delete_deal
    default: false
