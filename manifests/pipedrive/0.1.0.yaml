schemaVersion: 1
name: pipedrive
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/pipedrive-mcp
  digest: sha256:c28f0264a7eb5908b0948244253163a3049ec066778dd319f83218b73226dd52
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.pipedrive.com
    - "*.pipedrive.com"
credentials:
  - id: pipedrive_token
    type: oauth2
    provider: pipedrive
    scopes: [deals:read, deals:full, contacts:read, contacts:full, activities:full]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_deals
    default: true
  - name: search_deals
    default: true
  - name: get_persons
    default: true
  - name: get_organizations
    default: true
  - name: get_activities
    default: true
  - name: add_deal
    default: false
  - name: add_person
    default: false
  - name: add_activity
    default: false
  - name: add_note
    default: false
  - name: delete_deal
    default: false
