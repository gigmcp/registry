schemaVersion: 1
name: linkup
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/linkup-mcp
  digest: sha256:33d02a389b7633c006132d7a551a5a8104ec07448928ce0c700ac844ca55867c
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.linkup.so
credentials:
  - id: linkup_api_key
    type: api_key
    provider: linkup
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: search
    default: true
  - name: fetch_webpage
    default: true
  - name: create_response
    default: true
  - name: get_credits_balance
    default: true
  - name: search_structured
    default: true
