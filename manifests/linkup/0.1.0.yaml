schemaVersion: 1
name: linkup
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/linkup-mcp
  digest: sha256:d395ce6afa5f9d7a3bed2e94c8606370de66a3ea73ef95566494202caa7262e9
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: Linkup
category: search
entitlements:
  egress:
    - api.linkup.so
credentials:
  - id: linkup_api_key
    type: api_key
    provider: linkup
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: search
    default: true
  - name: fetch_webpage
    default: true
  - name: create_response
    default: true
  - name: get_credits_balance
    default: true
  - name: search_structured
    default: true
