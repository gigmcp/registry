schemaVersion: 1
name: listennotes
version: 0.1.0
baseUrl: https://listen-api.listennotes.com
tools:
  - name: full_text_search
    description: Search podcasts and episodes using full-text search
    method: GET
    path: /api/v2/search
    params:
      - {name: q, in: query, type: string, required: true, description: Search term}
      - {name: type, in: query, type: string, description: "Content type to search: episode (default), podcast, or curated"}
      - {name: offset, in: query, type: integer, description: "Offset for pagination (default 0)"}
      - {name: len_min, in: query, type: integer, description: "Minimum episode length in minutes"}
      - {name: len_max, in: query, type: integer, description: "Maximum episode length in minutes"}
      - {name: genre_ids, in: query, type: string, description: "Comma-delimited list of genre IDs to filter by"}
      - {name: published_before, in: query, type: integer, description: "Filter episodes published before this Unix timestamp in milliseconds"}
      - {name: published_after, in: query, type: integer, description: "Filter episodes published after this Unix timestamp in milliseconds"}
      - {name: language, in: query, type: string, description: "Filter by language (e.g. English, Chinese)"}
      - {name: region, in: query, type: string, description: "Filter by region/country using ISO 3166-1 alpha-2 code"}
      - {name: safe_mode, in: query, type: integer, description: "Set to 1 to exclude explicit content"}
      - {name: sort_by_date, in: query, type: integer, description: "Set to 1 to sort by date (default 0, sort by relevance)"}
      - {name: page_size, in: query, type: integer, description: "Number of results per page (1-10)"}
      - {name: unique_podcasts, in: query, type: integer, description: "Set to 1 to return only one episode per podcast"}

  - name: typeahead_search
    description: Get typeahead search suggestions for podcasts and genres
    method: GET
    path: /api/v2/typeahead
    params:
      - {name: q, in: query, type: string, required: true, description: "Search term for typeahead suggestions"}
      - {name: show_podcasts, in: query, type: integer, description: "Set to 1 to include podcast suggestions in results"}
      - {name: show_genres, in: query, type: integer, description: "Set to 1 to include genre suggestions in results"}
      - {name: safe_mode, in: query, type: integer, description: "Set to 1 to exclude explicit content"}

  - name: fetch_best_podcasts_by_genre
    description: Fetch a list of best podcasts, optionally filtered by genre
    method: GET
    path: /api/v2/best_podcasts
    params:
      - {name: genre_id, in: query, type: string, description: "Genre ID to filter best podcasts by"}
      - {name: page, in: query, type: integer, description: "Page number for pagination"}
      - {name: region, in: query, type: string, description: "Filter by listener region using ISO 3166-1 alpha-2 code"}
      - {name: publisher_region, in: query, type: string, description: "Filter by publisher region using ISO 3166-1 alpha-2 code"}
      - {name: language, in: query, type: string, description: "Filter by podcast language"}
      - {name: sort, in: query, type: string, description: "Sort order: recent_added_first, oldest_added_first, recent_published_first, oldest_published_first, or listen_score"}
      - {name: safe_mode, in: query, type: integer, description: "Set to 1 to exclude explicit content"}

  - name: fetch_podcast_episodes_by_id
    description: Fetch a podcast and its episodes by podcast ID
    method: GET
    path: /api/v2/podcasts/{id}
    params:
      - {name: id, in: path, type: string, required: true, description: "Podcast ID"}
      - {name: next_episode_pub_date, in: query, type: integer, description: "Unix timestamp in milliseconds; returns episodes published before this date for pagination"}
      - {name: sort, in: query, type: string, description: "Episode sort order: recent_first (default) or oldest_first"}

  - name: fetch_episode_by_id
    description: Fetch a single podcast episode by episode ID
    method: GET
    path: /api/v2/episodes/{id}
    params:
      - {name: id, in: path, type: string, required: true, description: "Episode ID"}
      - {name: show_transcript, in: query, type: integer, description: "Set to 1 to include transcript in the response"}

  - name: fetch_curated_lists
    description: Fetch a paginated list of curated podcast collections
    method: GET
    path: /api/v2/curated_podcasts
    params:
      - {name: page, in: query, type: integer, description: "Page number for pagination"}

  - name: fetch_podcast_recommendations
    description: Fetch recommended podcasts similar to a given podcast
    method: GET
    path: /api/v2/podcasts/{id}/recommendations
    params:
      - {name: id, in: path, type: string, required: true, description: "Podcast ID to get recommendations for"}
      - {name: safe_mode, in: query, type: integer, description: "Set to 1 to exclude explicit content"}

  - name: fetch_podcast_genres
    description: Fetch the list of podcast genres supported by Listen Notes
    method: GET
    path: /api/v2/genres
    params:
      - {name: top_level_only, in: query, type: integer, description: "Set to 1 to return only top-level genres (no sub-genres)"}

  - name: submit_podcast
    description: Submit a new podcast RSS feed to be added to the Listen Notes database
    method: POST
    path: /api/v2/podcasts/submit
    encoding: form
    params:
      - {name: rss, in: body, type: string, required: true, description: "RSS feed URL of the podcast to submit"}
      - {name: email, in: body, type: string, description: "Contact email for submission status notifications"}

  - name: refresh_rss_feed
    description: Request a refresh of a podcast's RSS feed to update its episodes
    method: POST
    path: /api/v2/podcasts/{id}/rss
    params:
      - {name: id, in: path, type: string, required: true, description: "Podcast ID whose RSS feed should be refreshed"}
