schemaVersion: 1
name: listennotes
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/listennotes-mcp
  digest: sha256:0beba78105b110a90ad02d3c721a191e223d3d4d7be8a881913801fd8ffd0f07
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - listen-api.listennotes.com
credentials:
  - id: listennotes_api_key
    type: api_key
    provider: listennotes
    inject:
      header: X-ListenAPI-Key
      format: "{token}"
tools:
  - name: full_text_search
    default: true
  - name: typeahead_search
    default: true
  - name: fetch_best_podcasts_by_genre
    default: true
  - name: fetch_podcast_episodes_by_id
    default: true
  - name: fetch_episode_by_id
    default: true
  - name: fetch_curated_lists
    default: true
  - name: fetch_podcast_recommendations
    default: true
  - name: fetch_podcast_genres
    default: true
  - name: submit_podcast
    default: false
  - name: refresh_rss_feed
    default: false
