schemaVersion: 1
name: todoist
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/todoist-mcp
  digest: sha256:bb08447ceaec48e044cd769b6ba1b2cd8ffce18d511780b14502d3ab0d9c1224
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    # Unified REST/Sync API host plus todoist.com for OAuth token exchange.
    - api.todoist.com
    - todoist.com
credentials:
  - id: todoist_token
    type: oauth2
    provider: todoist
    scopes: [data:read, data:read_write, data:delete, project:delete]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_all_tasks
    default: true
  - name: get_all_projects
    default: true
  - name: get_task
    default: true
  - name: list_sections
    default: true
  - name: list_labels
    default: true
  - name: get_productivity_stats
    default: true
  - name: create_task
    default: false
  - name: update_task
    default: false
  - name: close_task
    default: false
  - name: delete_task
    default: false
