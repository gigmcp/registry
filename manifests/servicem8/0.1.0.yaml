schemaVersion: 1
name: servicem8
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/servicem8-mcp
  digest: sha256:fdb2065fbb040b23cd1d4245d8f8eb49419b92785bc68c8f54522d96d38082e2
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.servicem8.com
credentials:
  - id: servicem8_token
    type: oauth2
    provider: servicem8
    scopes: [read_jobs, create_jobs, manage_jobs, read_customers, manage_customers, read_job_notes, publish_job_notes, manage_job_payments, read_job_materials, read_tasks]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_all_jobs
    default: true
  - name: retrieve_job
    default: true
  - name: create_jobs
    default: false
  - name: list_all_clients
    default: true
  - name: retrieve_client
    default: true
  - name: list_all_job_notes
    default: true
  - name: create_job_note
    default: false
  - name: create_job_payment
    default: false
  - name: list_all_materials
    default: true
  - name: list_all_tasks
    default: true
