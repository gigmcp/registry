schemaVersion: 1
name: piggy
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/piggy-mcp
  digest: sha256:ebb696ed90e43e94b06fd3168a69ea150b18f0b5dc7c1ca9fead01e20bd287f5
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: Piggy
category: marketing
icon: icons/piggy.svg
entitlements:
  egress:
    - api.piggy.eu
credentials:
  - id: piggy_api_key
    type: api_key
    provider: piggy
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_perks
    default: true
  - name: list_forms
    default: true
  - name: find_voucher_by_code
    default: true
  - name: get_contact_credit_balance
    default: true
  - name: create_credit_reception
    default: false
  - name: create_vouchers_batch
    default: false
  - name: merge_contacts
    default: false
  - name: send_contact_verification_email
    default: false
  - name: update_contact_identifiers
    default: false
