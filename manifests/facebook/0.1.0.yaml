schemaVersion: 1
name: facebook
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/facebook-mcp
  digest: sha256:47c5866603ed7392ad86a8b32f458df40cdfd02d85e5cead36652499404f22dc
  builder: toolpack
  entrypoint: /app/server
tier: sealed
entitlements:
  egress:
    - graph.facebook.com
credentials:
  - id: facebook_token
    type: oauth2
    provider: facebook
    vendor: meta
    scopes: [pages_show_list, pages_read_engagement, pages_manage_posts, pages_manage_engagement, business_management]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_managed_pages
    default: true
  - name: get_page_details
    default: true
  - name: get_page_posts
    default: true
  - name: get_comments
    default: true
  - name: get_page_insights
    default: true
  - name: get_post_insights
    default: true
  - name: create_post
    default: false
  - name: create_comment
    default: false
  - name: delete_post
    default: false
  - name: send_message
    default: false
