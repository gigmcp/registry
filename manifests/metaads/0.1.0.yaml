schemaVersion: 1
name: metaads
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/metaads-mcp
  digest: sha256:b1a0ed44522a169268a68444728a900e1463a2fab5fb1a205ecedf332c141ca1
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - graph.facebook.com
credentials:
  - id: metaads_token
    type: oauth2
    provider: metaads
    scopes: [ads_read, ads_management, business_management, pages_read_engagement]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_ad_accounts
    default: true
  - name: list_ads
    default: true
  - name: read_ad_sets
    default: true
  - name: list_ad_creatives
    default: true
  - name: get_insights
    default: true
  - name: create_campaign
    default: false
  - name: create_ad_set
    default: false
  - name: create_ad
    default: false
  - name: update_campaign
    default: false
  - name: delete_campaign
    default: false
