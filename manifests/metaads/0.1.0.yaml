schemaVersion: 1
name: metaads
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/metaads-mcp
  digest: sha256:68ec8afe01f0673a2062acce3382f5b7dd635a3125a11362e40596c13b7dfb1d
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: Meta Ads
category: marketing
icon: icons/metaads.svg
entitlements:
  egress:
    - graph.facebook.com
credentials:
  - id: metaads_token
    type: oauth2
    provider: metaads
    vendor: meta
    scopes: [ads_read, ads_management, business_management, pages_read_engagement]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_ad_accounts
    default: true
  - name: list_ads
    default: true
  - name: read_ad_sets
    default: true
  - name: list_ad_creatives
    default: true
  - name: get_insights
    default: true
  - name: create_campaign
    default: false
  - name: create_ad_set
    default: false
  - name: create_ad
    default: false
  - name: update_campaign
    default: false
  - name: delete_campaign
    default: false
