schemaVersion: 1
name: acculynx
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/acculynx-mcp
  digest: sha256:a9cd4e8347d803ee14375503962f06ee991c9f48abd01b1e78dfdf655730ffa2
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.acculynx.com
credentials:
  - id: acculynx_api_key
    type: api_key
    provider: acculynx
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_calendars
    default: true
  - name: get_job_appointment_summary
    default: true
  - name: list_contact_types
    default: true
  - name: create_lead
    default: false
  - name: create_contact
    default: false
  - name: create_job
    default: false
  - name: add_job_appointment
    default: false
  - name: update_company_representative
    default: false
