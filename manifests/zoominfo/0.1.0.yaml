    default: true
  - name: search_contact
    default: true
  - name: search_intent
    default: true
  - name: search_news
    default: true
  - name: search_scoop
    default: true
  - name: enrich_company
    default: true
  - name: enrich_contact
    default: true
  - name: enrich_intent
    default: true
  - name: enrich_technology
    default: true
  - name: enrich_news
    default: true
