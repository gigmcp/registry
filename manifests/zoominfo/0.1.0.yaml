schemaVersion: 1
name: zoominfo
version: 0.1.0
source:
  repo: github.com/gigmcp/zoominfo-mcp
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/zoominfo-mcp
  # PLACEHOLDER until build-images CI emits the real digest — see README.
  digest: sha256:a443121987b641c41be1b3661a90624dffcd996895fc865df119594e5a6bdd46
  entrypoint: /app/server
tier: sealed
entitlements:
  egress:
    - api.zoominfo.com
credentials:
