schemaVersion: 1
name: zoominfo
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/zoominfo-mcp
  digest: sha256:dcb023a3bcf251d70793875fdd72cb32d25bb005a9cdd05bb54a4d0992d6d0d5
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.zoominfo.com
credentials:
  - id: zoominfo_token
    type: oauth2
    provider: zoominfo
    vendor: zoominfo
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: search_company
    default: true
  - name: search_contact
    default: true
  - name: search_intent
    default: true
  - name: search_news
    default: true
  - name: search_scoop
    default: true
  - name: enrich_company
    default: true
  - name: enrich_contact
    default: true
  - name: enrich_intent
    default: true
  - name: enrich_technology
    default: true
  - name: enrich_news
    default: true
