schemaVersion: 1
name: bamboohr
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/bamboohr-mcp
  digest: sha256:8cc7b2977c7215f7e0a507a2db9731e800fd2e9e89a27acb456ba0a0efadc895
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.bamboohr.com
credentials:
  - id: bamboohr_api_key
    type: basic
    provider: bamboohr
    inject:
      header: Authorization
      format: "Basic {token}"
tools:
  - name: get_all_employees
    default: true
  - name: get_employee
    default: true
  - name: get_time_off_requests
    default: true
  - name: get_time_off_balances
    default: true
  - name: get_departments_metadata
    default: true
  - name: list_company_reports
    default: true
  - name: create_employee
    default: false
  - name: update_employee
    default: false
  - name: create_time_off_request
    default: false
