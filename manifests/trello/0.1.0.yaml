schemaVersion: 1
name: trello
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/trello-mcp
  digest: sha256:c2e45584a36e21dc03fd616d7bbe028db9925e7f4defcd3a147359ed6932f54c
  entrypoint: /app/server
  builder: toolpack
# Trello's REST API authenticates with key+token passed as query parameters
# (?key=...&token=...); header injection cannot work, so entrusted tier.
tier: entrusted
displayName: Trello
category: productivity
entitlements:
  egress:
    - api.trello.com
    - trello.com
credentials:
  - id: trello_api_key
    type: api_key
    provider: trello
    inject:
      env: TRELLO_API_KEY
tools:
  - name: get_board
    default: true
  - name: get_board_lists
    default: true
  - name: get_list_cards
    default: true
  - name: get_card
    default: true
  - name: add_card
    default: false
  - name: add_list_to_board
    default: false
  - name: add_comment_to_card
    default: false
  - name: add_member_to_card
    default: false
  - name: delete_card
    default: false
