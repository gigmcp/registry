schemaVersion: 1
name: bitwarden
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/bitwarden-mcp
  digest: sha256:981eab474b88365a7cbb2aa5a3c7725b8e006572d0faf23fb0914ca20bde75bd
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: Bitwarden
category: dev-tools
entitlements:
  egress:
    - api.bitwarden.com
    - identity.bitwarden.com
credentials:
  - id: bitwarden_token
    type: oauth2
    provider: bitwarden
    vendor: bitwarden
    scopes: [api.organization]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: retrieve_member
    default: true
  - name: retrieve_group
    default: true
  - name: get_group_member_ids
    default: true
  - name: get_organization_subscription
    default: true
  - name: update_member
    default: false
  - name: reinvite_member
    default: false
  - name: import_members_and_groups
    default: false
  - name: delete_member
    default: false
  - name: delete_group
    default: false
