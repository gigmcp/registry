schemaVersion: 1
name: bitwarden
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/bitwarden-mcp
  digest: sha256:4715ac68cb26c62eff6f2d974a311c923f1c0b8911f3ed9bd0c751db5470b26b
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.bitwarden.com
    - identity.bitwarden.com
credentials:
  - id: bitwarden_token
    type: oauth2
    provider: bitwarden
    scopes: [api.organization]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: retrieve_member
    default: true
  - name: retrieve_group
    default: true
  - name: get_group_member_ids
    default: true
  - name: get_organization_subscription
    default: true
  - name: update_member
    default: false
  - name: reinvite_member
    default: false
  - name: import_members_and_groups
    default: false
  - name: delete_member
    default: false
  - name: delete_group
    default: false
