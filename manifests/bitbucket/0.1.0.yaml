schemaVersion: 1
name: bitbucket
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/bitbucket-mcp
  digest: sha256:65ebeb7cb830a72d681a2d2d48bdcff25a2fad9d11fc9e9652888899b2c7ad19
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.bitbucket.org
    - bitbucket.org
credentials:
  - id: bitbucket_token
    type: oauth2
    provider: bitbucket
    scopes: [account, repository, repository:write, pullrequest, pullrequest:write]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_repositories
    default: true
  - name: get_repository
    default: true
  - name: list_pull_requests
    default: true
  - name: get_pull_request_diff
    default: true
  - name: list_commits
    default: true
  - name: list_issues
    default: true
  - name: create_pull_request
    default: false
  - name: merge_pull_request
    default: false
  - name: create_issue
    default: false
  - name: create_branch
    default: false
