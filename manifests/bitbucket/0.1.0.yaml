schemaVersion: 1
name: bitbucket
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/bitbucket-mcp
  digest: sha256:2aa514363b64fb38b47589cc940b5baa6f1931ee310d9ba31348454ad11b77a8
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: Bitbucket
category: dev-tools
entitlements:
  egress:
    - api.bitbucket.org
    - bitbucket.org
credentials:
  - id: bitbucket_token
    type: oauth2
    provider: bitbucket
    vendor: atlassian
    scopes: [account, repository, repository:write, pullrequest, pullrequest:write]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_repositories
    default: true
  - name: get_repository
    default: true
  - name: list_pull_requests
    default: true
  - name: get_pull_request_diff
    default: true
  - name: list_commits
    default: true
  - name: list_issues
    default: true
  - name: create_pull_request
    default: false
  - name: merge_pull_request
    default: false
  - name: create_issue
    default: false
  - name: create_branch
    default: false
