schemaVersion: 1
name: amcards
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/amcards-mcp
  digest: sha256:a145ac6103961ed3dc381a3d4cceb3b55a2a95f7dbbf1ec3dab0ea7f59312fba
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - amcards.com
credentials:
  - id: amcards_api_key
    type: api_key
    provider: amcards
    inject:
      header: Authorization
      format: "{token}"
tools:
  - name: list_public_templates
    default: true
  - name: get_public_template
    default: true
  - name: get_cards
    default: true
  - name: list_categories
    default: true
  - name: get_category
    default: true
  - name: get_contacts
    default: true
  - name: list_gifts
    default: true
  - name: get_gift
    default: true
