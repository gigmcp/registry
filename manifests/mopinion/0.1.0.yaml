schemaVersion: 1
name: mopinion
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/mopinion-mcp
  digest: sha256:a86ef9e75bf7c763939dd77144dd37c6d780c460d46cb3770ce652da3084ec22
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.mopinion.com
credentials:
  - id: mopinion_api_key
    type: api_key
    provider: mopinion
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_account
    default: true
  - name: list_deployments
    default: true
  - name: get_deployment
    default: true
  - name: get_dataset
    default: true
  - name: get_dataset_feedback
    default: true
  - name: get_dataset_fields
    default: true
  - name: get_report
    default: true
  - name: get_report_feedback
    default: true
  - name: get_report_fields
    default: true
