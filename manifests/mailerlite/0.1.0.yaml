schemaVersion: 1
name: mailerlite
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/mailerlite-mcp
  digest: sha256:b2896bf31e21ea932352441275ed08b2ec2412f0c3873f31ad09db9d3b5063e6
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - connect.mailerlite.com
credentials:
  - id: mailerlite_api_key
    type: api_key
    provider: mailerlite
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_subscribers
    default: true
  - name: get_groups
    default: true
  - name: get_campaigns
    default: true
  - name: get_segments
    default: true
  - name: get_account_info
    default: true
  - name: create_or_update_subscriber
    default: false
  - name: delete_subscriber
    default: false
  - name: create_campaign
    default: false
  - name: create_webhook
    default: false
