schemaVersion: 1
name: mailerlite
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/mailerlite-mcp
  digest: sha256:fd6eb625fb801d68c47be3f379e8ce8cf38d9943ed3d142e08ecddca56911be5
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: MailerLite
category: marketing
icon: icons/mailerlite.svg
entitlements:
  egress:
    - connect.mailerlite.com
credentials:
  - id: mailerlite_api_key
    type: api_key
    provider: mailerlite
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_subscribers
    default: true
  - name: get_groups
    default: true
  - name: get_campaigns
    default: true
  - name: get_segments
    default: true
  - name: get_account_info
    default: true
  - name: create_or_update_subscriber
    default: false
  - name: delete_subscriber
    default: false
  - name: create_campaign
    default: false
  - name: create_webhook
    default: false
