schemaVersion: 1
name: dynamics365
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/dynamics365-mcp
  digest: sha256:b727f918a9d107a1c793424d39780f08253ca2648008e901cb43e2ba5e98c037
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: Dynamics 365
category: CRM
entitlements:
  egress:
    - "*.dynamics.com"
    - login.microsoftonline.com
credentials:
  - id: dynamics365_token
    type: oauth2
    provider: dynamics365
    vendor: microsoft
    scopes: [user_impersonation, offline_access]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_all_leads
    default: true
  - name: get_lead
    default: true
  - name: get_all_invoices
    default: true
  - name: get_invoice
    default: true
  - name: create_lead
    default: false
  - name: create_contact
    default: false
  - name: create_account
    default: false
  - name: create_opportunity
    default: false
  - name: update_lead
    default: false
  - name: update_invoice
    default: false
