schemaVersion: 1
name: serpapi
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/serpapi-mcp
  digest: sha256:305a63a7b4636c9b591d9f7ad9bdae195592f3c6d650fe57244cd8870251c3ee
  entrypoint: /app/server
  builder: toolpack
# SerpApi authenticates via the api_key query parameter only — no auth header
# exists, so header injection cannot work and the key must come in via env.
tier: entrusted
displayName: SerpApi
category: search
icon: icons/serpapi.svg
entitlements:
  egress:
    - serpapi.com
credentials:
  - id: serpapi_api_key
    type: api_key
    provider: serpapi
    inject:
      env: SERPAPI_API_KEY
tools:
  - name: search
    default: true
  - name: news_search
    default: true
  - name: image_search
    default: true
  - name: google_maps_search
    default: true
  - name: shopping_search
    default: true
  - name: scholar_search
    default: true
  - name: trends_search
    default: true
  - name: youtube_search
    default: true
