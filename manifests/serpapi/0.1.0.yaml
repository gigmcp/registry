schemaVersion: 1
name: serpapi
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/serpapi-mcp
  digest: sha256:e734a639c6d7052ec850b31efef1d0d604b69917222d2241a904b17421b92fe3
  entrypoint: /app/server
  builder: toolpack
# SerpApi authenticates via the api_key query parameter only — no auth header
# exists, so header injection cannot work and the key must come in via env.
tier: entrusted
entitlements:
  egress:
    - serpapi.com
credentials:
  - id: serpapi_api_key
    type: api_key
    provider: serpapi
    inject:
      env: SERPAPI_API_KEY
tools:
  - name: search
    default: true
  - name: news_search
    default: true
  - name: image_search
    default: true
  - name: google_maps_search
    default: true
  - name: shopping_search
    default: true
  - name: scholar_search
    default: true
  - name: trends_search
    default: true
  - name: youtube_search
    default: true
