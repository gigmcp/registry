schemaVersion: 1
name: snowflake
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/snowflake-mcp
  digest: sha256:63fe1b21cff2b41ef6e2e8185198fe551a70419167c6d64b39b117510a6c8d25
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - "*.snowflakecomputing.com"
    - status.snowflake.com
credentials:
  - id: snowflake_token
    type: oauth2
    provider: snowflake
    scopes: [refresh_token, session:role-any]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: execute_sql
    default: false
  - name: submit_sql_statement
    default: false
  - name: check_statement_status
    default: true
  - name: cancel_statement_execution
    default: false
  - name: show_databases
    default: true
  - name: show_schemas
    default: true
  - name: show_tables
    default: true
  - name: get_status_summary
    default: true
  - name: get_unresolved_incidents
    default: true
