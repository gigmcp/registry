schemaVersion: 1
name: mixpanel
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/mixpanel-mcp
  digest: sha256:cfb7ce797ef4169f07bdeb18fddcfa5c9349aebd3f897ab5b64a8f7a1eb5dbe5
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - mixpanel.com
    - api.mixpanel.com
    - data.mixpanel.com
    - eu.mixpanel.com
credentials:
  - id: mixpanel_token
    type: basic
    provider: mixpanel
    inject:
      header: Authorization
      format: "Basic {token}"
tools:
  - name: query_segmentation_report
    default: true
  - name: query_funnel_report
    default: true
  - name: query_retention_report
    default: true
  - name: list_top_events
    default: true
  - name: run_jql_query
    default: true
  - name: list_cohorts
    default: true
  - name: list_annotations
    default: true
  - name: update_user_profile
    default: false
  - name: delete_user_profile
    default: false
  - name: create_identity_alias
    default: false
