schemaVersion: 1
name: googledocs
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/googledocs-mcp
  digest: sha256:99ce9e0ecdda1c9276cd6bb239ab0a04d0ff2b7927bb07b96f05e2df71200d10
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - docs.googleapis.com
    - www.googleapis.com
    - oauth2.googleapis.com
credentials:
  - id: googledocs_token
    type: oauth2
    provider: googledocs
    scopes:
      [
        https://www.googleapis.com/auth/documents,
        https://www.googleapis.com/auth/drive.file,
      ]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_document
    default: true
  - name: get_document_plain_text
    default: true
  - name: search_documents
    default: true
  - name: export_doc_as_pdf
    default: true
  - name: create_document
    default: false
  - name: insert_text
    default: false
  - name: replace_all_text
    default: false
  - name: update_document_markdown
    default: false
