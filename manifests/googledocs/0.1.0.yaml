schemaVersion: 1
name: googledocs
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/googledocs-mcp
  digest: sha256:dd7bc9fc90182cab3cd3de929d869a8770db9c4b883291a73afe49548865c3af
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - docs.googleapis.com
    - www.googleapis.com
    - oauth2.googleapis.com
credentials:
  - id: googledocs_token
    type: oauth2
    provider: googledocs
    scopes:
      [
        https://www.googleapis.com/auth/documents,
        https://www.googleapis.com/auth/drive.file,
      ]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_document
    default: true
  - name: get_document_plain_text
    default: true
  - name: search_documents
    default: true
  - name: export_doc_as_pdf
    default: true
  - name: create_document
    default: false
  - name: insert_text
    default: false
  - name: replace_all_text
    default: false
  - name: update_document_markdown
    default: false
