schemaVersion: 1
name: weathermap
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/weathermap-mcp
  digest: sha256:3b4f7c20641752a73f45678bc3fc084c8af68b40b7f824744c97cf27cf33b00e
  entrypoint: /app/server
  builder: toolpack
# OpenWeatherMap authenticates via the appid query parameter only — there is
# no auth header, so header injection cannot work and the key comes in via env.
tier: entrusted
entitlements:
  egress:
    - api.openweathermap.org
credentials:
  - id: weathermap_api_key
    type: api_key
    provider: weathermap
    inject:
      env: WEATHERMAP_API_KEY
tools:
  - name: get_current_weather
    default: true
  - name: geocode_location
    default: true
  - name: reverse_geocode
    default: true
  - name: get_forecast
    default: true
  - name: get_air_pollution
    default: true
