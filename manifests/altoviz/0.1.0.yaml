schemaVersion: 1
name: altoviz
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/altoviz-mcp
  digest: sha256:4b210558912655b7e9e209ae61b904c54eceed9bce489c3187a64c4dd903521d
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: Altoviz
category: productivity
icon: icons/altoviz.svg
entitlements:
