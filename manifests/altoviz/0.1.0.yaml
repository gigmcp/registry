    default: true
  - name: get_customer
    default: true
  - name: list_sale_invoices
    default: true
  - name: get_sale_invoice
    default: true
  - name: list_sale_quotes
    default: true
  - name: list_suppliers
    default: true
  - name: create_customer
    default: false
  - name: create_sale_invoice
    default: false
  - name: create_receipt
    default: false
  - name: delete_customer
    default: false
