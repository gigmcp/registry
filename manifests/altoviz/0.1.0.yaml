schemaVersion: 1
name: altoviz
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/altoviz-mcp
  digest: sha256:7c7f786142a13c336d7c5d57cee67301ec0d7e9735c15898e4b446a9105ec746
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    # Altoviz invoicing/business-management REST API
    - api.altoviz.com
credentials:
  - id: altoviz_api_key
    type: api_key
    provider: altoviz
    inject:
      header: X-API-KEY
      format: "{token}"
tools:
  - name: list_customers
    default: true
  - name: get_customer
    default: true
  - name: list_sale_invoices
    default: true
  - name: get_sale_invoice
    default: true
  - name: list_sale_quotes
    default: true
  - name: list_suppliers
    default: true
  - name: create_customer
    default: false
  - name: create_sale_invoice
    default: false
  - name: create_receipt
    default: false
  - name: delete_customer
    default: false
