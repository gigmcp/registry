schemaVersion: 1
name: altoviz
version: 0.1.0
source:
  repo: github.com/gigmcp/altoviz-mcp
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/altoviz-mcp
  # PLACEHOLDER until build-images CI emits the real digest — see README.
  digest: sha256:de03bcd8f840abb82680942ae86a19e6e9c9df523b76516743d514dd8f5d4a5c
  entrypoint: /app/server
tier: sealed
entitlements:
  egress:
    # Altoviz invoicing/business-management REST API
    - api.altoviz.com
credentials:
  - id: altoviz_api_key
    type: api_key
    provider: altoviz
    inject:
      header: X-API-KEY
      format: "{token}"
tools:
  - name: list_customers
    default: true
  - name: get_customer
    default: true
  - name: list_sale_invoices
    default: true
  - name: get_sale_invoice
    default: true
  - name: list_sale_quotes
    default: true
  - name: list_suppliers
    default: true
  - name: create_customer
    default: false
  - name: create_sale_invoice
    default: false
  - name: create_receipt
    default: false
  - name: delete_customer
    default: false
