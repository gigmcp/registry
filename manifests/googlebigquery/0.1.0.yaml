schemaVersion: 1
name: googlebigquery
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/googlebigquery-mcp
  digest: sha256:b71342477fa80d37b09579e0581b42534dbe4c5c7ebf269e27e51cc4a70502a7
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: Google BigQuery
category: data
entitlements:
  egress:
    - bigquery.googleapis.com
credentials:
  - id: googlebigquery_token
    type: oauth2
    provider: googlebigquery
    vendor: google
    scopes:
      - "https://www.googleapis.com/auth/bigquery"
      - "https://www.googleapis.com/auth/bigquery.readonly"
      - "https://www.googleapis.com/auth/bigquery.insertdata"
      - "https://www.googleapis.com/auth/cloud-platform"
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: query
    default: true
  - name: get_query_results
    default: true
  - name: list_datasets
    default: true
  - name: list_tables
    default: true
  - name: get_table_schema
    default: true
  - name: list_table_data
    default: true
  - name: list_jobs
    default: true
  - name: insert_table_data
    default: false
  - name: create_dataset
    default: false
  - name: delete_table
    default: false
