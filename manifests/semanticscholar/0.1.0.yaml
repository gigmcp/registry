schemaVersion: 1
name: semanticscholar
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/semanticscholar-mcp
  digest: sha256:05321dc07ee8931a26ca158edd3cfa791ab00c8255364d855d165f3b999f0ff3
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.semanticscholar.org
credentials:
  - id: semanticscholar_api_key
    type: api_key
    provider: semanticscholar
    inject:
      header: x-api-key
      format: "{token}"
tools:
  - name: search_papers
    default: true
  - name: get_paper_details
    default: true
  - name: get_paper_citations
    default: true
  - name: get_paper_references
    default: true
  - name: search_authors
    default: true
  - name: get_author_details
    default: true
  - name: get_author_papers
    default: true
  - name: get_paper_recommendations
    default: true
