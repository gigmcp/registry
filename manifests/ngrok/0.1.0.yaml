schemaVersion: 1
name: ngrok
version: 0.1.0
source:
  repo: github.com/gigmcp/ngrok-mcp
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/ngrok-mcp
  # PLACEHOLDER until build-images CI emits the real digest — see README.
  digest: sha256:759c7f8983091a453e14625f23082d7c0b096ed3a4da5e46007fe13eb450e011
  entrypoint: /app/server
tier: sealed
entitlements:
  egress:
    - api.ngrok.com
credentials:
  - id: ngrok_api_key
    type: api_key
    provider: ngrok
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_all_endpoints
    default: true
  - name: get_endpoint
    default: true
  - name: list_active_tunnels
    default: true
  - name: list_tunnel_sessions
    default: true
  - name: list_reserved_domains
    default: true
  - name: list_event_subscriptions
    default: true
  - name: create_endpoint
    default: false
  - name: delete_endpoint
    default: false
  - name: create_event_subscription
    default: false
