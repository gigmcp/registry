schemaVersion: 1
name: ngrok
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/ngrok-mcp
  digest: sha256:579c2d7f567fe71b4635bfa2b025e1aead61cc2fb7d9de3fb653aa73a3a1938b
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: ngrok
category: dev-tools
icon: icons/ngrok.svg
entitlements:
  egress:
    - api.ngrok.com
credentials:
  - id: ngrok_api_key
    type: api_key
    provider: ngrok
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_all_endpoints
    default: true
  - name: get_endpoint
    default: true
  - name: list_active_tunnels
    default: true
  - name: list_tunnel_sessions
    default: true
  - name: list_reserved_domains
    default: true
  - name: list_event_subscriptions
    default: true
  - name: create_endpoint
    default: false
  - name: delete_endpoint
    default: false
  - name: create_event_subscription
    default: false
