schemaVersion: 1
name: browseai
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/browseai-mcp
  digest: sha256:af910f06aeae5686316c8bf9b7013b0808aa0fbf8ad381dd71b21dfbe14caf3e
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: Browse AI
category: ai
icon: icons/browseai.svg
entitlements:
  egress:
    - api.browse.ai
credentials:
  - id: browseai_api_key
    type: api_key
    provider: browseai
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_robots
    default: true
  - name: get_robot_tasks
    default: true
  - name: get_task_details
    default: true
  - name: list_robot_webhooks
    default: true
  - name: get_system_status
    default: true
  - name: run_robot
    default: false
  - name: bulk_run_tasks
    default: false
  - name: create_monitor
    default: false
  - name: delete_monitor
    default: false
  - name: delete_task
    default: false
