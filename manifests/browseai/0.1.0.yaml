schemaVersion: 1
name: browseai
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/browseai-mcp
  digest: sha256:55f296c4184f5758cc1231f1fa090776061c85dc1e003c1baf87ae42727f3f72
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.browse.ai
credentials:
  - id: browseai_api_key
    type: api_key
    provider: browseai
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_robots
    default: true
  - name: get_robot_tasks
    default: true
  - name: get_task_details
    default: true
  - name: list_robot_webhooks
    default: true
  - name: get_system_status
    default: true
  - name: run_robot
    default: false
  - name: bulk_run_tasks
    default: false
  - name: create_monitor
    default: false
  - name: delete_monitor
    default: false
  - name: delete_task
    default: false
