schemaVersion: 1
name: appdrag
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/appdrag-mcp
  digest: sha256:964c1daad28545500931d3bd843c4c10b060bdc4694568835d0c3fc3d9054b03
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: AppDrag
category: dev-tools
icon: icons/appdrag.svg
entitlements:
  egress:
    - api.appdrag.com
credentials:
  - id: appdrag_api_key
    type: api_key
    provider: appdrag
    inject:
      header: X-Api-Key
      format: "{token}"
tools:
  - name: execute_function_get
    default: true
  - name: visual_sql_select
    default: true
  - name: execute_function_post
    default: false
  - name: execute_function_put
    default: false
  - name: execute_function_patch
    default: false
  - name: execute_function_delete
    default: false
  - name: visual_sql_update
    default: false
  - name: visual_sql_delete
    default: false
