schemaVersion: 1
name: exa
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/exa-mcp
  digest: sha256:94030f18244df773eacd3aa023307b4d2f4c8371fd50a6dd0bad728d8f48aefa
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.exa.ai
credentials:
  - id: exa_api_key
    type: api_key
    provider: exa
    inject:
      header: x-api-key
      format: "{token}"
tools:
  - name: search
    default: true
  - name: find_similar
    default: true
  - name: get_contents
    default: true
  - name: generate_answer
    default: true
  - name: get_research_task
    default: true
  - name: create_research_task
    default: false
  - name: create_webset
    default: false
  - name: delete_webset
    default: false
