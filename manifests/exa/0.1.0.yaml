schemaVersion: 1
name: exa
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/exa-mcp
  digest: sha256:997801351bd844b9d616d597b0e2081a16c8103a93334f98a0e3ff71692eff05
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: Exa
category: search
icon: icons/exa.svg
entitlements:
