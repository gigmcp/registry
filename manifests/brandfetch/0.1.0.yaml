schemaVersion: 1
name: brandfetch
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/brandfetch-mcp
  digest: sha256:53c9c3daf808fbaeaf329ad63ccd1fdebb2ddf87a19fabdae0a3536de7d21bad
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: Brandfetch
category: design
entitlements:
  egress:
    - api.brandfetch.io
    - graphql.brandfetch.io
credentials:
  - id: brandfetch_api_key
    type: api_key
    provider: brandfetch
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_brand_info
    default: true
  - name: search_brands
    default: true
  - name: get_transaction_info
    default: true
  - name: get_taxonomy
    default: true
  - name: list_webhooks
    default: true
  - name: list_subscribable_events
    default: true
  - name: get_graphql_version
    default: true
