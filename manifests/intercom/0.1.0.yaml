schemaVersion: 1
name: intercom
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/intercom-mcp
  digest: sha256:8afab53cbeb16941068b78149d50b817fe27d6e849189f4ad7ed9fbab8b91a19
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: Intercom
category: support
icon: icons/intercom.svg
entitlements:
  egress:
    - api.intercom.io
credentials:
  - id: intercom_token
    type: oauth2
    provider: intercom
    vendor: intercom
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: search_contacts
    default: true
  - name: get_contact
    default: true
  - name: list_conversations
    default: true
  - name: list_companies
    default: true
  - name: list_tags
    default: true
  - name: create_contact
    default: false
  - name: update_contact
    default: false
  - name: reply_to_conversation
    default: false
  - name: create_ticket
    default: false
  - name: attach_tag_to_conversation
    default: false
