schemaVersion: 1
name: maintainx
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/maintainx-mcp
  digest: sha256:1d00a9a943edd01e375f36c50ebb5edbd17072b6e8e3000cd1a00df9362a923a
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.getmaintainx.com
credentials:
  - id: maintainx_api_key
    type: api_key
    provider: maintainx
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_work_orders
    default: true
  - name: list_assets
    default: true
  - name: list_locations
    default: true
  - name: list_work_requests
    default: true
  - name: get_user
    default: true
  - name: find_entity
    default: true
  - name: create_work_order
    default: false
  - name: update_work_order_status
    default: false
  - name: create_work_order_comment
    default: false
  - name: create_work_request
    default: false
