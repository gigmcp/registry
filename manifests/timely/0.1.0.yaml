schemaVersion: 1
name: timely
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/timely-mcp
  digest: sha256:1704b2dbe198882f061ae37ec5279712d90afa2470158229fdc8190a9ccdf05e
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.timelyapp.com
credentials:
  - id: timely_token
    type: oauth2
    provider: timely
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_accounts
    default: true
  - name: get_current_user
    default: true
  - name: list_users
    default: true
  - name: list_projects
    default: true
  - name: list_clients
    default: true
  - name: list_events
    default: true
  - name: filter_reports
    default: true
  - name: create_client
    default: false
  - name: update_project
    default: false
  - name: process_bulk_events
    default: false
