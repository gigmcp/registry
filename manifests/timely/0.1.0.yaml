schemaVersion: 1
name: timely
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/timely-mcp
  digest: sha256:8911b2dba164c165bd2a84772365d4bc6c77ff08abbc414b4c61eb9387921634
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: Timely
category: productivity
icon: icons/timely.svg
entitlements:
  egress:
    - api.timelyapp.com
credentials:
  - id: timely_token
    type: oauth2
    provider: timely
    vendor: timely
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_accounts
    default: true
  - name: get_current_user
    default: true
  - name: list_users
    default: true
  - name: list_projects
    default: true
  - name: list_clients
    default: true
  - name: list_events
    default: true
  - name: filter_reports
    default: true
  - name: create_client
    default: false
  - name: update_project
    default: false
  - name: process_bulk_events
    default: false
