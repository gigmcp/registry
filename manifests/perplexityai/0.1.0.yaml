schemaVersion: 1
name: perplexityai
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/perplexityai-mcp
  digest: sha256:76086f6e1f90e8d583e0103b8e72d5c377ff39ad100c9e94a783b72a6db29725
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.perplexity.ai
credentials:
  - id: perplexityai_api_key
    type: api_key
    provider: perplexityai
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: create_chat_completion
    default: true
  - name: create_async_chat_completion
    default: true
  - name: get_async_chat_completion
    default: true
  - name: list_async_chat_completions
    default: true
  - name: perplexity_search
    default: true
  - name: list_models
    default: true
  - name: create_embeddings
    default: true
