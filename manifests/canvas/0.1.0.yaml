schemaVersion: 1
name: canvas
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/canvas-mcp
  digest: sha256:7826d1ad0dd4f518dcd5c60b844268f743b30db7069d173b4542fba2226a4bfe
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - canvas.instructure.com
    - "*.instructure.com"
credentials:
  - id: canvas_api_key
    type: api_key
    provider: canvas
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_courses
    default: true
  - name: get_course
    default: true
  - name: list_assignments
    default: true
  - name: list_enrollments
    default: true
  - name: list_discussion_topics
    default: true
  - name: create_assignment
    default: false
  - name: create_discussion_topic
    default: false
  - name: create_calendar_event
    default: false
  - name: create_conversation
    default: false
  - name: create_module
    default: false
