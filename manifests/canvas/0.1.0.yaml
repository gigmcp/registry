schemaVersion: 1
name: canvas
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/canvas-mcp
  digest: sha256:4d380da49b9b16275ad72b9464763ae0bfa4238b2420e1d770bca753c07f2028
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: Canvas
category: productivity
icon: icons/canvas.svg
entitlements:
  egress:
    - canvas.instructure.com
    - "*.instructure.com"
credentials:
  - id: canvas_api_key
    type: api_key
    provider: canvas
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_courses
    default: true
  - name: get_course
    default: true
  - name: list_assignments
    default: true
  - name: list_enrollments
    default: true
  - name: list_discussion_topics
    default: true
  - name: create_assignment
    default: false
  - name: create_discussion_topic
    default: false
  - name: create_calendar_event
    default: false
  - name: create_conversation
    default: false
  - name: create_module
    default: false
