schemaVersion: 1
name: microsoft-teams
version: 0.1.0
source:
  repo: github.com/gigmcp/microsoft-teams-mcp
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/microsoft-teams-mcp
  # PLACEHOLDER until build-images CI emits the real digest — see README.
  digest: sha256:66bd04a92c9ddcff2e6064bef363fc6731329fdb559b88e22c8c9fcdb6f960b6
  entrypoint: /app/server
tier: sealed
entitlements:
  egress:
    - graph.microsoft.com
    - login.microsoftonline.com
credentials:
  - id: microsoft_teams_token
    type: oauth2
    provider: microsoft-teams
    scopes: [User.Read, Chat.ReadWrite, ChannelMessage.Send, Team.ReadBasic.All, OnlineMeetings.ReadWrite]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_all_chats
    default: true
  - name: get_chat_message
    default: true
  - name: get_team
    default: true
  - name: get_team_channel
    default: true
  - name: get_user_profile
    default: true
  - name: get_user_presence
    default: true
  - name: create_channel
    default: false
  - name: create_team
    default: false
  - name: add_member_to_team
    default: false
  - name: create_online_meeting
    default: false
