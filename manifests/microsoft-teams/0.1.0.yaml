schemaVersion: 1
name: microsoft-teams
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/microsoft-teams-mcp
  digest: sha256:2b750abe485c7f73962c5565e855780ac1613bdf3c42a13cee22d58cf3dd29cb
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - graph.microsoft.com
    - login.microsoftonline.com
credentials:
  - id: microsoft_teams_token
    type: oauth2
    provider: microsoft-teams
    scopes: [User.Read, Chat.ReadWrite, ChannelMessage.Send, Team.ReadBasic.All, OnlineMeetings.ReadWrite]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_all_chats
    default: true
  - name: get_chat_message
    default: true
  - name: get_team
    default: true
  - name: get_team_channel
    default: true
  - name: get_user_profile
    default: true
  - name: get_user_presence
    default: true
  - name: create_channel
    default: false
  - name: create_team
    default: false
  - name: add_member_to_team
    default: false
  - name: create_online_meeting
    default: false
