  - name: create_dataset_from_url
    default: false
  - name: create_dataset_from_file
    default: false
  - name: create_batch_predictions
    default: false
  - name: create_custom_model
    default: false
  - name: create_automated_document
    default: false
  - name: cancel_project_job
    default: false
