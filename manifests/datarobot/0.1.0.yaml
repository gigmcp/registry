schemaVersion: 1
name: datarobot
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/datarobot-mcp
  digest: sha256:cd8eeb1310928bfc1fa0b38a8ed48674779188b652084d079a7efe2c9c1e3d49
  entrypoint: /app/server
