schemaVersion: 1
name: datarobot
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/datarobot-mcp
  digest: sha256:1e5ffb00405191e30c21992e74fae8515ebec786e52b2ed9c9c5d01c3cded50b
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - app.datarobot.com
credentials:
  - id: datarobot_api_key
    type: api_key
    provider: datarobot
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: check_project_status
    default: true
  - name: analyze_dataset_definition
    default: true
  - name: download_code_snippet
    default: true
  - name: create_dataset_from_url
    default: false
  - name: create_dataset_from_file
    default: false
  - name: create_batch_predictions
    default: false
  - name: create_custom_model
    default: false
  - name: create_automated_document
    default: false
  - name: cancel_project_job
    default: false
