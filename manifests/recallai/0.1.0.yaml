schemaVersion: 1
name: recallai
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/recallai-mcp
  digest: sha256:66399da5989291d39c7f1d5a314f4fcdd641ea733e5cb0d6bcddd22a50a7e077
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - "*.recall.ai"
credentials:
  - id: recallai_api_key
    type: api_key
    provider: recallai
    inject:
      header: Authorization
      format: "Token {token}"
tools:
  - name: list_bots
    default: true
  - name: retrieve_bot
    default: true
  - name: create_bot
    default: false
  - name: delete_bot
    default: false
  - name: remove_bot_from_call
    default: false
  - name: start_recording
    default: false
  - name: stop_recording
    default: false
  - name: list_transcripts
    default: true
  - name: list_calendar_events
    default: true
  - name: retrieve_billing_usage
    default: true
