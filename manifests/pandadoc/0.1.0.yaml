schemaVersion: 1
name: pandadoc
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/pandadoc-mcp
  digest: sha256:897dea9a1f7d2d3a3dc4e5b61334c43b7b745786c3949acea84b19b92134a349
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: PandaDoc
category: documents
entitlements:
  egress:
    - api.pandadoc.com
credentials:
  - id: pandadoc_api_key
    type: api_key
    provider: pandadoc
    inject:
      header: Authorization
      format: "API-Key {token}"
tools:
  - name: list_templates
    default: true
  - name: get_template_details
    default: true
  - name: get_document_details
    default: true
  - name: list_contacts
    default: true
  - name: list_document_folders
    default: true
  - name: create_document_from_file
    default: false
  - name: create_template
    default: false
  - name: create_or_update_contact
    default: false
  - name: create_folder
    default: false
  - name: move_document_to_folder
    default: false
