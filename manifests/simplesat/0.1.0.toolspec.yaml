schemaVersion: 1
name: simplesat
version: 0.1.0
baseUrl: https://api.simplesat.io
tools:
  - name: list_surveys
    description: List all surveys in the Simplesat account
    method: GET
    path: /api/v1/surveys
    params:
      - {name: page, in: query, type: integer, description: "Page number (default 1)"}
      - {name: page_size, in: query, type: integer, description: "Records per page (default 100, max 100)"}
  - name: list_questions
    description: Retrieve a paginated list of all questions in Simplesat
    method: GET
    path: /api/v1/questions
    params:
      - {name: page, in: query, type: integer, description: "Page number (default 1)"}
      - {name: page_size, in: query, type: integer, description: "Records per page (default 100, max 100)"}
  - name: list_answers
    description: Retrieve a paginated list of answers
    method: GET
    path: /api/v1/answers
    params:
      - {name: page, in: query, type: integer, description: "Page number (default 1)"}
      - {name: page_size, in: query, type: integer, description: "Records per page (default 100, max 100)"}
  - name: search_answers
    description: Search and filter answers by date range, sentiment, customer, survey, and custom attributes
    method: POST
    path: /api/v1/answers/search
    params:
      - {name: start_date, in: body, type: string, description: "Filter answers on or after this date (ISO 8601, e.g. 2024-01-01T00:00:00Z)"}
      - {name: end_date, in: body, type: string, description: "Filter answers on or before this date (ISO 8601, e.g. 2024-12-31T23:59:59Z)"}
      - {name: page, in: query, type: integer, description: "Page number (default 1)"}
      - {name: page_size, in: query, type: integer, description: "Records per page (default 100, max 100)"}
  - name: search_responses
    description: Search and filter survey responses by date range, sentiment, customer, team member, and other criteria
    method: POST
    path: /api/v1/responses/search
    params:
      - {name: start_date, in: body, type: string, description: "Filter responses on or after this date (ISO 8601, e.g. 2024-01-01T00:00:00Z)"}
      - {name: end_date, in: body, type: string, description: "Filter responses on or before this date (ISO 8601, e.g. 2024-12-31T23:59:59Z)"}
      - {name: page, in: query, type: integer, description: "Page number (default 1)"}
      - {name: page_size, in: query, type: integer, description: "Records per page (default 100, max 100)"}
  - name: get_customer
    description: Retrieve a single customer by their Simplesat ID
    method: GET
    path: /api/v1/customers/{id}
    params:
      - {name: id, in: path, type: string, required: true, description: "Simplesat customer ID"}
  - name: create_or_update_customer
    description: Create a new customer or update an existing one matched by email address
    method: POST
    path: /api/customers/create-or-update/
    params:
      - {name: email, in: body, type: string, required: true, description: "Customer email address used as the unique key for create-or-update"}
      - {name: name, in: body, type: string, description: "Customer full name"}
      - {name: company, in: body, type: string, description: "Customer company name"}
      - {name: external_id, in: body, type: string, description: "External identifier for the customer in a third-party system"}
  - name: update_customer
    description: Update an existing customer record by their Simplesat ID
    method: PATCH
    path: /api/v1/customers/{id}
    params:
      - {name: id, in: path, type: string, required: true, description: "Simplesat customer ID"}
      - {name: name, in: body, type: string, description: "Customer full name"}
      - {name: email, in: body, type: string, description: "Customer email address"}
      - {name: company, in: body, type: string, description: "Customer company name"}
      - {name: external_id, in: body, type: string, description: "External identifier for the customer in a third-party system"}
  - name: create_or_update_team_member
    description: Create a new team member or update an existing one matched by email address
    method: POST
    path: /api/v1/team_members/create-or-update/
    params:
      - {name: email, in: body, type: string, required: true, description: "Team member email address used as the unique key for create-or-update"}
      - {name: first_name, in: body, type: string, required: true, description: "Team member first name"}
      - {name: last_name, in: body, type: string, required: true, description: "Team member last name"}
      - {name: title, in: body, type: string, description: "Team member job title"}
      - {name: phone, in: body, type: string, description: "Team member phone number"}
