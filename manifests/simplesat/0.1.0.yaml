schemaVersion: 1
name: simplesat
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/simplesat-mcp
  digest: sha256:de8a5b565f7fd8f173b42c30f3058952d4a0065383aa78ef2f350db5b58f6e89
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: Simplesat
category: support
icon: icons/simplesat.svg
entitlements:
  egress:
    - api.simplesat.io
credentials:
  - id: simplesat_api_key
    type: api_key
    provider: simplesat
    inject:
      header: X-Simplesat-Token
      format: "{token}"
tools:
  - name: list_surveys
    default: true
  - name: list_questions
    default: true
  - name: list_answers
    default: true
  - name: search_answers
    default: true
  - name: search_responses
    default: true
  - name: get_customer
    default: true
  - name: create_or_update_customer
    default: false
  - name: update_customer
    default: false
  - name: create_or_update_team_member
    default: false
