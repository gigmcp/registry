schemaVersion: 1
name: simplesat
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/simplesat-mcp
  digest: sha256:355878da9990882c94966465f286a2835de8bc1f1e464b1089544bab39625c97
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.simplesat.io
credentials:
  - id: simplesat_api_key
    type: api_key
    provider: simplesat
    inject:
      header: X-Simplesat-Token
      format: "{token}"
tools:
  - name: list_surveys
    default: true
  - name: list_questions
    default: true
  - name: list_answers
    default: true
  - name: search_answers
    default: true
  - name: search_responses
    default: true
  - name: get_customer
    default: true
  - name: create_or_update_customer
    default: false
  - name: update_customer
    default: false
  - name: create_or_update_team_member
    default: false
