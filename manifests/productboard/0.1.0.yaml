schemaVersion: 1
name: productboard
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/productboard-mcp
  digest: sha256:da27486ddd7dba76a7e8a1c8e713b9f827285ae04f727c798ce3f2df615b7e71
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.productboard.com
credentials:
  - id: productboard_token
    type: oauth2
    provider: productboard
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_features
    default: true
  - name: get_feature
    default: true
  - name: create_feature
    default: false
  - name: update_feature
    default: false
  - name: list_notes
    default: true
  - name: create_note
    default: false
  - name: list_companies
    default: true
  - name: list_users
    default: true
  - name: list_objectives
    default: true
  - name: create_release
    default: false
