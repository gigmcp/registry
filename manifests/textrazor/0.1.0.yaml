schemaVersion: 1
name: textrazor
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/textrazor-mcp
  digest: sha256:754f2f1cd6410770292e7287b44c105d5bd449c630692e8b1885eb449ad83246
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.textrazor.com
credentials:
  - id: textrazor_api_key
    type: api_key
    provider: textrazor
    inject:
      header: X-TextRazor-Key
      format: "{token}"
tools:
  - name: account_info
    default: true
  - name: analyze_content
    default: true
  - name: extract_entities
    default: true
  - name: classify_text
    default: true
  - name: custom_classifier_manager
    default: false
  - name: dictionary_manager
    default: false
