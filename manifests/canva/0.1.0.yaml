schemaVersion: 1
name: canva
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/canva-mcp
  digest: sha256:20d12a8d94eaed30ff63fd26bef3ab876448d47a348b7479217b30b476c420ed
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.canva.com
credentials:
  - id: canva_token
    type: oauth2
    provider: canva
    scopes: [design:meta:read, design:content:read, design:content:write, asset:read, folder:read]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_designs
    default: true
  - name: get_design
    default: true
  - name: create_design
    default: false
  - name: create_design_export_job
    default: false
  - name: get_export_job_result
    default: true
  - name: create_asset_upload_job
    default: false
  - name: get_asset
    default: true
  - name: list_folder_items
    default: true
  - name: create_folder
    default: false
  - name: get_current_user
    default: true
