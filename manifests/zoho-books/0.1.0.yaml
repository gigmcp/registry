schemaVersion: 1
name: zoho-books
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/zoho-books-mcp
  digest: sha256:3386b865c524fc41ce044f42119c61c186c7f184112af5a41ae3b133446ee988
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: Zoho Books
category: finance
entitlements:
  egress:
    # Zoho Books REST API (multi-DC: zohoapis.com/.eu/.in served via subdomains)
    # plus the accounts host for OAuth token refresh.
    - www.zohoapis.com
    - "*.zohoapis.com"
    - accounts.zoho.com
credentials:
  - id: zoho-books_token
    type: oauth2
    provider: zoho-books
    vendor: zoho
    scopes: [ZohoBooks.invoices.READ, ZohoBooks.contacts.READ, ZohoBooks.expenses.READ, ZohoBooks.invoices.CREATE, ZohoBooks.customerpayments.CREATE]
    inject:
      header: Authorization
      format: "Zoho-oauthtoken {token}"
tools:
  - name: list_invoices
    default: true
  - name: get_invoice
    default: true
  - name: list_contacts
    default: true
  - name: list_expenses
    default: true
  - name: list_bills
    default: true
  - name: list_chart_of_accounts
    default: true
  - name: create_invoice
    default: false
  - name: create_contact
    default: false
  - name: create_expense
    default: false
  - name: create_customer_payment
    default: false
