schemaVersion: 1
name: shortcut
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/shortcut-mcp
  digest: sha256:f4abdcfb8509fbd51fa889064267d9d340c0af6f6aefbb51e221175add481422
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    # Shortcut (formerly Clubhouse) REST API v3.
    - api.app.shortcut.com
credentials:
  - id: shortcut_api_key
    type: api_key
    provider: shortcut
    inject:
      header: Shortcut-Token
      format: "{token}"
tools:
  - name: get_story
    default: true
  - name: search_stories
    default: true
  - name: list_epics
    default: true
  - name: get_epic
    default: true
  - name: list_iterations
    default: true
  - name: list_members
    default: true
  - name: create_story
    default: false
  - name: update_story
    default: false
  - name: create_epic
    default: false
  - name: delete_story
    default: false
