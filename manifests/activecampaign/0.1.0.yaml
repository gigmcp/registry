schemaVersion: 1
name: activecampaign
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/activecampaign-mcp
  digest: sha256:e04bfda3b1899c347f5e2a8c213bbde24712a5516de36bab227c6a074c5bd7ba
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - "*.api-us1.com"
credentials:
  - id: activecampaign_api_key
    type: api_key
    provider: activecampaign
    inject:
      header: Api-Token
      format: "{token}"
tools:
  - name: list_contacts
    default: true
  - name: list_deals
    default: true
  - name: list_campaigns
    default: true
  - name: list_tags
    default: true
  - name: create_or_update_contact
    default: false
  - name: add_contact_to_list
    default: false
  - name: add_tag_to_contact
    default: false
  - name: create_campaign
    default: false
  - name: delete_contact
    default: false
