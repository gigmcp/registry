schemaVersion: 1
name: coinmarketcal
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/coinmarketcal-mcp
  digest: sha256:8f650b2cb3a9a254cd655eed5b4702425ee63498e10a766bc5872bc4fd0e3727
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - developers.coinmarketcal.com
credentials:
  - id: coinmarketcal_api_key
    type: api_key
    provider: coinmarketcal
    inject:
      header: x-api-key
      format: "{token}"
tools:
  - name: list_events
    default: true
  - name: list_coins
    default: true
  - name: list_event_categories
    default: true
  - name: get_coin_events
    default: true
  - name: search_events
    default: true
  - name: list_trending_events
    default: true
