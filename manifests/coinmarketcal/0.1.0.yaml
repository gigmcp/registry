schemaVersion: 1
name: coinmarketcal
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/coinmarketcal-mcp
  digest: sha256:9395943afc52624ab72c7392d679fef0ce3e91274bbf5028c1dd8945d3b891cc
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - developers.coinmarketcal.com
credentials:
  - id: coinmarketcal_api_key
    type: api_key
    provider: coinmarketcal
    inject:
      header: x-api-key
      format: "{token}"
tools:
  - name: list_events
    default: true
  - name: list_coins
    default: true
  - name: list_event_categories
    default: true
  - name: get_coin_events
    default: true
  - name: search_events
    default: true
  - name: list_trending_events
    default: true
