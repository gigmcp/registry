schemaVersion: 1
name: coinbase
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/coinbase-mcp
  digest: sha256:b547e1c540a2c530c489cb0f6ded89ef00f06ec9b4d537583082a7925e4ebea3
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.coinbase.com
    - api.exchange.coinbase.com
credentials:
  - id: coinbase_api_key
    type: api_key
    provider: coinbase
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_market_products
    default: true
  - name: get_product_details
    default: true
  - name: get_product_order_book
    default: true
  - name: list_product_candles
    default: true
  - name: get_public_market_trades
    default: true
  - name: list_all_known_currencies
    default: true
  - name: get_server_time
    default: true
  - name: list_wallets
    default: true
  - name: get_daily_trading_volume
    default: true
