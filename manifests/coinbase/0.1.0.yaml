schemaVersion: 1
name: coinbase
version: 0.1.0
source:
  repo: github.com/gigmcp/coinbase-mcp
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/coinbase-mcp
  # PLACEHOLDER until build-images CI emits the real digest — see README.
  digest: sha256:67683bd0d5312f9f4d0ab5eb124e5a2b86383efb17fcc11c3e9db6a03aaf63bd
  entrypoint: /app/server
tier: sealed
entitlements:
  egress:
    - api.coinbase.com
    - api.exchange.coinbase.com
credentials:
  - id: coinbase_api_key
    type: api_key
    provider: coinbase
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_market_products
    default: true
  - name: get_product_details
    default: true
  - name: get_product_order_book
    default: true
  - name: list_product_candles
    default: true
  - name: get_public_market_trades
    default: true
  - name: list_all_known_currencies
    default: true
  - name: get_server_time
    default: true
  - name: list_wallets
    default: true
  - name: get_daily_trading_volume
    default: true
