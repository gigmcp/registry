schemaVersion: 1
name: linkhut
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/linkhut-mcp
  digest: sha256:fe14125d2ac55065dfa84f3ea33eff0efed248b0e94dc2a263c8b22898090f9f
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.ln.ht
    - ln.ht
credentials:
  - id: linkhut_token
    type: oauth2
    provider: linkhut
    vendor: linkhut
    scopes: [posts:read, posts:write, tags:read]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_bookmarks
    default: true
  - name: get_all_tags
    default: true
  - name: get_recent_bookmarks
    default: true
  - name: add_bookmark
    default: false
  - name: update_bookmark
    default: false
  - name: delete_bookmark
    default: false
