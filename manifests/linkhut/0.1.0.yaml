schemaVersion: 1
name: linkhut
version: 0.1.0
source:
  repo: github.com/gigmcp/linkhut-mcp
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/linkhut-mcp
  # PLACEHOLDER until build-images CI emits the real digest — see README.
  digest: sha256:35a490888c8c9461c7afdaf5d4d97e2bb155d14f88c728c034847d895c3786fc
  entrypoint: /app/server
tier: sealed
entitlements:
  egress:
    - api.ln.ht
    - ln.ht
credentials:
  - id: linkhut_token
    type: oauth2
    provider: linkhut
    scopes: [posts:read, posts:write, tags:read]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_bookmarks
    default: true
  - name: get_all_tags
    default: true
  - name: get_recent_bookmarks
    default: true
  - name: add_bookmark
    default: false
  - name: update_bookmark
    default: false
  - name: delete_bookmark
    default: false
