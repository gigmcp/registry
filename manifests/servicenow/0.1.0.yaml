schemaVersion: 1
name: servicenow
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/servicenow-mcp
  digest: sha256:5527207d844dd9bbbc9c0ad044c8c5dcb08b2d1c22085c7c9df4ad21356b880f
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - "*.service-now.com"
credentials:
  - id: servicenow_token
    type: oauth2
    provider: servicenow
    scopes: [useraccount]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_table_records
    default: true
  - name: get_record_by_sys_id
    default: true
  - name: create_a_record
    default: false
  - name: update_a_record
    default: false
  - name: delete_a_record
    default: false
  - name: create_incident
    default: false
  - name: create_sn_chg_rest_change
    default: false
  - name: attach_file_to_record
    default: false
  - name: create_interaction
    default: false
