schemaVersion: 1
name: miro
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/miro-mcp
  digest: sha256:5be0ca2df3f492bd37ac5a670b8379fac45560d068e3276c3a5fd338ce98cbad
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: Miro
category: design
icon: icons/miro.svg
entitlements:
  egress:
    - api.miro.com
credentials:
  - id: miro_token
    type: oauth2
    provider: miro
    vendor: miro
    scopes: [boards:read, boards:write, identity:read]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_boards
    default: true
  - name: get_specific_board
    default: true
  - name: get_board_items
    default: true
  - name: get_board_members
    default: true
  - name: get_specific_item
    default: true
  - name: create_board
    default: false
  - name: create_sticky_note_item
    default: false
  - name: create_card_item
    default: false
  - name: update_board
    default: false
  - name: delete_item
    default: false
