schemaVersion: 1
name: fomo
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/fomo-mcp
  digest: sha256:4bdbc04751566abe4c970f4de29689c4a8526145da648c0ef08156cf9f827da8
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.fomo.com
credentials:
  - id: fomo_api_key
    type: api_key
    provider: fomo
    inject:
      header: Authorization
      format: "Token {token}"
tools:
  - name: list_events
    default: true
  - name: get_fomo_event
    default: true
  - name: search_event
    default: true
  - name: get_statistics
    default: true
  - name: create_fomo_event
    default: false
  - name: update_event
    default: false
  - name: delete_fomo_event
    default: false
  - name: create_fomo_template
    default: false
  - name: update_application
    default: false
