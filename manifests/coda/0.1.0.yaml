schemaVersion: 1
name: coda
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/coda-mcp
  digest: sha256:199a917627fbfcf0510841dd59b1c2a9cc91d0711c2409d310bdd980d71da76d
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: Coda
category: productivity
icon: icons/coda.svg
entitlements:
  egress:
    - coda.io
credentials:
  - id: coda_api_key
    type: api_key
    provider: coda
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_docs
    default: true
  - name: get_doc
    default: true
  - name: list_pages
    default: true
  - name: list_tables
    default: true
  - name: list_rows
    default: true
  - name: get_row
    default: true
  - name: upsert_rows
    default: false
  - name: delete_rows
    default: false
  - name: create_doc
    default: false
  - name: list_permissions
    default: true
