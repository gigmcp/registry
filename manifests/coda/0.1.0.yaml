schemaVersion: 1
name: coda
version: 0.1.0
source:
  repo: github.com/gigmcp/coda-mcp
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/coda-mcp
  # PLACEHOLDER until build-images CI emits the real digest — see README.
  digest: sha256:23e91edff1485321ce5c587b484b949d0caf9a5490dada810ff8f485b5f1698e
  entrypoint: /app/server
tier: sealed
entitlements:
  egress:
    - coda.io
credentials:
  - id: coda_api_key
    type: api_key
    provider: coda
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_docs
    default: true
  - name: get_doc
    default: true
  - name: list_pages
    default: true
  - name: list_tables
    default: true
  - name: list_rows
    default: true
  - name: get_row
    default: true
  - name: upsert_rows
    default: false
  - name: delete_rows
    default: false
  - name: create_doc
    default: false
  - name: list_permissions
    default: true
