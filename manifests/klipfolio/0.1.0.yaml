schemaVersion: 1
name: klipfolio
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/klipfolio-mcp
  digest: sha256:4e85578436c3c67058c975d143c86a5762e262b2f725f56879ed3aa4d52d718a
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - app.klipfolio.com
credentials:
  - id: klipfolio_api_key
    type: api_key
    provider: klipfolio
    inject:
      header: kf-api-key
      format: "{token}"
tools:
  - name: list_users
    default: true
  - name: list_groups
    default: true
  - name: list_data_sources
    default: true
  - name: get_dashboard_details
    default: true
  - name: get_klips
    default: true
  - name: get_data_source_instance_data
    default: true
  - name: create_user
    default: false
  - name: create_data_source
    default: false
  - name: refresh_data_source_instance
    default: false
  - name: update_user_properties
    default: false
