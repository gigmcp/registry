schemaVersion: 1
name: workiom
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/workiom-mcp
  digest: sha256:db3196a155312943bb9a1b8a1e7b71e95ad9c4a3866a7be75fdde74f441facc2
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    # Workiom serves its REST API per-tenant (<workspace>.workiom.com/api).
    - workiom.com
    - "*.workiom.com"
credentials:
  - id: workiom_api_key
    type: api_key
    provider: workiom
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_all_apps
    default: true
  - name: get_all_lists
    default: true
  - name: get_records
    default: true
  - name: get_record
    default: true
  - name: create_record
    default: false
  - name: update_record
    default: false
  - name: delete_record
    default: false
