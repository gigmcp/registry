schemaVersion: 1
name: wrike
version: 0.1.0
source:
  repo: github.com/gigmcp/wrike-mcp
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/wrike-mcp
  # PLACEHOLDER until build-images CI emits the real digest — see README.
  digest: sha256:de36bdeba9dfba86a054e1868b0a94d64b000e5048e72f6cedb08c2fc3b8e10f
  entrypoint: /app/server
tier: sealed
entitlements:
  egress:
    - www.wrike.com
    - "*.wrike.com"
credentials:
  - id: wrike_token
    type: oauth2
    provider: wrike
    scopes: [Default, wsReadWrite]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_tasks
    default: true
  - name: get_folders
    default: true
  - name: get_contacts
    default: true
  - name: get_timelogs
    default: true
  - name: create_task
    default: false
  - name: create_folder
    default: false
  - name: create_comment
    default: false
  - name: delete_task
    default: false
