schemaVersion: 1
name: wrike
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/wrike-mcp
  digest: sha256:ab336ba7b5f71625ed042c72c2a6a750e239aa6540d1bfb4306233688a7c3cde
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: Wrike
category: productivity
icon: icons/wrike.svg
entitlements:
  egress:
    - www.wrike.com
    - "*.wrike.com"
credentials:
  - id: wrike_token
    type: oauth2
    provider: wrike
    vendor: wrike
    scopes: [Default, wsReadWrite]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_tasks
    default: true
  - name: get_folders
    default: true
  - name: get_contacts
    default: true
  - name: get_timelogs
    default: true
  - name: create_task
    default: false
  - name: create_folder
    default: false
  - name: create_comment
    default: false
  - name: delete_task
    default: false
