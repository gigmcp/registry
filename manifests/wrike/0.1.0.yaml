schemaVersion: 1
name: wrike
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/wrike-mcp
  digest: sha256:3037ac6bab733e74171cd2b34bea71f87eaa7eff12fb4fb8eda4bffc2e9000aa
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - www.wrike.com
    - "*.wrike.com"
credentials:
  - id: wrike_token
    type: oauth2
    provider: wrike
    scopes: [Default, wsReadWrite]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_tasks
    default: true
  - name: get_folders
    default: true
  - name: get_contacts
    default: true
  - name: get_timelogs
    default: true
  - name: create_task
    default: false
  - name: create_folder
    default: false
  - name: create_comment
    default: false
  - name: delete_task
    default: false
