schemaVersion: 1
name: formcarry
version: 0.1.0
baseUrl: https://formcarry.com
tools:
  - name: verify_auth
    description: Verify that the API key is valid and authentication is working
    method: GET
    path: /api/auth

  - name: list_forms
    description: List all forms in the account
    method: GET
    path: /api/form

  - name: get_form
    description: Retrieve details of a specific form by its ID
    method: GET
    path: /api/form/{formId}
    params:
      - {name: formId, in: path, type: string, required: true, description: Unique identifier of the form}

  - name: retrieve_submissions
    description: Retrieve paginated submissions for a specific form
    method: GET
    path: /api/form/{formId}/submissions
    params:
      - {name: formId, in: path, type: string, required: true, description: Unique identifier of the form}
      - {name: limit, in: query, type: integer, description: "Number of submissions per page (default 25, max 50)"}
      - {name: page, in: query, type: integer, description: "Page number for pagination (default 1)"}
      - {name: sort, in: query, type: string, description: "Sort field and order, e.g. createdAt:-1 for descending"}
      - {name: filter, in: query, type: string, description: "Comma-separated filters, e.g. spam:false or date:7"}

  - name: create_form
    description: Create a new form with optional notification and webhook settings
    method: PUT
    path: /api/form
    encoding: form
    params:
      - {name: name, in: body, type: string, required: true, description: Name identifier for the form}
      - {name: email, in: body, type: string, description: Recipient email address for submission notifications}
      - {name: returnUrl, in: body, type: string, description: URL to redirect to after successful submission}
      - {name: failUrl, in: body, type: string, description: URL to redirect to after failed submission}
      - {name: webhook, in: body, type: string, description: Webhook URL to receive submission payloads}

  - name: delete_form
    description: Permanently delete a form by its ID
    method: DELETE
    path: /api/form/{formId}
    params:
      - {name: formId, in: path, type: string, required: true, description: Unique identifier of the form to delete}
