schemaVersion: 1
name: formcarry
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/formcarry-mcp
  digest: sha256:56cb25bd8cb02d945c189163eb364b8e55c4e372c6123ebca498ecaf5976a3d2
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: Formcarry
category: dev-tools
entitlements:
  egress:
    - formcarry.com
credentials:
  - id: formcarry_api_key
    type: api_key
    provider: formcarry
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: verify_auth
    default: true
  - name: list_forms
    default: true
  - name: get_form
    default: true
  - name: retrieve_submissions
    default: true
  - name: create_form
    default: false
  - name: delete_form
    default: false
