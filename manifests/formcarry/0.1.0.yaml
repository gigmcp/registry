schemaVersion: 1
name: formcarry
version: 0.1.0
source:
  repo: github.com/gigmcp/formcarry-mcp
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/formcarry-mcp
  # PLACEHOLDER until build-images CI emits the real digest — see README.
  digest: sha256:b962618e8f6ec7b184395fb4ded5ec38642e040078105b5d29ccfb115f8006f3
  entrypoint: /app/server
tier: sealed
entitlements:
  egress:
    - formcarry.com
credentials:
  - id: formcarry_api_key
    type: api_key
    provider: formcarry
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: verify_auth
    default: true
  - name: list_forms
    default: true
  - name: get_form
    default: true
  - name: retrieve_submissions
    default: true
  - name: create_form
    default: false
  - name: delete_form
    default: false
