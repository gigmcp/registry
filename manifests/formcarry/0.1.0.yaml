schemaVersion: 1
name: formcarry
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/formcarry-mcp
  digest: sha256:88686b73b1e55af357d720d6fed404ceb18cd897772accc8e2614318215e1303
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - formcarry.com
credentials:
  - id: formcarry_api_key
    type: api_key
    provider: formcarry
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: verify_auth
    default: true
  - name: list_forms
    default: true
  - name: get_form
    default: true
  - name: retrieve_submissions
    default: true
  - name: create_form
    default: false
  - name: delete_form
    default: false
