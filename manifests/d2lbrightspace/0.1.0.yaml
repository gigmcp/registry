schemaVersion: 1
name: d2lbrightspace
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/d2lbrightspace-mcp
  digest: sha256:b0f269d858dbffd26ed116dd53f953e51fcf7ec95b67a5a777054b77de136913
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: D2L Brightspace
category: productivity
icon: icons/d2lbrightspace.svg
entitlements:
  egress:
    # D2L Brightspace LMS: OAuth host plus tenant-specific API hosts.
    - auth.brightspace.com
    - "*.brightspace.com"
credentials:
  - id: d2lbrightspace_token
    type: oauth2
    provider: d2lbrightspace
    vendor: d2lbrightspace
    scopes: [users:userdata:read, orgunits:course:read, grades:gradeobjects:read, quizzing:quizzes:read, orgunits:course:create]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_users
    default: true
  - name: get_user
    default: true
  - name: get_course_offering
    default: true
  - name: get_quizzes
    default: true
  - name: get_grade_objects
    default: true
  - name: get_quiz_attempts
    default: true
  - name: create_course_offering
    default: false
  - name: create_quiz
    default: false
  - name: update_grade_object
    default: false
  - name: delete_course
    default: false
