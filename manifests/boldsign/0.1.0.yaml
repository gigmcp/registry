schemaVersion: 1
name: boldsign
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/boldsign-mcp
  digest: sha256:2594b1aa8af58bf1814e06a46e17b023cc44e539e4c2b128fbb9b3205c28a147
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: BoldSign
category: documents
icon: icons/boldsign.svg
entitlements:
  egress:
    - api.boldsign.com
credentials:
  - id: boldsign_token
    type: oauth2
    provider: boldsign
    vendor: boldsign
    scopes: [BoldSign.Documents.All, BoldSign.Templates.Read, BoldSign.Users.Read]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_documents
    default: true
  - name: list_team_documents
    default: true
  - name: list_brands
    default: true
  - name: get_brand_details
    default: true
  - name: get_api_credits_count
    default: true
  - name: send_document
    default: false
  - name: extend_document_expiry
    default: false
  - name: create_embedded_request_link
    default: false
  - name: remove_document_authentication
    default: false
