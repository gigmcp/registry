schemaVersion: 1
name: boldsign
version: 0.1.0
source:
  repo: github.com/gigmcp/boldsign-mcp
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/boldsign-mcp
  # PLACEHOLDER until build-images CI emits the real digest — see README.
  digest: sha256:bb3869b29d353783f997bcae0b071a824a9b18e5b307e187785d87f1bb58d73b
  entrypoint: /app/server
tier: sealed
entitlements:
  egress:
    - api.boldsign.com
credentials:
  - id: boldsign_token
    type: oauth2
    provider: boldsign
    scopes: [BoldSign.Documents.All, BoldSign.Templates.Read, BoldSign.Users.Read]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_documents
    default: true
  - name: list_team_documents
    default: true
  - name: list_brands
    default: true
  - name: get_brand_details
    default: true
  - name: get_api_credits_count
    default: true
  - name: send_document
    default: false
  - name: extend_document_expiry
    default: false
  - name: create_embedded_request_link
    default: false
  - name: remove_document_authentication
    default: false
