schemaVersion: 1
name: wakatime
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/wakatime-mcp
  digest: sha256:4f9f0bf086f5305303d74d4175766a577348377b6efd625b482f1237233039b2
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: WakaTime
category: dev-tools
entitlements:
  egress:
    - api.wakatime.com
    - wakatime.com
credentials:
  - id: wakatime_token
    type: oauth2
    provider: wakatime
    vendor: wakatime
    scopes: [email, read_stats, read_summaries, read_goals]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_user_details
    default: true
  - name: get_user_stats
    default: true
  - name: get_user_summaries
    default: true
  - name: get_all_time_since_today
    default: true
  - name: list_goals
    default: true
  - name: list_user_projects
    default: true
  - name: list_machine_names
    default: true
  - name: list_leaders
    default: true
