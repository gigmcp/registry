schemaVersion: 1
name: baserow
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/baserow-mcp
  digest: sha256:8f790a804effc5a9ebfccc094457e42c099823a507eeb70348ff896b22b20bd5
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.baserow.io
credentials:
  - id: baserow_token
    type: api_key
    provider: baserow
    inject:
      header: Authorization
      format: "Token {token}"
tools:
  - name: list_databases
    default: true
  - name: list_tables
    default: true
  - name: list_templates
    default: true
  - name: get_form_view_metadata
    default: true
  - name: get_settings
    default: true
  - name: list_application_user_sources
    default: true
  - name: create_user
    default: false
  - name: send_password_reset_email
    default: false
