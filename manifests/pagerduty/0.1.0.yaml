schemaVersion: 1
name: pagerduty
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/pagerduty-mcp
  digest: sha256:daa2df1170d3457fea3e71436a5849d13f7d56ea8f2056f51e5c5cb8642e2b41
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.pagerduty.com
credentials:
  - id: pagerduty_token
    type: oauth2
    provider: pagerduty
    scopes: [incidents.read, incidents.write, services.read, schedules.read, users.read]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_incidents
    default: true
  - name: get_incident
    default: true
  - name: create_incident
    default: false
  - name: list_services
    default: true
  - name: list_oncalls
    default: true
  - name: list_schedules
    default: true
  - name: list_users
    default: true
  - name: create_escalation_policy
    default: false
  - name: create_status_page_post
    default: false
