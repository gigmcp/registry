schemaVersion: 1
name: browserbase
version: 0.1.0
baseUrl: https://api.browserbase.com
tools:
  - name: list_projects
    description: List all projects in the Browserbase account
    method: GET
    path: /v1/projects
  - name: get_project
    description: Retrieve details for a specific project by ID
    method: GET
    path: /v1/projects/{id}
    params:
      - {name: id, in: path, type: string, required: true, description: The project identifier}
  - name: get_project_usage
    description: Get usage metrics (browser minutes, proxy bytes) for a project
    method: GET
    path: /v1/projects/{id}/usage
    params:
      - {name: id, in: path, type: string, required: true, description: The project identifier}
  - name: list_sessions
    description: List browser sessions, optionally filtered by status or metadata query
    method: GET
    path: /v1/sessions
    params:
      - {name: status, in: query, type: string, description: "Filter by session status: PENDING, RUNNING, ERROR, TIMED_OUT, or COMPLETED"}
      - {name: q, in: query, type: string, description: Query sessions by user metadata}
  - name: get_session
    description: Retrieve details for a specific browser session by ID
    method: GET
    path: /v1/sessions/{id}
    params:
      - {name: id, in: path, type: string, required: true, description: The session identifier}
  - name: get_session_logs
    description: Retrieve CDP and network logs for a browser session
    method: GET
    path: /v1/sessions/{id}/logs
    params:
      - {name: id, in: path, type: string, required: true, description: The session identifier}
  - name: get_session_downloads
    description: List files downloaded during a browser session
    method: GET
    path: /v1/downloads
    params:
      - {name: sessionId, in: query, type: string, required: true, description: Filter downloads by session ID}
      - {name: filename, in: query, type: string, description: Filter by exact filename match}
      - {name: mimeType, in: query, type: string, description: Filter by MIME type}
      - {name: limit, in: query, type: integer, description: "Maximum number of results to return (default 20, max 100)"}
      - {name: offset, in: query, type: integer, description: Number of results to skip for pagination}
  - name: create_browser_session
    description: Create a new browser session with optional project, timeout, proxies, and browser settings
    method: POST
    path: /v1/sessions
    params:
      - {name: projectId, in: body, type: string, description: The project ID to associate with the session}
      - {name: timeout, in: body, type: integer, description: Session timeout in seconds}
      - {name: keepAlive, in: body, type: boolean, description: Keep the session alive after disconnection}
      - {name: region, in: body, type: string, description: "Region for the session (e.g. us-west-2)"}
      - {name: proxies, in: body, type: boolean, description: Enable default proxies for the session}
      - {name: browserSettings, in: body, type: object, description: "Advanced browser settings (viewport, blockAds, solveCaptchas, recordSession, etc.)"}
      - {name: userMetadata, in: body, type: object, description: Arbitrary metadata to attach to the session for later querying}
  - name: update_session
    description: "Request early release of an active session (status: REQUEST_RELEASE)"
    method: POST
    path: /v1/sessions/{id}
    params:
      - {name: id, in: path, type: string, required: true, description: The session identifier}
      - {name: status, in: body, type: string, required: true, description: "Must be REQUEST_RELEASE to signal the session should complete"}
  - name: create_context
    description: Create a persistent browser context to reuse cookies and storage across sessions
    method: POST
    path: /v1/contexts
    params:
      - {name: projectId, in: body, type: string, description: The project ID to associate with the context}
