schemaVersion: 1
name: browserbase
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/browserbase-mcp
  digest: sha256:aa33be6fc37655412f456f20cd8da6181faa58174934ee607615286276536de1
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: Browserbase
category: ai
icon: icons/browserbase.svg
entitlements:
  egress:
    - api.browserbase.com
credentials:
  - id: browserbase_api_key
    type: api_key
    provider: browserbase
    inject:
      header: X-BB-API-Key
      format: "{token}"
tools:
  - name: list_projects
    default: true
  - name: get_project
    default: true
  - name: get_project_usage
    default: true
  - name: list_sessions
    default: true
  - name: get_session
    default: true
  - name: get_session_logs
    default: true
  - name: get_session_downloads
    default: true
  - name: create_browser_session
    default: false
  - name: update_session
    default: false
  - name: create_context
    default: false
