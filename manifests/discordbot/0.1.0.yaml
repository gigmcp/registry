schemaVersion: 1
name: discordbot
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/discordbot-mcp
  digest: sha256:ed9fc84a6c36df853977120ad27c47b40616237eb5c1894bb00bad54b362b425
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: Discord Bot
category: comms
icon: icons/discordbot.svg
entitlements:
  egress:
    - discord.com
    - cdn.discordapp.com
credentials:
  - id: discordbot_token
    type: api_key
    provider: discordbot
    inject:
      header: Authorization
      format: "Bot {token}"
tools:
  - name: get_guild
    default: true
  - name: get_channel
    default: true
  - name: get_message
    default: true
  - name: get_guild_member
    default: true
  - name: create_message
    default: false
  - name: create_guild_channel
    default: false
  - name: create_thread
    default: false
  - name: add_guild_member_role
    default: false
  - name: delete_message
    default: false
