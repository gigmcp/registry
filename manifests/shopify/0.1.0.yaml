schemaVersion: 1
name: shopify
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/shopify-mcp
  digest: sha256:043a01c20034e9a91782e4158cdf0ad8ac3f8df1ee38aab736cbc6d7a2a45a9a
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - "*.myshopify.com"
credentials:
  - id: shopify_token
    type: oauth2
    provider: shopify
    scopes: [read_products, write_products, read_orders, read_customers]
    inject:
      header: X-Shopify-Access-Token
      format: "{token}"
tools:
  - name: list_orders
    default: true
  - name: get_order
    default: true
  - name: create_order
    default: false
  - name: cancel_order
    default: false
  - name: list_products
    default: true
  - name: create_product
    default: false
  - name: get_customer
    default: true
  - name: create_customer
    default: false
  - name: count_products
    default: true
  - name: create_discount_code
    default: false
