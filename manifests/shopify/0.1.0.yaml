schemaVersion: 1
name: shopify
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/shopify-mcp
  digest: sha256:55056acc4cb964aab1e0b95283598541c974a1568320fa5b638c6ae9da1803a9
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: Shopify
category: e-commerce
icon: icons/shopify.svg
entitlements:
  egress:
    - "*.myshopify.com"
credentials:
  - id: shopify_token
    type: oauth2
    provider: shopify
    vendor: shopify
    scopes: [read_products, write_products, read_orders, read_customers]
    inject:
      header: X-Shopify-Access-Token
      format: "{token}"
tools:
  - name: list_orders
    default: true
  - name: get_order
    default: true
  - name: create_order
    default: false
  - name: cancel_order
    default: false
  - name: list_products
    default: true
  - name: create_product
    default: false
  - name: get_customer
    default: true
  - name: create_customer
    default: false
  - name: count_products
    default: true
  - name: create_discount_code
    default: false
