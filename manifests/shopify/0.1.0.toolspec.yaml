schemaVersion: 1
name: shopify
version: 0.1.0
# Shopify is a per-merchant SaaS: each store lives at <store>.myshopify.com.
# The baseUrl below uses a representative subdomain that satisfies the *.myshopify.com
# egress allowlist; the runtime engine substitutes the actual store domain.
baseUrl: https://yourstore.myshopify.com
tools:
  - name: list_orders
    description: Retrieve a list of orders for the shop, optionally filtered by status and other criteria
    method: GET
    path: /admin/api/2026-01/orders.json
    params:
      - {name: status, in: query, type: string, description: "Filter by order status: open, closed, cancelled, or any (default open)"}
      - {name: financial_status, in: query, type: string, description: "Filter by payment status: pending, authorized, partially_paid, paid, partially_refunded, refunded, or voided"}
      - {name: fulfillment_status, in: query, type: string, description: "Filter by fulfillment status: shipped, partial, unshipped, any, or unfulfilled"}
      - {name: limit, in: query, type: integer, description: "Maximum number of results to return per page (default 50, max 250)"}
      - {name: since_id, in: query, type: integer, description: "Return only orders with ID greater than this value"}
      - {name: created_at_min, in: query, type: string, description: "Show orders created at or after this ISO 8601 datetime"}
      - {name: created_at_max, in: query, type: string, description: "Show orders created at or before this ISO 8601 datetime"}
      - {name: updated_at_min, in: query, type: string, description: "Show orders updated at or after this ISO 8601 datetime"}
      - {name: fields, in: query, type: string, description: "Comma-separated list of fields to include in the response"}

  - name: get_order
    description: Retrieve a single order by its ID
    method: GET
    path: /admin/api/2026-01/orders/{order_id}.json
    params:
      - {name: order_id, in: path, type: integer, required: true, description: "Numeric ID of the order to retrieve"}
      - {name: fields, in: query, type: string, description: "Comma-separated list of fields to include in the response"}

  - name: create_order
    description: Create a new order in the shop
    method: POST
    path: /admin/api/2026-01/orders.json
    params:
      - {name: order, in: body, type: object, required: true, description: "Order object containing at minimum a line_items array with variant_id and quantity"}
      - {name: send_receipt, in: body, type: boolean, description: "Whether to send an order confirmation email to the customer (default false)"}
      - {name: send_fulfillment_receipt, in: body, type: boolean, description: "Whether to send a shipping confirmation email when the order is fulfilled (default false)"}
      - {name: inventory_behaviour, in: body, type: string, description: "Inventory adjustment behaviour: bypass (default), decrement_ignoring_policy, or decrement_obeying_policy"}

  - name: cancel_order
    description: Cancel an existing order
    method: POST
    path: /admin/api/2026-01/orders/{order_id}/cancel.json
    params:
      - {name: order_id, in: path, type: integer, required: true, description: "Numeric ID of the order to cancel"}
      - {name: reason, in: body, type: string, description: "Reason for cancellation: customer, fraud, inventory, declined, or other"}
      - {name: email, in: body, type: boolean, description: "Whether to send a cancellation email to the customer (default false)"}
      - {name: refund, in: body, type: object, description: "Refund object to issue a refund when cancelling"}

  - name: list_products
    description: Retrieve a list of products in the shop
    method: GET
    path: /admin/api/2026-01/products.json
    params:
      - {name: limit, in: query, type: integer, description: "Maximum number of results per page (default 50, max 250)"}
      - {name: since_id, in: query, type: integer, description: "Return only products with ID greater than this value"}
      - {name: product_type, in: query, type: string, description: "Filter by product type"}
      - {name: collection_id, in: query, type: integer, description: "Filter by collection ID"}
      - {name: ids, in: query, type: string, description: "Comma-separated list of product IDs to retrieve"}
      - {name: fields, in: query, type: string, description: "Comma-separated list of fields to include in the response"}

  - name: create_product
    description: Create a new product in the shop
    method: POST
    path: /admin/api/2026-01/products.json
    params:
      - {name: product, in: body, type: object, required: true, description: "Product object; must include at minimum a title string"}

  - name: get_customer
    description: Retrieve a single customer by their ID
    method: GET
    path: /admin/api/2026-01/customers/{customer_id}.json
    params:
      - {name: customer_id, in: path, type: integer, required: true, description: "Numeric ID of the customer to retrieve"}
      - {name: fields, in: query, type: string, description: "Comma-separated list of fields to include in the response"}

  - name: create_customer
    description: Create a new customer record in the shop
    method: POST
    path: /admin/api/2026-01/customers.json
    params:
      - {name: customer, in: body, type: object, required: true, description: "Customer object; must include at minimum an email, or first_name and last_name"}

  - name: count_products
    description: Retrieve a count of products in the shop, optionally filtered
    method: GET
    path: /admin/api/2026-01/products/count.json
    params:
      - {name: vendor, in: query, type: string, description: "Filter count by product vendor"}
      - {name: product_type, in: query, type: string, description: "Filter count by product type"}
      - {name: collection_id, in: query, type: integer, description: "Filter count by collection ID"}
      - {name: published_status, in: query, type: string, description: "Filter by published status: published, unpublished, or any (default any)"}

  - name: create_discount_code
    description: Create a discount code under an existing price rule
    method: POST
    path: /admin/api/2026-01/price_rules/{price_rule_id}/discount_codes.json
    params:
      - {name: price_rule_id, in: path, type: integer, required: true, description: "Numeric ID of the price rule to add the discount code to"}
      - {name: discount_code, in: body, type: object, required: true, description: "Discount code object containing the code string (max 255 chars, case-insensitive)"}
