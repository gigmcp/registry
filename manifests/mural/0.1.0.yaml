schemaVersion: 1
name: mural
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/mural-mcp
  digest: sha256:77d458904c37979f380ff56a6308bdf89c3052cce333d7fcb6aafc9d0126d9d5
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - app.mural.co
credentials:
  - id: mural_token
    type: oauth2
    provider: mural
    scopes: [murals:read, murals:write, rooms:read, workspaces:read, identity:read]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_workspaces
    default: true
  - name: get_current_user
    default: true
  - name: list_rooms_in_workspace
    default: true
  - name: list_murals_in_room
    default: true
  - name: get_mural_widgets
    default: true
  - name: search_murals_in_workspace
    default: true
  - name: list_recent_templates
    default: true
  - name: create_sticky_note
    default: false
