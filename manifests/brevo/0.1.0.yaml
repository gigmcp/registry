schemaVersion: 1
name: brevo
version: 0.1.0
source:
  repo: github.com/gigmcp/brevo-mcp
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/brevo-mcp
  # PLACEHOLDER until build-images CI emits the real digest — see README.
  digest: sha256:d716c26f78ea1c3f9acfc9240ca65a2397845ca3357f04ca9bbefb7e6301d2ec
  entrypoint: /app/server
tier: sealed
entitlements:
  egress:
    - api.brevo.com
credentials:
  - id: brevo_api_key
    type: api_key
    provider: brevo
    inject:
      header: api-key
      format: "{token}"
tools:
  - name: get_account_information
    default: true
  - name: get_all_contacts
    default: true
  - name: get_contact_details
    default: true
  - name: get_contact_lists
    default: true
  - name: create_contact_list
    default: false
  - name: delete_contact
    default: false
  - name: list_email_campaigns
    default: true
  - name: update_email_campaign
    default: false
  - name: create_sms_campaign
    default: false
  - name: get_all_email_templates
    default: true
