schemaVersion: 1
name: sendgrid
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/sendgrid-mcp
  digest: sha256:ef5f2ff94302e67a0e28147f391018f8f0dfd90712046353f5854a6be74d69e1
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: SendGrid
category: marketing
entitlements:
  egress:
    - api.sendgrid.com
credentials:
  - id: sendgrid_api_key
    type: api_key
    provider: sendgrid
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: send_email
    default: false
  - name: get_contacts
    default: true
  - name: search_contacts
    default: true
  - name: add_or_update_contact
    default: false
  - name: get_contact_lists
    default: true
  - name: create_contact_list
    default: false
  - name: get_templates
    default: true
  - name: get_email_stats
    default: true
  - name: add_suppression
    default: false
