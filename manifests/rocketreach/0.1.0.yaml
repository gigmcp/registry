schemaVersion: 1
name: rocketreach
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/rocketreach-mcp
  digest: sha256:e5fed2f0f33f663ab54780882eb33e2ede8f93920dcbc2a34f6aaed4e35e2da0
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.rocketreach.co
credentials:
  - id: rocketreach_api_key
    type: api_key
    provider: rocketreach
    inject:
      header: Api-Key
      format: "{token}"
tools:
  - name: search_people
    default: true
  - name: lookup_person
    default: true
  - name: lookup_company
    default: true
  - name: lookup_person_and_company
    default: true
  - name: check_person_status
    default: true
  - name: get_company_tech_stack
    default: true
  - name: list_companies
    default: true
  - name: get_account_info
    default: true
