schemaVersion: 1
name: timecamp
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/timecamp-mcp
  digest: sha256:5e2d3d5ae5f8308f3d3b550e4620c9594081c5781f41e0d923c3550bbf13a792
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: TimeCamp
category: productivity
entitlements:
  egress:
    - app.timecamp.com
credentials:
  - id: timecamp_api_key
    type: api_key
    provider: timecamp
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_projects_list
    default: true
  - name: get_tasks
    default: true
  - name: get_time_entries
    default: true
  - name: get_users
    default: true
  - name: create_time_entry
    default: false
  - name: update_time_entry
    default: false
  - name: delete_time_entry
    default: false
  - name: create_task
    default: false
