schemaVersion: 1
name: ably
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/ably-mcp
  digest: sha256:d3a890cfc756f2d1c0f24b760bdab395d327c05582d6933a9895835e0cb4ea38
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - rest.ably.io
credentials:
  - id: ably_api_key
    type: api_key
    provider: ably
    inject:
      header: Authorization
      format: "Basic {token}"
tools:
  - name: list_channels
    default: true
  - name: get_channel_details
    default: true
  - name: get_channel_history
    default: true
  - name: get_channel_presence
    default: true
  - name: get_application_stats
    default: true
  - name: publish_message_to_channel
    default: false
  - name: batch_publish_messages
    default: false
  - name: publish_push_notification
    default: false
  - name: list_registered_push_devices
    default: true
  - name: get_service_time
    default: true
