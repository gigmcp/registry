schemaVersion: 1
name: yandex
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/yandex-mcp
  digest: sha256:269e723d99cfe9f205c9b4faa57d157d19c698f316ebbe570a3bbdaac5edf0f0
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - cloud-api.yandex.net
    - api.music.yandex.net
    - api-metrika.yandex.net
credentials:
  - id: yandex_token
    type: oauth2
    provider: yandex
    scopes: [cloud_api:disk.read, cloud_api:disk.info, metrika:read]
    inject:
      header: Authorization
      format: "OAuth {token}"
tools:
  - name: get_account_status
    default: true
  - name: get_music_genres
    default: true
  - name: get_yandex_music_stations_list
    default: true
  - name: get_public_resource_metadata
    default: true
  - name: get_public_resource_download_link
    default: true
  - name: list_goals
    default: true
  - name: list_filters
    default: true
  - name: list_counter_grants
    default: true
  - name: list_log_requests
    default: true
