schemaVersion: 1
name: datadog
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/datadog-mcp
  digest: sha256:bbbea6ea7ea413d710cd6568d12c8c724a7b869be8813e54662552d8b191a0a1
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.datadoghq.com
    - "*.datadoghq.com"
credentials:
  - id: datadog_api_key
    type: api_key
    provider: datadog
    inject:
      header: DD-API-KEY
      format: "{token}"
tools:
  - name: list_dashboards
    default: true
  - name: get_dashboard
    default: true
  - name: list_monitors
    default: true
  - name: create_monitor
    default: false
  - name: mute_monitor
    default: false
  - name: query_metrics
    default: true
  - name: submit_metrics
    default: false
  - name: search_logs
    default: true
  - name: list_incidents
    default: true
  - name: list_hosts
    default: true
