schemaVersion: 1
name: stack-exchange
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/stack-exchange-mcp
  digest: sha256:2a4187fbc2e99b14705bbd15b9be8c05d79096488bc52e332cbe772c0cf0ed5d
  entrypoint: /app/server
  builder: toolpack
tier: entrusted
entitlements:
  egress:
    - api.stackexchange.com
credentials:
  # Stack Exchange API v2.3 only accepts the OAuth access_token as a query
  # parameter (access_token=...), so header injection cannot work → entrusted.
  - id: stack_exchange_token
    type: oauth2
    provider: stack-exchange
    scopes: [read_inbox, private_info, write_access, no_expiry]
    inject:
      env: STACK_EXCHANGE_API_KEY
tools:
  - name: get_me
    default: true
  - name: get_my_questions
    default: true
  - name: get_my_answers
    default: true
  - name: get_my_reputation
    default: true
  - name: get_questions
    default: true
  - name: get_answers
    default: true
  - name: get_comments
    default: true
  - name: find_similar_questions
    default: true
  - name: get_collectives
    default: true
  - name: create_filter
    default: false
