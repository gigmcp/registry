schemaVersion: 1
name: airtable
version: 0.1.0
source:
  repo: github.com/gigmcp/airtable-mcp
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/airtable-mcp
  # PLACEHOLDER until build-images CI emits the real digest — see README.
  digest: sha256:201b807aeb78da8974f7af694b42c0c1bee9584585e69bc491ee86a0cb41f4b3
  entrypoint: /app/server
tier: sealed
entitlements:
  egress:
    - api.airtable.com
credentials:
  - id: airtable_token
    type: oauth2
    provider: airtable
    scopes: [data.records:read, data.records:write, schema.bases:read, schema.bases:write]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_bases
    default: true
  - name: get_base_schema
    default: true
  - name: list_records
    default: true
  - name: get_record
    default: true
  - name: create_records
    default: false
  - name: update_record
    default: false
  - name: delete_record
    default: false
  - name: create_table
    default: false
  - name: list_comments
    default: true
