schemaVersion: 1
name: airtable
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/airtable-mcp
  digest: sha256:bd9a97a9a2fa09c69fc0c2eb260104b9e8a9d1ac6c8687aa3abb4068f18e4d29
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.airtable.com
credentials:
  - id: airtable_token
    type: oauth2
    provider: airtable
    scopes: [data.records:read, data.records:write, schema.bases:read, schema.bases:write]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_bases
    default: true
  - name: get_base_schema
    default: true
  - name: list_records
    default: true
  - name: get_record
    default: true
  - name: create_records
    default: false
  - name: update_record
    default: false
  - name: delete_record
    default: false
  - name: create_table
    default: false
  - name: list_comments
    default: true
