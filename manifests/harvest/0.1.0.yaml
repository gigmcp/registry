schemaVersion: 1
name: harvest
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/harvest-mcp
  digest: sha256:3b41323635f7748cbff46040c0fdade42cdabb751ab79b7cf046e43ca170aa55
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: Harvest
category: productivity
icon: icons/harvest.svg
entitlements:
  egress:
    - api.harvestapp.com
    - id.getharvest.com
credentials:
  - id: harvest_token
    type: oauth2
    provider: harvest
    vendor: harvest
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_time_entries
    default: true
  - name: list_projects
    default: true
  - name: list_clients
    default: true
  - name: list_invoices
    default: true
  - name: get_company_info
    default: true
  - name: create_time_entry
    default: false
  - name: create_project
    default: false
  - name: create_invoice
    default: false
  - name: delete_time_entry
    default: false
