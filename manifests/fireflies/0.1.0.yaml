schemaVersion: 1
name: fireflies
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/fireflies-mcp
  digest: sha256:ca4ae8e812b0b866fa606e6557661aa6eb8e04105062d4c4ceb958a18f77f3c9
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: Fireflies
category: ai
icon: icons/fireflies.svg
entitlements:
  egress:
    # Fireflies.ai GraphQL API.
    - api.fireflies.ai
credentials:
  - id: fireflies_api_key
    type: api_key
    provider: fireflies
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_transcripts
    default: true
  - name: get_transcript_by_id
    default: true
  - name: get_bites
    default: true
  - name: get_users
    default: true
  - name: get_user_groups
    default: true
  - name: create_bite
    default: false
  - name: update_meeting_title
    default: false
  - name: add_to_live_meeting
    default: false
  - name: upload_audio
    default: false
  - name: delete_transcript
    default: false
