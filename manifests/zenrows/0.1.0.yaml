schemaVersion: 1
name: zenrows
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/zenrows-mcp
  digest: sha256:91dbe2d94dcfaeec6c8eaa25c8a494081c4e83d5eaa93e08b27b33b7ff0b15fb
  entrypoint: /app/server
  builder: toolpack
# ZenRows authenticates via the apikey query parameter only — there is no
# auth header on the Universal Scraper API, so the key must come in via env.
tier: entrusted
entitlements:
  egress:
    - api.zenrows.com
credentials:
  - id: zenrows_api_key
    type: api_key
    provider: zenrows
    inject:
      env: ZENROWS_API_KEY
tools:
  - name: scrape_url_html
    default: true
  - name: scrape_url_autoparse
    default: true
  - name: scrape_with_css_selectors
    default: true
  - name: get_plaintext
    default: true
  - name: screenshot_url
    default: true
  - name: get_pdf_from_url
    default: true
  - name: get_api_usage
    default: true
  - name: get_concurrency_status
    default: true
