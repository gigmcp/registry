schemaVersion: 1
name: retellai
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/retellai-mcp
  digest: sha256:0c16a1a4366396a91e7a70a07ded8edcb2863253d6ca24ec7ec3d6623bc1670f
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: Retell AI
category: ai
entitlements:
  egress:
    - api.retellai.com
credentials:
  - id: retellai_api_key
    type: api_key
    provider: retellai
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_agents
    default: true
  - name: get_agent
    default: true
  - name: create_agent
    default: false
  - name: update_agent
    default: false
  - name: retrieve_call_details
    default: true
  - name: create_outbound_phone_call
    default: false
  - name: create_web_call
    default: false
  - name: list_all_phone_numbers
    default: true
  - name: list_voices
    default: true
