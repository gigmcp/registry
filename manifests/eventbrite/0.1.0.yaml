schemaVersion: 1
name: eventbrite
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/eventbrite-mcp
  digest: sha256:8174b82bffe36dd9899ec1876691516f7a55ca6cabad8a7dbc9d2cad97a5f322
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - www.eventbriteapi.com
credentials:
  - id: eventbrite_token
    type: oauth2
    provider: eventbrite
    vendor: eventbrite
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_event
    default: true
  - name: list_organization_events
    default: true
  - name: list_event_attendees
    default: true
  - name: list_event_orders
    default: true
  - name: list_ticket_classes
    default: true
  - name: create_event
    default: false
  - name: update_event
    default: false
  - name: publish_event
    default: false
  - name: create_ticket_class
    default: false
  - name: create_discount
    default: false
