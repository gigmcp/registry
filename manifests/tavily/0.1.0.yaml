schemaVersion: 1
name: tavily
version: 0.1.0
source:
  repo: github.com/gigmcp/tavily-mcp
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/tavily-mcp
  # PLACEHOLDER until build-images CI emits the real digest — see README.
  digest: sha256:fdb6e6a1eabe0c14c2a99e6ec1cfca39ae9737aa6d8bcd896822560fe3832a48
  entrypoint: /app/server
tier: sealed
entitlements:
  egress:
    - api.tavily.com
credentials:
  - id: tavily_api_key
    type: api_key
    provider: tavily
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: search
    default: true
  - name: extract
    default: true
  - name: crawl
    default: true
  - name: map_website
    default: true
  - name: get_usage
    default: true
