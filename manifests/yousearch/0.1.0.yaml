schemaVersion: 1
name: yousearch
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/yousearch-mcp
  digest: sha256:5c3f7227112c7aa447e869e845127805bcb0533fbdab2cd756bfd301f643f749
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - ydc-index.io
    - api.ydc-index.io
    - chat-api.you.com
    - api.you.com
credentials:
  - id: yousearch_api_key
    type: api_key
    provider: yousearch
    inject:
      header: X-API-Key
      format: "{token}"
tools:
  - name: web_search
    default: true
  - name: news_search
    default: true
  - name: get_search_snippets
    default: true
  - name: smart_answer
    default: true
  - name: research_answer
    default: true
