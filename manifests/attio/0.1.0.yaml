schemaVersion: 1
name: attio
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/attio-mcp
  digest: sha256:f78ece8605d20237a94a0d68872bd3f052e7a6fb221908e5ed55252b785da89b
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: Attio
category: CRM
entitlements:
  egress:
    - api.attio.com
credentials:
  - id: attio_token
    type: oauth2
    provider: attio
    vendor: attio
    scopes: [record_permission:read-write, object_configuration:read, list_entry:read-write, note:read-write, task:read-write, user_management:read]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_records
    default: true
  - name: get_record
    default: true
  - name: list_companies
    default: true
  - name: list_notes
    default: true
  - name: list_tasks
    default: true
  - name: create_person
    default: false
  - name: create_company
    default: false
  - name: create_note
    default: false
  - name: create_task
    default: false
  - name: delete_record
    default: false
