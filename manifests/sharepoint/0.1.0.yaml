schemaVersion: 1
name: sharepoint
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/sharepoint-mcp
  digest: sha256:b509d5b2a25efe1539f043a9dcb814a3cbadfba7ca64af30b830f2668c4a6bd4
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: SharePoint
category: storage
entitlements:
  egress:
    # Microsoft Graph plus tenant SharePoint REST endpoints
    # (server-relative URL operations hit <tenant>.sharepoint.com).
    - graph.microsoft.com
    - "*.sharepoint.com"
credentials:
  - id: sharepoint_token
    type: oauth2
    provider: sharepoint
    vendor: microsoft
    scopes: [Sites.Read.All, Sites.ReadWrite.All, Files.ReadWrite.All, User.Read]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_sites
    default: true
  - name: search_query
    default: true
  - name: list_sharepoint_lists
    default: true
  - name: get_sharepoint_list_items
    default: true
  - name: list_files_in_folder
    default: true
  - name: get_sharepoint_web_info
    default: true
  - name: create_sharepoint_list_item
    default: false
  - name: update_sharepoint_list_item
    default: false
  - name: delete_sharepoint_list_item
    default: false
  - name: upload_file_to_sharepoint
    default: false
