schemaVersion: 1
name: xero
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/xero-mcp
  digest: sha256:64b37b644a3b08fa5e72256459258d25394c84193680c91057fc5c0def093267
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: Xero
category: finance
icon: icons/xero.svg
entitlements:
  egress:
    - api.xero.com
    - identity.xero.com
credentials:
  - id: xero_token
    type: oauth2
    provider: xero
    vendor: xero
    scopes: [accounting.transactions, accounting.contacts, accounting.settings, accounting.reports.read, offline_access]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_invoices
    default: true
  - name: get_invoice
    default: true
  - name: get_contacts
    default: true
  - name: list_accounts
    default: true
  - name: list_bank_transactions
    default: true
  - name: get_balance_sheet_report
    default: true
  - name: get_profit_loss_report
    default: true
  - name: create_invoice
    default: false
  - name: create_contact
    default: false
  - name: create_payment
    default: false
