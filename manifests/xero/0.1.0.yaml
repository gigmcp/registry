schemaVersion: 1
name: xero
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/xero-mcp
  digest: sha256:8583a446bc5177a8bf1fc6698153d323e7b9aa0feb870884d93b39e441c8aa86
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.xero.com
    - identity.xero.com
credentials:
  - id: xero_token
    type: oauth2
    provider: xero
    scopes: [accounting.transactions, accounting.contacts, accounting.settings, accounting.reports.read, offline_access]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_invoices
    default: true
  - name: get_invoice
    default: true
  - name: get_contacts
    default: true
  - name: list_accounts
    default: true
  - name: list_bank_transactions
    default: true
  - name: get_balance_sheet_report
    default: true
  - name: get_profit_loss_report
    default: true
  - name: create_invoice
    default: false
  - name: create_contact
    default: false
  - name: create_payment
    default: false
