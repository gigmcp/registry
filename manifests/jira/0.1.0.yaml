schemaVersion: 1
name: jira
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/jira-mcp
  digest: sha256:56f4a6c228ef3fd6a0e4ec7a69bbdd9789ef526510f602560ec3b62d2f0f415e
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    # Atlassian OAuth 2.0 (3LO) gateway plus per-site Jira Cloud REST hosts.
    - api.atlassian.com
    - "*.atlassian.net"
credentials:
  - id: jira_token
    type: oauth2
    provider: jira
    vendor: atlassian
    scopes: [read:jira-work, write:jira-work, read:jira-user, offline_access]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_issue
    default: true
  - name: search_issues
    default: true
  - name: create_issue
    default: false
  - name: edit_issue
    default: false
  - name: add_comment
    default: false
  - name: transition_issue
    default: false
  - name: get_all_projects
    default: true
  - name: find_users
    default: true
  - name: get_current_user
    default: true
