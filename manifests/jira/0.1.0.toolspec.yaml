schemaVersion: 1
name: jira
version: 0.1.0
baseUrl: https://api.atlassian.com
tools:
  - name: get_issue
    description: Get details of a Jira issue by its ID or key
    method: GET
    path: /ex/jira/{cloudId}/rest/api/3/issue/{issueIdOrKey}
    params:
      - {name: cloudId, in: path, type: string, required: true, description: "The cloud ID of the Jira site (from accessible-resources)"}
      - {name: issueIdOrKey, in: path, type: string, required: true, description: "The ID or key of the issue (e.g. PROJ-1)"}
      - {name: fields, in: query, type: string, description: "Comma-separated list of fields to return; use *all for all fields"}
      - {name: expand, in: query, type: string, description: "Comma-separated list of properties to expand (e.g. names,renderedFields,changelog)"}

  - name: search_issues
    description: Search for Jira issues using JQL (Jira Query Language)
    method: GET
    path: /ex/jira/{cloudId}/rest/api/3/search/jql
    params:
      - {name: cloudId, in: path, type: string, required: true, description: "The cloud ID of the Jira site"}
      - {name: jql, in: query, type: string, required: true, description: "JQL query string to filter issues"}
      - {name: fields, in: query, type: string, description: "Comma-separated list of fields to include in results"}
      - {name: maxResults, in: query, type: integer, description: "Maximum number of issues to return (default 50)"}
      - {name: nextPageToken, in: query, type: string, description: "Token for retrieving the next page of results"}

  - name: create_issue
    description: Create a new Jira issue in a project
    method: POST
    path: /ex/jira/{cloudId}/rest/api/3/issue
    params:
      - {name: cloudId, in: path, type: string, required: true, description: "The cloud ID of the Jira site"}
      - {name: fields, in: body, type: object, required: true, description: "Issue fields including project, issuetype, summary, description, assignee, etc."}

  - name: edit_issue
    description: Update fields of an existing Jira issue
    method: PUT
    path: /ex/jira/{cloudId}/rest/api/3/issue/{issueIdOrKey}
    params:
      - {name: cloudId, in: path, type: string, required: true, description: "The cloud ID of the Jira site"}
      - {name: issueIdOrKey, in: path, type: string, required: true, description: "The ID or key of the issue to update"}
      - {name: fields, in: body, type: object, description: "Map of field names to new values to update on the issue"}
      - {name: update, in: body, type: object, description: "Map of field names to update operations (for fields that require explicit-verb updates)"}

  - name: add_comment
    description: Add a comment to a Jira issue
    method: POST
    path: /ex/jira/{cloudId}/rest/api/3/issue/{issueIdOrKey}/comment
    params:
      - {name: cloudId, in: path, type: string, required: true, description: "The cloud ID of the Jira site"}
      - {name: issueIdOrKey, in: path, type: string, required: true, description: "The ID or key of the issue to comment on"}
      - {name: body, in: body, type: object, required: true, description: "Comment body in Atlassian Document Format (ADF) with type, version, and content fields"}

  - name: transition_issue
    description: Transition a Jira issue to a different status using a workflow transition
    method: POST
    path: /ex/jira/{cloudId}/rest/api/3/issue/{issueIdOrKey}/transitions
    params:
      - {name: cloudId, in: path, type: string, required: true, description: "The cloud ID of the Jira site"}
      - {name: issueIdOrKey, in: path, type: string, required: true, description: "The ID or key of the issue to transition"}
      - {name: transition, in: body, type: object, required: true, description: "Transition object with id field specifying the transition to apply"}
      - {name: fields, in: body, type: object, description: "Fields to update during the transition (must be on the transition screen)"}

  - name: get_all_projects
    description: Search and list all Jira projects accessible to the user
    method: GET
    path: /ex/jira/{cloudId}/rest/api/3/project/search
    params:
      - {name: cloudId, in: path, type: string, required: true, description: "The cloud ID of the Jira site"}
      - {name: query, in: query, type: string, description: "Filter projects by name or key using this search string"}
      - {name: maxResults, in: query, type: integer, description: "Maximum number of projects to return per page"}
      - {name: startAt, in: query, type: integer, description: "Index of the first project to return (for pagination)"}

  - name: find_users
    description: Search for Jira users by display name or email address
    method: GET
    path: /ex/jira/{cloudId}/rest/api/3/user/search
    params:
      - {name: cloudId, in: path, type: string, required: true, description: "The cloud ID of the Jira site"}
      - {name: query, in: query, type: string, required: true, description: "Search string matching display name or email address"}
      - {name: maxResults, in: query, type: integer, description: "Maximum number of users to return (max 1000)"}
      - {name: startAt, in: query, type: integer, description: "Index of the first user to return (for pagination)"}

  - name: get_current_user
    description: Get profile information for the currently authenticated user
    method: GET
    path: /ex/jira/{cloudId}/rest/api/3/myself
    params:
      - {name: cloudId, in: path, type: string, required: true, description: "The cloud ID of the Jira site"}
      - {name: expand, in: query, type: string, description: "Comma-separated list of properties to expand (e.g. groups,applicationRoles)"}
