schemaVersion: 1
name: klaviyo
version: 0.1.0
baseUrl: https://a.klaviyo.com
tools:
  - name: get_profiles
    description: Retrieve a paginated list of all profiles in the Klaviyo account
    method: GET
    path: /api/profiles
    params:
      - {name: filter, in: query, type: string, description: "Filter expression (e.g. equals(email,'user@example.com'))"}
      - {name: "page[cursor]", in: query, type: string, description: Cursor for pagination}
      - {name: "page[size]", in: query, type: integer, description: "Number of results per page (1-100, default 20)"}
      - {name: sort, in: query, type: string, description: "Sort field; prefix with - for descending (e.g. -created)"}

  - name: get_lists
    description: Retrieve a paginated list of all lists in the Klaviyo account
    method: GET
    path: /api/lists
    params:
      - {name: filter, in: query, type: string, description: "Filter expression (e.g. equals(name,'My List'))"}
      - {name: "page[cursor]", in: query, type: string, description: Cursor for pagination}
      - {name: "page[size]", in: query, type: integer, description: "Number of results per page (1-10, default 10)"}
      - {name: sort, in: query, type: string, description: "Sort field; prefix with - for descending (e.g. -created)"}

  - name: get_campaigns
    description: Retrieve a paginated list of campaigns filtered by channel
    method: GET
    path: /api/campaigns
    params:
      - {name: filter, in: query, type: string, required: true, description: "Channel filter required (e.g. equals(messages.channel,'email'))"}
      - {name: "page[cursor]", in: query, type: string, description: Cursor for pagination}
      - {name: "page[size]", in: query, type: integer, description: "Number of results per page (1-100, default 100)"}
      - {name: sort, in: query, type: string, description: "Sort field; prefix with - for descending (e.g. -created_at)"}

  - name: get_segments
    description: Retrieve a paginated list of all segments in the Klaviyo account
    method: GET
    path: /api/segments
    params:
      - {name: filter, in: query, type: string, description: "Filter expression (e.g. equals(name,'My Segment'))"}
      - {name: "page[cursor]", in: query, type: string, description: Cursor for pagination}
      - {name: "page[size]", in: query, type: integer, description: "Number of results per page (1-10, default 10)"}
      - {name: sort, in: query, type: string, description: "Sort field; prefix with - for descending (e.g. -created)"}

  - name: get_events
    description: Retrieve a paginated list of events (actions taken by profiles)
    method: GET
    path: /api/events
    params:
      - {name: filter, in: query, type: string, description: "Filter expression (e.g. equals(metric_id,'abc123'))"}
      - {name: "page[cursor]", in: query, type: string, description: Cursor for pagination}
      - {name: "page[size]", in: query, type: integer, description: "Number of results per page (max 1000, default 200)"}
      - {name: sort, in: query, type: string, description: "Sort field; prefix with - for descending (e.g. -datetime)"}

  - name: create_profile
    description: Create a new profile in the Klaviyo account
    method: POST
    path: /api/profiles
    params:
      - name: data
        in: body
        type: object
        required: true
        description: "JSON:API data envelope. Example: {\"type\":\"profile\",\"attributes\":{\"email\":\"user@example.com\",\"phone_number\":\"+15005550006\",\"external_id\":\"ext-123\",\"first_name\":\"Jane\",\"last_name\":\"Doe\"}}. At least one of email, phone_number, or external_id is required."

  - name: add_profile_to_list
    description: Add one or more profiles to a list by list ID
    method: POST
    path: /api/lists/{id}/relationships/profiles
    params:
      - {name: id, in: path, type: string, required: true, description: The list ID to add profiles to}
      - name: data
        in: body
        type: array
        required: true
        description: "Array of profile relationship objects. Each element must have type ('profile') and id fields. Example: [{\"type\":\"profile\",\"id\":\"01GDDKASAP8TKDDA2GRZDSVP4H\"}]. Max 1000 profiles per call."

  - name: create_event
    description: Create an event (action) for a profile with an associated metric
    method: POST
    path: /api/events
    params:
      - name: data
        in: body
        type: object
        required: true
        description: "JSON:API data envelope. Example: {\"type\":\"event\",\"attributes\":{\"metric\":{\"data\":{\"type\":\"metric\",\"attributes\":{\"name\":\"Placed Order\"}}},\"profile\":{\"data\":{\"type\":\"profile\",\"attributes\":{\"email\":\"user@example.com\"}}},\"properties\":{\"order_id\":\"abc123\"},\"value\":42.50,\"time\":\"2024-01-01T00:00:00Z\"}}. metric.data.attributes.name and at least one profile identifier (email, phone_number, external_id) are required."

  - name: create_campaign
    description: Create a new campaign with a specified channel and audience
    method: POST
    path: /api/campaigns
    params:
      - name: data
        in: body
        type: object
        required: true
        description: "JSON:API data envelope. Example: {\"type\":\"campaign\",\"attributes\":{\"name\":\"My Campaign\",\"audiences\":{\"included\":[\"LISTID1\"],\"excluded\":[]},\"campaign-messages\":{\"data\":[{\"type\":\"campaign-message\",\"attributes\":{\"definition\":{\"channel\":\"email\",\"content\":{}}}}]}}}. name, audiences.included, and campaign-messages are required."

  - name: create_campaign_send_job
    description: Trigger an existing campaign to send asynchronously
    method: POST
    path: /api/campaign-send-jobs
    params:
      - name: data
        in: body
        type: object
        required: true
        description: "JSON:API data envelope. Example: {\"type\":\"campaign-send-job\",\"id\":\"CAMPAIGN_ID\"}. Both type ('campaign-send-job') and id (the campaign ID to send) are required."
