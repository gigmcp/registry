schemaVersion: 1
name: klaviyo
version: 0.1.0
source:
  repo: github.com/gigmcp/klaviyo-mcp
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/klaviyo-mcp
  # PLACEHOLDER until build-images CI emits the real digest — see README.
  digest: sha256:8c56b3cb22b73db145e02efd152846293c73cda66c7f5f4b5217e9927b9137a6
  entrypoint: /app/server
tier: sealed
entitlements:
  egress:
    - a.klaviyo.com
credentials:
  - id: klaviyo_token
    type: oauth2
    provider: klaviyo
    scopes: [profiles:read, lists:read, campaigns:read, events:write, segments:read]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_profiles
    default: true
  - name: get_lists
    default: true
  - name: get_campaigns
    default: true
  - name: get_segments
    default: true
  - name: get_events
    default: true
  - name: create_profile
    default: false
  - name: add_profile_to_list
    default: false
  - name: create_event
    default: false
  - name: create_campaign
    default: false
  - name: create_campaign_send_job
    default: false
