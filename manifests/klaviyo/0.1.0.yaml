schemaVersion: 1
name: klaviyo
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/klaviyo-mcp
  digest: sha256:df00826d6d760df555ca5d773e1ff57c1584a1038e03e4fdfcac726c82e4b005
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - a.klaviyo.com
credentials:
  - id: klaviyo_token
    type: oauth2
    provider: klaviyo
    vendor: klaviyo
    scopes: [profiles:read, profiles:write, lists:read, lists:write, campaigns:read, campaigns:write, events:read, events:write, segments:read]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_profiles
    default: true
  - name: get_lists
    default: true
  - name: get_campaigns
    default: true
  - name: get_segments
    default: true
  - name: get_events
    default: true
  - name: create_profile
    default: false
  - name: add_profile_to_list
    default: false
  - name: create_event
    default: false
  - name: create_campaign
    default: false
  - name: create_campaign_send_job
    default: false
