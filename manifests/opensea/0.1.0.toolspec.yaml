schemaVersion: 1
name: opensea
version: 0.1.0
baseUrl: https://api.opensea.io
tools:
  - name: get_collections
    description: List NFT collections on OpenSea, optionally filtered by chain or creator
    method: GET
    path: /api/v2/collections
    params:
      - {name: chain, in: query, type: string, description: "Blockchain to filter by (e.g. ethereum, polygon, arbitrum)"}
      - {name: creator_username, in: query, type: string, description: Username of collection creator to filter by}
      - {name: include_hidden, in: query, type: boolean, description: Include hidden collections in results}
      - {name: order_by, in: query, type: string, description: Field to order results by}
      - {name: limit, in: query, type: integer, description: "Number of items to return per page (1-200, default 20)"}
      - {name: next, in: query, type: string, description: Pagination cursor}

  - name: get_collection
    description: Retrieve metadata, fees, and traits for a single NFT collection by slug
    method: GET
    path: /api/v2/collections/{slug}
    params:
      - {name: slug, in: path, type: string, required: true, description: Unique string identifier for the collection on OpenSea}

  - name: get_collection_stats
    description: Retrieve trading statistics for a collection including volume and floor price
    method: GET
    path: /api/v2/collections/{slug}/stats
    params:
      - {name: slug, in: path, type: string, required: true, description: Unique string identifier for the collection on OpenSea}

  - name: get_nft
    description: Retrieve metadata, traits, ownership, and rarity for a single NFT
    method: GET
    path: /api/v2/chain/{chain}/contract/{address}/nfts/{identifier}
    params:
      - {name: chain, in: path, type: string, required: true, description: "Blockchain the NFT is on (e.g. ethereum, polygon, arbitrum, solana)"}
      - {name: address, in: path, type: string, required: true, description: Contract address of the NFT}
      - {name: identifier, in: path, type: string, required: true, description: Token ID of the NFT}

  - name: get_listings
    description: Retrieve all active listings for a collection on OpenSea
    method: GET
    path: /api/v2/listings/collection/{slug}/all
    params:
      - {name: slug, in: path, type: string, required: true, description: Unique string identifier for the collection on OpenSea}
      - {name: maker, in: query, type: string, description: Filter listings by the wallet address of the order maker}
      - {name: include_private_listings, in: query, type: boolean, description: Whether to include private listings}
      - {name: limit, in: query, type: integer, description: "Number of items to return per page (1-200, default 20)"}
      - {name: next, in: query, type: string, description: Pagination cursor}

  - name: get_events
    description: Retrieve a list of events (sales, transfers, listings) for a specific NFT
    method: GET
    path: /api/v2/events/chain/{chain}/contract/{address}/nfts/{identifier}
    params:
      - {name: chain, in: path, type: string, required: true, description: "Blockchain the NFT is on (e.g. ethereum, polygon, arbitrum)"}
      - {name: address, in: path, type: string, required: true, description: Contract address of the NFT}
      - {name: identifier, in: path, type: string, required: true, description: Token ID of the NFT}
      - {name: event_type, in: query, type: array, description: "Filter by event types (e.g. sale, transfer, listing)"}
      - {name: after, in: query, type: integer, description: Only show events after this Unix timestamp (seconds)}
      - {name: before, in: query, type: integer, description: Only show events before this Unix timestamp (seconds)}
      - {name: limit, in: query, type: integer, description: "Number of items to return per page (1-200, default 20)"}
      - {name: next, in: query, type: string, description: Pagination cursor}

  - name: get_best_offer_by_nft
    description: Retrieve offers for a specific NFT within a collection
    method: GET
    path: /api/v2/offers/collection/{slug}/nfts/{identifier}
    params:
      - {name: slug, in: path, type: string, required: true, description: Unique string identifier for the collection on OpenSea}
      - {name: identifier, in: path, type: string, required: true, description: Token ID of the NFT}
      - {name: limit, in: query, type: integer, description: "Number of items to return per page (1-200, default 20)"}
      - {name: next, in: query, type: string, description: Pagination cursor}

  - name: create_listing
    description: Create a new listing to sell an NFT on OpenSea using a signed Seaport order
    method: POST
    path: /api/v2/orders/{chain}/{protocol}/listings
    params:
      - {name: chain, in: path, type: string, required: true, description: "Blockchain for the listing (e.g. ethereum, polygon, arbitrum)"}
      - {name: protocol, in: path, type: string, required: true, description: "Protocol identifier (e.g. seaport)"}
      - {name: parameters, in: body, type: object, required: true, description: "SeaportParameters object including offerer, offer items, consideration, timing, and salt"}
      - {name: protocol_address, in: body, type: string, required: true, description: Smart contract address for the protocol}
      - {name: signature, in: body, type: string, required: true, description: Cryptographic signature for the order}

  - name: create_item_offer
    description: Create an offer to purchase a single NFT (ERC721 or ERC1155) on OpenSea
    method: POST
    path: /api/v2/orders/{chain}/{protocol}/offers
    params:
      - {name: chain, in: path, type: string, required: true, description: "Blockchain for the offer (e.g. ethereum, polygon, arbitrum)"}
      - {name: protocol, in: path, type: string, required: true, description: "Protocol identifier (e.g. seaport)"}
      - {name: parameters, in: body, type: object, required: true, description: "SeaportParameters object with offer and consideration details"}
      - {name: protocol_address, in: body, type: string, required: true, description: Contract address for the protocol}
      - {name: signature, in: body, type: string, required: true, description: Order signature}

  - name: refresh_nft_metadata
    description: Queue a metadata refresh for a specific NFT to update its information from the blockchain
    method: POST
    path: /api/v2/chain/{chain}/contract/{address}/nfts/{identifier}/refresh
    params:
      - {name: chain, in: path, type: string, required: true, description: "Blockchain the NFT is on (e.g. ethereum, polygon, arbitrum)"}
      - {name: address, in: path, type: string, required: true, description: Contract address of the NFT}
      - {name: identifier, in: path, type: string, required: true, description: Token ID of the NFT}
