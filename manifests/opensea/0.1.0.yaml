schemaVersion: 1
name: opensea
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/opensea-mcp
  digest: sha256:1e0f680066414559ebf04167b16e8c85756764f9bacc1165d824ec8640faa549
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.opensea.io
credentials:
  - id: opensea_api_key
    type: api_key
    provider: opensea
    inject:
      header: X-API-KEY
      format: "{token}"
tools:
  - name: get_collections
    default: true
  - name: get_collection
    default: true
  - name: get_collection_stats
    default: true
  - name: get_nft
    default: true
  - name: get_listings
    default: true
  - name: get_events
    default: true
  - name: get_best_offer_by_nft
    default: true
  - name: create_listing
    default: false
  - name: create_item_offer
    default: false
  - name: refresh_nft_metadata
    default: false
