schemaVersion: 1
name: kommo
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/kommo-mcp
  digest: sha256:18443bb5e518c0a4af9ae8bca1fb87e0f9b524c3e3e49f7c7e5c38de47056c5e
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - kommo.com
    - "*.kommo.com"
credentials:
  - id: kommo_token
    type: oauth2
    provider: kommo
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_leads
    default: true
  - name: get_lead
    default: true
  - name: list_contacts
    default: true
  - name: list_companies
    default: true
  - name: list_tasks
    default: true
  - name: list_leads_pipelines
    default: true
  - name: create_lead
    default: false
  - name: update_lead
    default: false
  - name: create_contact
    default: false
  - name: create_task
    default: false
