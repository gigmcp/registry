schemaVersion: 1
name: sentry
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/sentry-mcp
  digest: sha256:16ec8aadab0e8a204e8811ebea93fd7997667e1fe1b7af9a97ea14c3c2340ce1
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - sentry.io
    - "*.sentry.io"
credentials:
  - id: sentry_token
    type: oauth2
    provider: sentry
    scopes: [project:read, event:read, org:read, issue:write]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_organization_issues
    default: true
  - name: list_projects
    default: true
  - name: list_organization_members
    default: true
  - name: list_releases
    default: true
  - name: get_issue_events
    default: true
  - name: update_issue
    default: false
  - name: create_alert_rule
    default: false
  - name: delete_issue
    default: false
