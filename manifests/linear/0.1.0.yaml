schemaVersion: 1
name: linear
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/linear-mcp
  digest: sha256:054d539d1b7079eda5b235a3b192866d13a3a2e0b892ca0c4df32214064357aa
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.linear.app
credentials:
  - id: linear_token
    type: oauth2
    provider: linear
    scopes: [read, write, issues:create, comments:create]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_issues
    default: true
  - name: get_issue
    default: true
  - name: search_issues
    default: true
  - name: create_issue
    default: false
  - name: update_issue
    default: false
  - name: create_comment
    default: false
  - name: list_projects
    default: true
  - name: list_teams
    default: true
  - name: list_users
    default: true
