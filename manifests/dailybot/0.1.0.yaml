schemaVersion: 1
name: dailybot
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/dailybot-mcp
  digest: sha256:7f9ef0d57281843c2d194be7dab6dadd3d8324f278a78125b3f936f917675ef8
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: DailyBot
category: productivity
icon: icons/dailybot.svg
entitlements:
  egress:
    - api.dailybot.com
credentials:
  - id: dailybot_api_key
    type: api_key
    provider: dailybot
    inject:
      header: X-API-KEY
      format: "{token}"
tools:
  - name: get_all_users
    default: true
  - name: find_user_by_uuid
    default: true
  - name: find_workflow_by_name
    default: true
  - name: create_check_in
    default: false
  - name: give_kudos_to_users
    default: false
  - name: send_message
    default: false
