schemaVersion: 1
name: googlecalendar
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/googlecalendar-mcp
  digest: sha256:8e94f193dc219b5e0b4990872bd01168a9013228af473ae62f406cc35b5b8c91
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: Google Calendar
category: productivity
icon: icons/googlecalendar.svg
entitlements:
  egress:
    - www.googleapis.com
credentials:
  - id: googlecalendar_token
    type: oauth2
    provider: googlecalendar
    vendor: google
    scopes:
      [
        https://www.googleapis.com/auth/calendar,
        https://www.googleapis.com/auth/calendar.events,
        https://www.googleapis.com/auth/calendar.readonly,
      ]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_calendars
    default: true
  - name: list_events
    default: true
  - name: get_event
    default: true
  - name: find_free_slots
    default: true
  - name: get_current_date_time
    default: true
  - name: create_event
    default: false
  - name: update_event
    default: false
  - name: quick_add_event
    default: false
  - name: delete_event
    default: false
