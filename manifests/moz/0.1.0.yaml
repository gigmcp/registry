schemaVersion: 1
name: moz
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/moz-mcp
  digest: sha256:c59c9ab6bd2f44d7d27fbb7816962bdaa83675c40f1b37d01dfb581b45291985
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.moz.com
    - lsapi.seomoz.com
credentials:
  - id: moz_api_key
    type: api_key
    provider: moz
    inject:
      header: x-moz-token
      format: "{token}"
tools:
  - name: fetch_site_metrics
    default: true
  - name: check_link_status
    default: true
  - name: get_top_pages
    default: true
  - name: get_global_top_root_domains
    default: true
  - name: get_global_top_pages
    default: true
  - name: fetch_metadata_index
    default: true
  - name: lookup_quota
    default: true
  - name: get_usage_data
    default: true
