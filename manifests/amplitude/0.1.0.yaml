schemaVersion: 1
name: amplitude
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/amplitude-mcp
  digest: sha256:3c971b9cd62f979cd686afa8a54ed99fa62604624366abe40c3874feacb59fb2
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - amplitude.com
    - api2.amplitude.com
credentials:
  - id: amplitude_api_key
    type: basic
    provider: amplitude
    inject:
      header: Authorization
      format: "Basic {token}"
tools:
  - name: get_event_segmentation_data
    default: true
  - name: get_funnel_analysis_data
    default: true
  - name: get_real_time_active_users
    default: true
  - name: get_user_activity
    default: true
  - name: list_events
    default: true
  - name: list_cohorts
    default: true
  - name: send_events
    default: false
  - name: update_user_properties
    default: false
  - name: delete_users
    default: false
