schemaVersion: 1
name: ahrefs
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/ahrefs-mcp
  digest: sha256:7a85e31b947b186a359c6712bfe15239411b7c9dd2816d12e91c275688793daf
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.ahrefs.com
credentials:
  - id: ahrefs_api_key
    type: api_key
    provider: ahrefs
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
