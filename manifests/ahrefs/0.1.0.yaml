    default: true
  - name: list_backlinks
    default: true
  - name: get_domain_rating
    default: true
  - name: list_referring_domains
    default: true
  - name: get_keywords_overview
    default: true
  - name: get_keyword_volume_by_country
    default: true
  - name: get_serp_overview
    default: true
  - name: list_broken_backlinks
    default: true
  - name: get_rank_tracker_overview
    default: true
  - name: list_site_audit_projects
    default: true
