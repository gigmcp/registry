schemaVersion: 1
name: apaleo
version: 0.1.0
baseUrl: https://api.apaleo.com
tools:
  - name: list_properties
    description: List all properties (hotels) accessible to the authenticated account
    method: GET
    path: /inventory/v1/properties
    params:
      - {name: status, in: query, type: string, description: "Filter by property status (e.g. Live, Test, Archived)"}
      - {name: includeArchived, in: query, type: boolean, description: Whether to include archived properties in results}
      - {name: countryCode, in: query, type: string, description: Filter by ISO 3166-1 alpha-2 country code}
      - {name: pageNumber, in: query, type: integer, description: Page number for pagination (1-based)}
      - {name: pageSize, in: query, type: integer, description: Number of results per page}
      - {name: expand, in: query, type: string, description: "Comma-separated list of fields to expand (e.g. description)"}

  - name: get_property
    description: Retrieve details of a single property by its ID
    method: GET
    path: /inventory/v1/properties/{id}
    params:
      - {name: id, in: path, type: string, required: true, description: The property identifier}
      - {name: languages, in: query, type: string, description: Comma-separated list of language codes for localized fields}
      - {name: expand, in: query, type: string, description: "Comma-separated list of fields to expand (e.g. description)"}

  - name: list_units
    description: List all rentable units (rooms, parking spots, etc.) across properties
    method: GET
    path: /inventory/v1/units
    params:
      - {name: propertyId, in: query, type: string, description: Filter units by property ID}
      - {name: unitGroupIds, in: query, type: string, description: Comma-separated list of unit group IDs to filter by}
      - {name: unitAttributeIds, in: query, type: string, description: Comma-separated list of unit attribute IDs to filter by}
      - {name: isOccupied, in: query, type: boolean, description: Filter by current occupancy status}
      - {name: maintenanceType, in: query, type: string, description: "Filter by maintenance type (e.g. OutOfService, OutOfOrder, OutOfInventory)"}
      - {name: condition, in: query, type: string, description: "Filter by unit condition (e.g. Clean, Dirty, CleanToBeInspected)"}
      - {name: status, in: query, type: string, description: "Filter by unit status (e.g. Active, Archived, All); defaults to Active"}
      - {name: textSearch, in: query, type: string, description: Free-text search against unit name}
      - {name: pageNumber, in: query, type: integer, description: Page number for pagination (1-based)}
      - {name: pageSize, in: query, type: integer, description: Number of results per page}
      - {name: expand, in: query, type: string, description: Comma-separated list of fields to expand}

  - name: get_unit
    description: Retrieve details of a single unit by its ID
    method: GET
    path: /inventory/v1/units/{id}
    params:
      - {name: id, in: path, type: string, required: true, description: The unit identifier}
      - {name: languages, in: query, type: string, description: Comma-separated list of language codes for localized fields}
      - {name: expand, in: query, type: string, description: Comma-separated list of fields to expand}

  - name: list_unit_groups
    description: List all unit groups (room types) across properties
    method: GET
    path: /inventory/v1/unit-groups
    params:
      - {name: propertyId, in: query, type: string, description: Filter unit groups by property ID}
      - {name: unitGroupTypes, in: query, type: string, description: "Comma-separated list of unit group types to filter by (e.g. BedRoom, MeetingRoom)"}
      - {name: pageNumber, in: query, type: integer, description: Page number for pagination (1-based)}
      - {name: pageSize, in: query, type: integer, description: Number of results per page}
      - {name: expand, in: query, type: string, description: Comma-separated list of fields to expand}

  - name: create_unit
    description: Create a new rentable unit within a property
    method: POST
    path: /inventory/v1/units
    params:
      - {name: name, in: body, type: string, required: true, description: Unique name for the unit within the property}
      - {name: maxPersons, in: body, type: integer, required: true, description: Maximum number of persons allowed in the unit}
      - {name: propertyId, in: body, type: string, required: true, description: ID of the property this unit belongs to}
      - {name: description, in: body, type: object, description: "Localized description object (e.g. {en: 'text'})"}
      - {name: condition, in: body, type: string, required: true, description: "Initial condition of the unit (e.g. Clean, CleanToBeInspected, Dirty)"}
      - {name: attributes, in: body, type: array, description: List of unit attribute IDs to assign to the unit}
      - {name: unitGroupId, in: body, type: string, required: true, description: ID of the unit group this unit belongs to}
      - {name: connectedUnits, in: body, type: array, description: IDs of units that can be connected to this unit}

  - name: create_unit_group
    description: Create a new unit group (room type) within a property
    method: POST
    path: /inventory/v1/unit-groups
    params:
      - {name: code, in: body, type: string, required: true, description: Short unique code for the unit group within the property}
      - {name: name, in: body, type: object, required: true, description: "Localized name object (e.g. {en: 'text'})"}
      - {name: maxPersons, in: body, type: integer, required: true, description: Maximum number of persons for units in this group}
      - {name: propertyId, in: body, type: string, required: true, description: ID of the property this unit group belongs to}
      - {name: description, in: body, type: object, required: true, description: "Localized description object (e.g. {en: 'text'})"}
      - {name: unitGroupType, in: body, type: string, description: "Type of unit group (e.g. BedRoom, MeetingRoom, EventSpace, ParkingLot, Other)"}
      - {name: connectedUnitGroups, in: body, type: array, description: IDs of unit groups that can be connected to this one}

  - name: create_property
    description: Create a new property (hotel or venue) in the apaleo system
    method: POST
    path: /inventory/v1/properties
    params:
      - {name: code, in: body, type: string, required: true, description: Short unique code for the property}
      - {name: name, in: body, type: object, required: true, description: "Localized name object (e.g. {en: 'text'})"}
      - {name: taxId, in: body, type: string, required: true, description: Tax identification number of the property}
      - {name: location, in: body, type: object, required: true, description: "Location object with address details (addressLine1, postalCode, city, countryCode, etc.)"}
      - {name: timeZone, in: body, type: string, required: true, description: "IANA time zone identifier (e.g. Europe/Berlin)"}
      - {name: companyName, in: body, type: string, required: true, description: Legal company name operating the property}
      - {name: currencyCode, in: body, type: string, required: true, description: ISO 4217 currency code for the property}
      - {name: paymentTerms, in: body, type: object, required: true, description: "Localized payment terms object (e.g. {en: 'text'})"}
      - {name: defaultCheckInTime, in: body, type: string, required: true, description: "Default check-in time in HH:mm format"}
      - {name: defaultCheckOutTime, in: body, type: string, required: true, description: "Default check-out time in HH:mm format"}
      - {name: commercialRegisterEntry, in: body, type: string, required: true, description: Commercial register entry number}
      - {name: bankAccount, in: body, type: object, description: Bank account details object}
      - {name: description, in: body, type: object, description: "Localized description object (e.g. {en: 'text'})"}
      - {name: managingDirectors, in: body, type: string, description: Names of managing directors}

  - name: delete_unit
    description: Delete a unit by its ID
    method: DELETE
    path: /inventory/v1/units/{id}
    params:
      - {name: id, in: path, type: string, required: true, description: The unit identifier to delete}
