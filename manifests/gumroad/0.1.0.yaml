schemaVersion: 1
name: gumroad
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/gumroad-mcp
  digest: sha256:3239e361b49694f3a76ea065d0dbdb34c368de2152447b074db28d2f77e4916b
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.gumroad.com
credentials:
  - id: gumroad_token
    type: oauth2
    provider: gumroad
    scopes: [view_profile, view_sales, edit_products, mark_sales_as_shipped]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_user
    default: true
  - name: list_products
    default: true
  - name: get_sales
    default: true
  - name: get_resource_subscriptions
    default: true
  - name: verify_license
    default: true
  - name: subscribe_to_resource
    default: false
  - name: unsubscribe_from_resource
    default: false
