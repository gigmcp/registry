schemaVersion: 1
name: digicert
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/digicert-mcp
  digest: sha256:a1a289da11f5d2df7e6cf04553646df5fb4bf988d23b3f675140723f53ca4e2b
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: DigiCert
category: dev-tools
entitlements:
  egress:
    - www.digicert.com
    - api.digicert.com
credentials:
  - id: digicert_api_key
    type: api_key
    provider: digicert
    inject:
      header: X-DC-DEVKEY
      format: "{token}"
tools:
  - name: list_certificate_orders
    default: true
  - name: list_certificates
    default: true
  - name: list_domains
    default: true
  - name: get_domain_dcv_info
    default: true
  - name: submit_domain_for_validation
    default: false
  - name: list_organizations
    default: true
  - name: get_organization_details
    default: true
  - name: create_organization
    default: false
  - name: get_finance_balance
    default: true
  - name: list_products
    default: true
