schemaVersion: 1
name: digicert
version: 0.1.0
source:
  repo: github.com/gigmcp/digicert-mcp
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/digicert-mcp
  # PLACEHOLDER until build-images CI emits the real digest — see README.
  digest: sha256:e5568e6c0b06fb839fc1e51e8bb04ea806c794014a2699b933dceb0e2ae5df02
  entrypoint: /app/server
tier: sealed
entitlements:
  egress:
    - www.digicert.com
    - api.digicert.com
credentials:
  - id: digicert_api_key
    type: api_key
    provider: digicert
    inject:
      header: X-DC-DEVKEY
      format: "{token}"
tools:
  - name: list_certificate_orders
    default: true
  - name: list_certificates
    default: true
  - name: list_domains
    default: true
  - name: get_domain_dcv_info
    default: true
  - name: submit_domain_for_validation
    default: false
  - name: list_organizations
    default: true
  - name: get_organization_details
    default: true
  - name: create_organization
    default: false
  - name: get_finance_balance
    default: true
  - name: list_products
    default: true
