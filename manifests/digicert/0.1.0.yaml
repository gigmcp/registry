schemaVersion: 1
name: digicert
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/digicert-mcp
  digest: sha256:712627a0efb8b84008d416a731960860193571e8a489e8258206fcd1450e2d56
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - www.digicert.com
    - api.digicert.com
credentials:
  - id: digicert_api_key
    type: api_key
    provider: digicert
    inject:
      header: X-DC-DEVKEY
      format: "{token}"
tools:
  - name: list_certificate_orders
    default: true
  - name: list_certificates
    default: true
  - name: list_domains
    default: true
  - name: get_domain_dcv_info
    default: true
  - name: submit_domain_for_validation
    default: false
  - name: list_organizations
    default: true
  - name: get_organization_details
    default: true
  - name: create_organization
    default: false
  - name: get_finance_balance
    default: true
  - name: list_products
    default: true
