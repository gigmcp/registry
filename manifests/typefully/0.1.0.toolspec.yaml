schemaVersion: 1
name: typefully
version: 0.1.0
baseUrl: https://api.typefully.com
tools:
  - name: list_drafts
    description: Retrieve all drafts for a specific social set, ordered by last edited date
    method: GET
    path: /v2/social-sets/{social_set_id}/drafts
    params:
      - {name: social_set_id, in: path, type: string, required: true, description: ID of the social set to list drafts for}
      - {name: limit, in: query, type: integer, description: "Maximum items per page (default: 10, max: 50)"}
      - {name: offset, in: query, type: integer, description: "Number of items to skip for pagination (default: 0)"}

  - name: get_draft
    description: Retrieve a specific draft by ID, including all platform content and scheduling details
    method: GET
    path: /v2/social-sets/{social_set_id}/drafts/{draft_id}
    params:
      - {name: social_set_id, in: path, type: string, required: true, description: ID of the social set containing the draft}
      - {name: draft_id, in: path, type: string, required: true, description: ID of the draft to retrieve}
      - {name: exclude_comment_markers, in: query, type: boolean, description: Whether to strip comment marker annotations from response}

  - name: create_draft
    description: Create a new draft with content for one or more social media platforms
    method: POST
    path: /v2/social-sets/{social_set_id}/drafts
    params:
      - {name: social_set_id, in: path, type: string, required: true, description: ID of the social set to create the draft in}
      - {name: platforms, in: body, type: object, description: "Platform-specific content configurations keyed by platform name (x, linkedin, threads, bluesky, mastodon)"}
      - {name: draft_title, in: body, type: string, description: Internal title for organizing the draft}
      - {name: publish_at, in: body, type: string, description: "When to publish: 'now', 'next-free-slot', or an ISO 8601 datetime string"}
      - {name: scratchpad_text, in: body, type: string, description: Plain text notes or scratch content for the draft}
      - {name: share, in: body, type: boolean, description: "Whether to generate a public share URL for the draft (default: false)"}
      - {name: tags, in: body, type: array, description: Array of tag slug identifiers to apply to the draft}

  - name: update_draft
    description: Partially update an existing draft using patch semantics
    method: PATCH
    path: /v2/social-sets/{social_set_id}/drafts/{draft_id}
    params:
      - {name: social_set_id, in: path, type: string, required: true, description: ID of the social set containing the draft}
      - {name: draft_id, in: path, type: string, required: true, description: ID of the draft to update}
      - {name: platforms, in: body, type: object, description: "Platform-specific content updates keyed by platform name"}
      - {name: draft_title, in: body, type: string, description: Updated internal title for the draft}
      - {name: publish_at, in: body, type: string, description: "Updated publish time: 'now', 'next-free-slot', or ISO 8601 datetime"}
      - {name: scratchpad_text, in: body, type: string, description: Updated plain text notes}
      - {name: share, in: body, type: boolean, description: Whether to generate or revoke a public share URL}
      - {name: tags, in: body, type: array, description: Updated array of tag slug identifiers}

  - name: delete_draft
    description: Delete a draft in any status (draft, scheduled, published, or error)
    method: DELETE
    path: /v2/social-sets/{social_set_id}/drafts/{draft_id}
    params:
      - {name: social_set_id, in: path, type: string, required: true, description: ID of the social set containing the draft}
      - {name: draft_id, in: path, type: string, required: true, description: ID of the draft to delete}

  - name: get_recently_published
    description: Retrieve recently published drafts for a social set (v2 replaces /api/v1/drafts/recently-published/)
    method: GET
    path: /v2/social-sets/{social_set_id}/drafts
    params:
      - {name: social_set_id, in: path, type: string, required: true, description: ID of the social set to retrieve published drafts for}
      - {name: status, in: query, type: string, description: "Filter drafts by status; use 'published' to retrieve recently published drafts"}

  - name: get_queue
    description: Retrieve upcoming queue slots and scheduled drafts for a social set between optional date bounds
    method: GET
    path: /v2/social-sets/{social_set_id}/queue
    params:
      - {name: social_set_id, in: path, type: string, required: true, description: ID of the social set to retrieve the queue for}
      - {name: start_date, in: query, type: string, description: Start date for queue window (ISO 8601 date string)}
      - {name: end_date, in: query, type: string, description: End date for queue window (ISO 8601 date string)}

  - name: get_notifications
    description: Retrieve inbox and activity notifications for the authenticated user
    method: GET
    path: /api/v1/notifications/

  - name: list_social_sets
    description: Retrieve all social sets (accounts) accessible to the authenticated user
    method: GET
    path: /v2/social-sets
    params:
      - {name: limit, in: query, type: integer, description: "Maximum items per page (default: 10, max: 50)"}
      - {name: offset, in: query, type: integer, description: "Number of items to skip for pagination (default: 0)"}
