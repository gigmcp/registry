schemaVersion: 1
name: dropbox
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/dropbox-mcp
  digest: sha256:f0e7c8c201afd89dcd8309ba3a01b0c4bf2bb85af2524002884664f829f9361e
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    # RPC endpoints plus the separate content host for upload/download.
    - api.dropboxapi.com
    - content.dropboxapi.com
credentials:
  - id: dropbox_token
    type: oauth2
    provider: dropbox
    scopes: [files.metadata.read, files.content.read, files.content.write, sharing.write]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_folder
    default: true
  - name: get_metadata
    default: true
  - name: search_files
    default: true
  - name: download_file
    default: true
  - name: get_current_account
    default: true
  - name: upload_file
    default: false
  - name: move_file
    default: false
  - name: copy_file
    default: false
  - name: delete_file
    default: false
  - name: create_shared_link
    default: false
