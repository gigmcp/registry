schemaVersion: 1
name: bannerbear
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/bannerbear-mcp
  digest: sha256:ec15f76dd787c2b86257669339e12ddf4092147196be6a30b771d58beda431a7
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.bannerbear.com
credentials:
  - id: bannerbear_api_key
    type: api_key
    provider: bannerbear
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_account_info
    default: true
  - name: list_templates
    default: true
  - name: get_template
    default: true
  - name: list_images
    default: true
  - name: get_image
    default: true
  - name: list_videos
    default: true
  - name: list_screenshots
    default: true
  - name: create_template
    default: false
  - name: delete_template
    default: false
