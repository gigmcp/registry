schemaVersion: 1
name: hubspot
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/hubspot-mcp
  digest: sha256:6de4ad73a69e07e503cca894fafb2fb52ceecbb67b7ee837334c33b379772ffe
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.hubapi.com
credentials:
  - id: hubspot_token
    type: oauth2
    provider: hubspot
    scopes:
      [
        crm.objects.contacts.read,
        crm.objects.contacts.write,
        crm.objects.companies.read,
        crm.objects.deals.read,
        crm.objects.deals.write,
      ]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_contacts
    default: true
  - name: search_contacts
    default: true
  - name: get_contact
    default: true
  - name: list_deals
    default: true
  - name: search_companies
    default: true
  - name: create_contact
    default: false
  - name: update_contact
    default: false
  - name: create_deal
    default: false
  - name: create_note
    default: false
