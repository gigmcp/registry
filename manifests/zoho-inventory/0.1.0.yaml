schemaVersion: 1
name: zoho-inventory
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/zoho-inventory-mcp
  digest: sha256:9904e02b5822eedc8db171ae5d598c2b18f5e771f6f301c5e3ba6d4855fee7c4
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: Zoho Inventory
category: e-commerce
entitlements:
  egress:
    # Zoho Inventory REST API (multi-DC: zohoapis.com/.eu/.in served via subdomains)
    # plus the accounts host for OAuth token refresh.
    - www.zohoapis.com
    - "*.zohoapis.com"
    - accounts.zoho.com
credentials:
  - id: zoho-inventory_token
    type: oauth2
    provider: zoho-inventory
    vendor: zoho
    scopes: [ZohoInventory.items.READ, ZohoInventory.salesorders.READ, ZohoInventory.invoices.READ, ZohoInventory.salesorders.CREATE, ZohoInventory.contacts.READ]
    inject:
      header: Authorization
      format: "Zoho-oauthtoken {token}"
tools:
  - name: list_items
    default: true
  - name: list_contacts
    default: true
  - name: list_sales_orders
    default: true
  - name: get_sales_order
    default: true
  - name: list_invoices
    default: true
  - name: list_purchase_orders
    default: true
  - name: create_item
    default: false
  - name: create_sales_order
    default: false
  - name: create_invoice
    default: false
  - name: create_purchase_order
    default: false
