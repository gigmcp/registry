schemaVersion: 1
name: toneden
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/toneden-mcp
  digest: sha256:960bd5290114389f7129390524c8f786c87cd3211cdd6308325a392219aa8895
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - www.toneden.io
credentials:
  - id: toneden_token
    type: oauth2
    provider: toneden
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_user
    default: true
  - name: get_link
    default: true
  - name: get_link_insights
    default: true
  - name: create_link
    default: false
  - name: get_advertising_campaign
    default: true
  - name: get_advertising_campaign_insights
    default: true
  - name: create_advertising_campaign
    default: false
  - name: delete_advertising_campaign
    default: false
  - name: list_playbook_campaigns
    default: true
