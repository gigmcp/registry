schemaVersion: 1
name: linkedin
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/linkedin-mcp
  digest: sha256:2ddac53b03c43f9b09995fc80c29e947a8f3f95b60a1eac4d08e6ba3e87e6682
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: LinkedIn
category: social
icon: icons/linkedin.svg
entitlements:
  egress:
    - api.linkedin.com
credentials:
  - id: linkedin_token
    type: oauth2
    provider: linkedin
    vendor: linkedin
    scopes: [openid, profile, w_member_social, r_organization_social]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_my_info
    default: true
  - name: get_company_info
    default: true
  - name: get_post_content
    default: true
  - name: get_share_stats
    default: true
  - name: list_reactions
    default: true
  - name: create_post
    default: false
  - name: create_comment_on_post
    default: false
  - name: delete_post
    default: false
