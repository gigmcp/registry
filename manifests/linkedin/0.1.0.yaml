schemaVersion: 1
name: linkedin
version: 0.1.0
source:
  repo: github.com/gigmcp/linkedin-mcp
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/linkedin-mcp
  # PLACEHOLDER until build-images CI emits the real digest — see README.
  digest: sha256:b0415eec25cc6af3ef65adae06580690a6da8d350132fac39027263d5fbbfa71
  entrypoint: /app/server
tier: sealed
entitlements:
  egress:
    - api.linkedin.com
credentials:
  - id: linkedin_token
    type: oauth2
    provider: linkedin
    scopes: [openid, profile, w_member_social, r_organization_social]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_my_info
    default: true
  - name: get_company_info
    default: true
  - name: get_post_content
    default: true
  - name: get_share_stats
    default: true
  - name: list_reactions
    default: true
  - name: create_post
    default: false
  - name: create_comment_on_post
    default: false
  - name: delete_post
    default: false
