schemaVersion: 1
name: dropbox-sign
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/dropbox-sign-mcp
  digest: sha256:f15af53e3e3034b72d473ad3f7dff2bfe4041a7d6f0046aed2b6d765240b25b2
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: Dropbox Sign
category: documents
icon: icons/dropbox-sign.svg
entitlements:
  egress:
    - api.hellosign.com
credentials:
  - id: dropbox_sign_token
    type: oauth2
    provider: dropbox-sign
    vendor: dropbox-sign
    scopes: [basic_account_info, request_signature, signature_request_access, template_access]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_signature_requests
    default: true
  - name: get_signature_request
    default: true
  - name: download_signature_request_files
    default: true
  - name: list_templates
    default: true
  - name: get_template
    default: true
  - name: get_account
    default: true
  - name: send_signature_request
    default: false
  - name: send_request_reminder
    default: false
  - name: cancel_signature_request
    default: false
  - name: create_template
    default: false
