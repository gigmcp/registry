schemaVersion: 1
name: dropbox-sign
version: 0.1.0
baseUrl: https://api.hellosign.com
tools:
  - name: list_signature_requests
    description: List signature requests accessible to the account
    method: GET
    path: /v3/signature_request/list
    params:
      - {name: account_id, in: query, type: string, description: "Which account to return SignatureRequests for. Use 'all' for all team members."}
      - {name: page, in: query, type: integer, description: "Page number of results to return. Defaults to 1."}
      - {name: page_size, in: query, type: integer, description: "Number of objects per page. Must be between 1 and 100. Default is 20."}
      - {name: query, in: query, type: string, description: "Search terms and/or fields to filter the SignatureRequest list results."}

  - name: get_signature_request
    description: Get the status and details of a specific signature request
    method: GET
    path: /v3/signature_request/{signature_request_id}
    params:
      - {name: signature_request_id, in: path, type: string, required: true, description: The identifier of the SignatureRequest to retrieve.}

  - name: download_signature_request_files
    description: Download the files associated with a signature request as PDF or ZIP
    method: GET
    path: /v3/signature_request/files/{signature_request_id}
    params:
      - {name: signature_request_id, in: path, type: string, required: true, description: The identifier of the SignatureRequest whose files to download.}
      - {name: file_type, in: query, type: string, description: "Set to 'pdf' for a single merged document or 'zip' for a collection of documents."}

  - name: list_templates
    description: List reusable signature request templates accessible to the account
    method: GET
    path: /v3/template/list
    params:
      - {name: account_id, in: query, type: string, description: "Which account to return Templates for. Defaults to your account."}
      - {name: page, in: query, type: integer, description: "Page number of results to return. Defaults to 1."}
      - {name: page_size, in: query, type: integer, description: "Number of objects per page. Must be between 1 and 100. Default is 20."}
      - {name: query, in: query, type: string, description: "Search terms and/or fields to filter the Template list results."}

  - name: get_template
    description: Get the details of a specific signature request template
    method: GET
    path: /v3/template/{template_id}
    params:
      - {name: template_id, in: path, type: string, required: true, description: The identifier of the Template to retrieve.}

  - name: get_account
    description: Get the properties and settings of the authenticated account
    method: GET
    path: /v3/account
    params:
      - {name: account_id, in: query, type: string, description: "The ID of the Account to retrieve."}
      - {name: email_address, in: query, type: string, description: "The email address of the Account to retrieve."}

  - name: send_signature_request
    description: Create and send a new signature request with documents and signers
    method: POST
    path: /v3/signature_request/send
    encoding: json
    params:
      - {name: signers, in: body, type: array, required: true, description: "Array of signer objects, each with name and email_address fields."}
      - {name: file_urls, in: body, type: array, description: "URLs of files to download and send for signature (use file_urls or files, not both)."}
      - {name: title, in: body, type: string, description: "The title of the SignatureRequest."}
      - {name: subject, in: body, type: string, description: "The subject of the email sent to signers."}
      - {name: message, in: body, type: string, description: "The custom message to include in the email sent to signers."}
      - {name: cc_email_addresses, in: body, type: array, description: "Email addresses to CC on the signature request."}
      - {name: signing_redirect_url, in: body, type: string, description: "URL to redirect signers to after signing."}
      - {name: test_mode, in: body, type: boolean, description: "If true, the request will be non-binding. Defaults to false."}

  - name: send_request_reminder
    description: Send an email reminder to a signer who has not yet signed a signature request
    method: POST
    path: /v3/signature_request/remind/{signature_request_id}
    encoding: json
    params:
      - {name: signature_request_id, in: path, type: string, required: true, description: The identifier of the SignatureRequest to send a reminder for.}
      - {name: email_address, in: body, type: string, required: true, description: The email address of the signer to send the reminder to.}
      - {name: name, in: body, type: string, description: "The name of the signer to remind. Include if two or more signers share an email address."}

  - name: cancel_signature_request
    description: Cancel an incomplete signature request
    method: POST
    path: /v3/signature_request/cancel/{signature_request_id}
    params:
      - {name: signature_request_id, in: path, type: string, required: true, description: The identifier of the incomplete SignatureRequest to cancel.}

  - name: create_template
    description: Create a reusable template for signature requests
    method: POST
    path: /v3/template/create
    encoding: json
    params:
      - {name: signer_roles, in: body, type: array, required: true, description: "Array of signer role objects defining who must sign when the template is used."}
      - {name: form_fields_per_document, in: body, type: array, required: true, description: "Array of field objects describing where signature and data fields appear in the document."}
      - {name: file_urls, in: body, type: array, description: "URLs of files to download and use as the template document (use file_urls or files, not both)."}
      - {name: title, in: body, type: string, description: "The title of the Template."}
      - {name: subject, in: body, type: string, description: "The default email subject for signature requests using this template."}
      - {name: message, in: body, type: string, description: "The default email message for signature requests using this template."}
      - {name: cc_roles, in: body, type: array, description: "Array of CC role names that must be specified when using the template."}
      - {name: test_mode, in: body, type: boolean, description: "If true, the template will be non-binding. Defaults to false."}
