schemaVersion: 1
name: semrush
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/semrush-mcp
  digest: sha256:16b1de0863b2c8594146780f7faad7b15b5ed7a876d8d5a2098c41c6dbe09645
  entrypoint: /app/server
  builder: toolpack
# Semrush Analytics API accepts the API key only as a query parameter
# (?key=...); header injection cannot work, so entrusted tier.
tier: entrusted
displayName: Semrush
category: search
icon: icons/semrush.svg
entitlements:
  egress:
    - api.semrush.com
credentials:
  - id: semrush_api_key
    type: api_key
    provider: semrush
    inject:
      env: SEMRUSH_API_KEY
tools:
  - name: get_domain_organic_search_keywords
    default: true
  - name: get_domain_paid_search_keywords
    default: true
  - name: get_backlinks
    default: true
  - name: get_referring_domains
    default: true
  - name: get_keyword_overview
    default: true
  - name: get_keyword_difficulty
    default: true
  - name: get_competitors_in_organic_search
    default: true
  - name: get_related_keywords
    default: true
  - name: check_account_units_balance
    default: true
