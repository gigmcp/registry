schemaVersion: 1
name: slackbot
version: 0.1.0
source:
  repo: github.com/korotovsky/slack-mcp-server
  tag: v1.3.0
  package: cmd/slack-mcp-server
image:
  ref: ghcr.io/gigmcp/slackbot-mcp
  digest: sha256:d3f1770e8fdf60bf0f15418de7bcab7e3cc1f2cd2fe992b7f5150971af47c414
  entrypoint: /app/server
tier: sealed
entitlements:
  egress:
    - slack.com
    - "*.slack.com"
credentials:
  - id: slackbot_token
    type: oauth2
    provider: slackbot
    scopes: [chat:write, channels:read, channels:history, users:read, reactions:write]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: conversations_history
    default: true
  - name: conversations_replies
    default: true
  - name: conversations_search_messages
    default: true
  - name: channels_list
    default: true
  - name: users_search
    default: true
  - name: usergroups_list
    default: true
  - name: usergroups_me
    default: true
  - name: conversations_unreads
    default: true
  - name: saved_list
    default: true
  - name: conversations_add_message
    default: false
  - name: reactions_add
    default: false
  - name: reactions_remove
    default: false
  - name: usergroups_create
    default: false
  - name: usergroups_update
    default: false
  - name: usergroups_users_update
    default: false
  - name: conversations_mark
    default: false
  - name: saved_update
    default: false
  - name: saved_clear_completed
    default: false
