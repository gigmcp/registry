schemaVersion: 1
name: slackbot
version: 0.1.0
source:
  repo: github.com/korotovsky/slack-mcp-server
  tag: v1.3.0
  package: cmd/slack-mcp-server
image:
  ref: ghcr.io/gigmcp/slackbot-mcp
  digest: sha256:88bfe2a471fc6d977db78fdd00244f336e309a59f84a775d98ad2d9c1f8f56ae
  entrypoint: /app/server
tier: sealed
displayName: Slackbot
category: comms
entitlements:
  egress:
    - slack.com
    - "*.slack.com"
credentials:
  - id: slackbot_token
    type: oauth2
    provider: slackbot
    vendor: slack
    scopes: [chat:write, channels:read, channels:history, users:read, reactions:write]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: conversations_history
    default: true
  - name: conversations_replies
    default: true
  - name: conversations_search_messages
    default: true
  - name: channels_list
    default: true
  - name: users_search
    default: true
  - name: usergroups_list
    default: true
  - name: usergroups_me
    default: true
  - name: conversations_unreads
    default: true
  - name: saved_list
    default: true
  - name: conversations_add_message
    default: false
  - name: reactions_add
    default: false
  - name: reactions_remove
    default: false
  - name: usergroups_create
    default: false
  - name: usergroups_update
    default: false
  - name: usergroups_users_update
    default: false
  - name: conversations_mark
    default: false
  - name: saved_update
    default: false
  - name: saved_clear_completed
    default: false
