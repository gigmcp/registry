schemaVersion: 1
name: zoho-desk
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/zoho-desk-mcp
  digest: sha256:989f3bf3758552f4c9a888ed2fc1ef83c96157ee05dc3c3aeb6bdc69e859e46f
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: Zoho Desk
category: support
entitlements:
  egress:
    - desk.zoho.com
    - accounts.zoho.com
credentials:
  - id: zoho_desk_token
    type: oauth2
    provider: zoho-desk
    vendor: zoho
    scopes: [Desk.tickets.READ, Desk.tickets.CREATE, Desk.contacts.READ, Desk.basic.READ, Desk.settings.READ]
    inject:
      header: Authorization
      format: "Zoho-oauthtoken {token}"
tools:
  - name: list_tickets
    default: true
  - name: get_ticket
    default: true
  - name: list_ticket_conversations
    default: true
  - name: list_contacts
    default: true
  - name: get_contact
    default: true
  - name: list_departments
    default: true
  - name: get_agent
    default: true
  - name: create_ticket
    default: false
