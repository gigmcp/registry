schemaVersion: 1
name: tisane
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/tisane-mcp
  digest: sha256:0e97ceeaca01b50f47ca0b739909f91ff07df233516e203c558d9cc7ea17ebc1
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.tisane.ai
credentials:
  - id: tisane_api_key
    type: api_key
    provider: tisane
    inject:
      header: Ocp-Apim-Subscription-Key
      format: "{token}"
tools:
  - name: analyze_text
    default: true
  - name: detect_language
    default: true
  - name: get_supported_languages
    default: true
  - name: calculate_similarity
    default: true
  - name: list_word_senses
    default: true
  - name: extract_text
    default: true
  - name: transform_text
    default: true
