schemaVersion: 1
name: tisane
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/tisane-mcp
  digest: sha256:d2f83ec3b4fd2a6bc57bc45687d2b677b27049ec859743a92f27be2c1ee23dd9
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.tisane.ai
credentials:
  - id: tisane_api_key
    type: api_key
    provider: tisane
    inject:
      header: Ocp-Apim-Subscription-Key
      format: "{token}"
tools:
  - name: analyze_text
    default: true
  - name: detect_language
    default: true
  - name: get_supported_languages
    default: true
  - name: calculate_similarity
    default: true
  - name: list_word_senses
    default: true
  - name: extract_text
    default: true
  - name: transform_text
    default: true
