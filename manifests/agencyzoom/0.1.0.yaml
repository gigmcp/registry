schemaVersion: 1
name: agencyzoom
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/agencyzoom-mcp
  digest: sha256:ef1bd586b5bf4aa2cecb7e9b7b89ab9a546d67762cc2c31237f99f03f97f4a06
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: AgencyZoom
category: CRM
entitlements:
  egress:
    - api.agencyzoom.com
credentials:
  - id: agencyzoom_token
    type: api_key
    provider: agencyzoom
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: search_leads
    default: true
  - name: get_lead_details
    default: true
  - name: search_customers
    default: true
  - name: get_customer_details
    default: true
  - name: search_and_list_tasks
    default: true
  - name: get_pipelines
    default: true
  - name: create_lead
    default: false
  - name: update_lead
    default: false
  - name: create_task
    default: false
  - name: create_customer_note
    default: false
