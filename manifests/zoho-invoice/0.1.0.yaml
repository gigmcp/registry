schemaVersion: 1
name: zoho-invoice
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/zoho-invoice-mcp
  digest: sha256:c21c476a906ec4ff1e4297bc0fb44695fb695ab928bad88be62a7fc4f51ba348
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - www.zohoapis.com
    - accounts.zoho.com
credentials:
  - id: zoho_invoice_token
    type: oauth2
    provider: zoho-invoice
    scopes: [ZohoInvoice.invoices.READ, ZohoInvoice.invoices.CREATE, ZohoInvoice.contacts.READ, ZohoInvoice.estimates.READ, ZohoInvoice.customerpayments.CREATE]
    inject:
      header: Authorization
      format: "Zoho-oauthtoken {token}"
tools:
  - name: list_invoices
    default: true
  - name: get_invoice
    default: true
  - name: create_invoice
    default: false
  - name: email_invoice
    default: false
  - name: delete_invoice
    default: false
  - name: list_contacts
    default: true
  - name: create_contact
    default: false
  - name: list_estimates
    default: true
  - name: list_credit_notes
    default: true
  - name: create_customer_payment
    default: false
