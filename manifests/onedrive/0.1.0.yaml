schemaVersion: 1
name: onedrive
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/onedrive-mcp
  digest: sha256:f41d8e2861ca2c595e7a2808207d1c044ae49ad985db5a46a1c2fe9ee03a2cc3
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - graph.microsoft.com
credentials:
  - id: onedrive_token
    type: oauth2
    provider: onedrive
    scopes: [Files.Read, Files.ReadWrite, Files.ReadWrite.All, offline_access]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_folder_children
    default: true
  - name: search_items
    default: true
  - name: get_item
    default: true
  - name: download_file
    default: true
  - name: get_recent_items
    default: true
  - name: upload_file
    default: false
  - name: create_folder
    default: false
  - name: move_item
    default: false
  - name: delete_item
    default: false
  - name: create_link
    default: false
