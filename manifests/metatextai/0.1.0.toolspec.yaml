schemaVersion: 1
name: metatextai
version: 0.1.0
baseUrl: https://api.metatext.ai
tools:
  - name: list_models
    description: List all available custom NLP models in the account
    method: GET
    path: /v1/models

  - name: list_applications
    description: List all applications registered in the Metatext guardrail platform
    method: GET
    path: /v1/applications
    baseUrl: https://guard-api.metatext.ai

  - name: list_policies_guardrails
    description: List all policies attached to a specific application
    method: GET
    path: /v1/applications/{application_id}/policies
    baseUrl: https://guard-api.metatext.ai
    params:
      - {name: application_id, in: path, type: string, required: true, description: ID of the application whose policies to list}

  - name: classify
    description: Run text classification inference against a custom trained model
    method: POST
    path: /v1/inference/{model_id}
    params:
      - {name: model_id, in: path, type: string, required: true, description: ID of the custom model to use for classification}
      - {name: text, in: body, type: string, required: true, description: Text input to classify}

  - name: extract
    description: Run entity extraction inference against a custom trained model
    method: POST
    path: /v1/inference/{model_id}
    params:
      - {name: model_id, in: path, type: string, required: true, description: ID of the custom model to use for extraction}
      - {name: text, in: body, type: string, required: true, description: Text input from which to extract entities}

  - name: generate
    description: Generate text using a pre-built hub inference model (e.g. blog post, headline, or free-form text)
    method: POST
    path: /hub-inference/text-generator
    params:
      - {name: text, in: body, type: string, required: true, description: Input text prompt for text generation}

  - name: chat_completions
    description: "Generate a chat completion response using the OpenAI-compatible chat completions endpoint"
    method: POST
    path: /v1/chat/completions
    params:
      - {name: model, in: body, type: string, required: true, description: Model identifier to use for chat completion}
      - {name: messages, in: body, type: array, required: true, description: "Array of message objects with role and content fields"}
      - {name: max_tokens, in: body, type: integer, description: Maximum number of tokens to generate}
      - {name: temperature, in: body, type: number, description: "Sampling temperature between 0 and 2"}

  - name: create_policy_guardrails
    description: Create a new guardrail policy for an application
    method: POST
    path: /v1/applications/{application_id}/policies
    baseUrl: https://guard-api.metatext.ai
    params:
      - {name: application_id, in: path, type: string, required: true, description: ID of the application to attach the policy to}
      - {name: id, in: body, type: string, required: true, description: Unique identifier for the policy}
      - {name: description, in: body, type: string, required: true, description: Human-readable description of the policy}
      - {name: rules, in: body, type: array, required: true, description: "Array of policy rules specifying type, expected outcome, and optional threshold or value"}
      - {name: target, in: body, type: string, description: "Scope of evaluation: input, output, or both (default: both)"}
      - {name: override_response, in: body, type: string, description: Optional response to return when the policy triggers}

  - name: delete_policy_guardrails
    description: Delete a guardrail policy from an application
    method: DELETE
    path: /v1/applications/{application_id}/policies/{policy_id}
    baseUrl: https://guard-api.metatext.ai
    params:
      - {name: application_id, in: path, type: string, required: true, description: ID of the application containing the policy}
      - {name: policy_id, in: path, type: string, required: true, description: ID of the policy to delete}
