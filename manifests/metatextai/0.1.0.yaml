schemaVersion: 1
name: metatextai
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/metatextai-mcp
  digest: sha256:3328705b250689ad9318a57c42a4f6dd1ace447678fff751f8c987a266c7b845
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.metatext.ai
    - guard-api.metatext.ai
credentials:
  - id: metatextai_api_key
    type: api_key
    provider: metatextai
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_models
    default: true
  - name: list_applications
    default: true
  - name: list_policies_guardrails
    default: true
  - name: classify
    default: true
  - name: extract
    default: true
  - name: generate
    default: false
  - name: chat_completions
    default: false
  - name: create_policy_guardrails
    default: false
  - name: delete_policy_guardrails
    default: false
