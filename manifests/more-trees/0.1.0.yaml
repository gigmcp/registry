schemaVersion: 1
name: more-trees
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/more-trees-mcp
  digest: sha256:91b1ab144037f8521ec34c4974b8ff136792206d71fe0294ea4e15c34e694637
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - "*.platform.moretrees.eco"
credentials:
  - id: more_trees_api_key
    type: api_key
    provider: more-trees
    inject:
      header: X-API-KEY
      format: "{token}"
tools:
  - name: list_projects
    default: true
  - name: get_total_carbon_offset
    default: true
  - name: get_marketing_preferences
    default: true
  - name: get_tree_types
    default: true
  - name: create_user
    default: false
  - name: plant_tree
    default: false
