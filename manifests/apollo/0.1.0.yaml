schemaVersion: 1
name: apollo
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/apollo-mcp
  digest: sha256:438e659cf5882f13eabf0c161504f366c772d8a93a712dbaf08d0b2053ad62f5
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.apollo.io
credentials:
  - id: apollo_api_key
    type: api_key
    provider: apollo
    inject:
      header: X-Api-Key
      format: "{token}"
tools:
  - name: people_search
    default: true
  - name: organization_search
    default: true
  - name: people_enrichment
    default: true
  - name: organization_enrichment
    default: true
  - name: search_contacts
    default: true
  - name: list_deals
    default: true
  - name: create_contact
    default: false
  - name: create_deal
    default: false
  - name: add_contacts_to_sequence
    default: false
