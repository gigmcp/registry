schemaVersion: 1
name: clickup
version: 0.1.0
source:
  repo: github.com/gigmcp/clickup-mcp
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/clickup-mcp
  # PLACEHOLDER until build-images CI emits the real digest — see README.
  digest: sha256:d817171f5a31f04b36357154d679e697d436f7f1e42cd7be12014d4d95df5e22
  entrypoint: /app/server
tier: sealed
entitlements:
  egress:
    - api.clickup.com
credentials:
  - id: clickup_token
    type: oauth2
    provider: clickup
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_authorized_workspaces
    default: true
  - name: get_tasks
    default: true
  - name: get_task
    default: true
  - name: create_task
    default: false
  - name: update_task
    default: false
  - name: delete_task
    default: false
  - name: create_task_comment
    default: false
  - name: get_lists
    default: true
  - name: create_list
    default: false
  - name: get_spaces
    default: true
