schemaVersion: 1
name: clickup
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/clickup-mcp
  digest: sha256:5945fe5b8757a74ceb058f18ca0c6f8412b6584c7843398479308f252cda9754
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.clickup.com
credentials:
  - id: clickup_token
    type: oauth2
    provider: clickup
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_authorized_workspaces
    default: true
  - name: get_tasks
    default: true
  - name: get_task
    default: true
  - name: create_task
    default: false
  - name: update_task
    default: false
  - name: delete_task
    default: false
  - name: create_task_comment
    default: false
  - name: get_lists
    default: true
  - name: create_list
    default: false
  - name: get_spaces
    default: true
