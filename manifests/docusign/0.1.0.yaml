schemaVersion: 1
name: docusign
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/docusign-mcp
  digest: sha256:1043fae5a1791a1a101f181f52dd8bb396796852e0efba67431c108143703dd9
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - account.docusign.com
    - "*.docusign.net"
credentials:
  - id: docusign_token
    type: oauth2
    provider: docusign
    vendor: docusign
    scopes: [signature, extended, impersonation]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_envelopes
    default: true
  - name: get_envelope
    default: true
  - name: get_envelope_recipients
    default: true
  - name: get_envelope_documents
    default: true
  - name: list_templates
    default: true
  - name: create_envelope
    default: false
  - name: send_envelope
    default: false
  - name: void_envelope
    default: false
  - name: add_envelope_attachments
    default: false
