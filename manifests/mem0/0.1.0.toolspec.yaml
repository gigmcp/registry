schemaVersion: 1
name: mem0
version: 0.1.0
baseUrl: https://api.mem0.ai
tools:
  - name: search_memories
    description: Perform a semantic search over stored memories using a natural-language query
    method: POST
    path: /v3/memories/search/
    params:
      - {name: query, in: body, type: string, required: true, description: "Natural-language query to search for relevant memories"}
      - {name: filters, in: body, type: object, description: "Entity filters object containing user_id, agent_id, app_id, or run_id to scope results"}
      - {name: top_k, in: body, type: integer, description: "Maximum number of results to return (1-1000, default 10)"}
      - {name: threshold, in: body, type: number, description: "Minimum semantic relevance score (0-1, default 0.1)"}
      - {name: rerank, in: body, type: boolean, description: "Whether to rerank results for improved relevance"}
      - {name: reference_date, in: body, type: string, description: "Temporal anchor for time-aware queries (Unix epoch, YYYY-MM-DD, or ISO datetime)"}

  - name: get_memory
    description: Retrieve a single memory record by its unique ID
    method: GET
    path: /v1/memories/{memory_id}/
    params:
      - {name: memory_id, in: path, type: string, required: true, description: "UUID of the memory to retrieve"}

  - name: list_memories
    description: List all memories for a user, agent, app, or run with optional filters and pagination
    method: POST
    path: /v3/memories/
    params:
      - {name: filters, in: body, type: object, required: true, description: "Entity filters object containing at least one of user_id, agent_id, app_id, or run_id"}
      - {name: page, in: query, type: integer, description: "Page number for pagination (default 1)"}
      - {name: page_size, in: query, type: integer, description: "Number of memories per page (default 100, max 200)"}

  - name: get_memory_history
    description: Retrieve the change history and audit trail for a specific memory
    method: GET
    path: /v1/memories/{memory_id}/history/
    params:
      - {name: memory_id, in: path, type: string, required: true, description: "UUID of the memory whose history to retrieve"}

  - name: list_entities
    description: List all entities (users, agents, apps, runs) in the project along with their memory counts
    method: GET
    path: /v1/entities/
    params:
      - {name: org_id, in: query, type: string, description: "Filter entities by organization ID"}
      - {name: project_id, in: query, type: string, description: "Filter entities by project ID"}

  - name: add_memory
    description: Extract and store memories from a conversation or message list
    method: POST
    path: /v3/memories/add/
    params:
      - {name: messages, in: body, type: array, required: true, description: "Array of message objects with role and content fields"}
      - {name: user_id, in: body, type: string, description: "Associate the memory with this user ID"}
      - {name: agent_id, in: body, type: string, description: "Associate the memory with this agent ID"}
      - {name: app_id, in: body, type: string, description: "Associate the memory with this app ID"}
      - {name: run_id, in: body, type: string, description: "Associate the memory with this run ID"}
      - {name: metadata, in: body, type: object, description: "Additional metadata to attach to the memory"}
      - {name: infer, in: body, type: boolean, description: "Whether to use LLM inference to extract memories (default true)"}

  - name: update_memory
    description: Update the text content or metadata of an existing memory
    method: PUT
    path: /v1/memories/{memory_id}/
    params:
      - {name: memory_id, in: path, type: string, required: true, description: "UUID of the memory to update"}
      - {name: text, in: body, type: string, description: "Updated text content for the memory"}
      - {name: metadata, in: body, type: object, description: "Updated metadata for the memory"}

  - name: delete_memory
    description: Delete a specific memory by its unique ID
    method: DELETE
    path: /v1/memories/{memory_id}/
    params:
      - {name: memory_id, in: path, type: string, required: true, description: "UUID of the memory to delete"}
