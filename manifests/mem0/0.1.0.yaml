schemaVersion: 1
name: mem0
version: 0.1.0
source:
  repo: github.com/gigmcp/mem0-mcp
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/mem0-mcp
  # PLACEHOLDER until build-images CI emits the real digest — see README.
  digest: sha256:4b8de1a874e9eac9594d48bcb4dcf400804727286d94742b0d0d940ad0575690
  entrypoint: /app/server
tier: sealed
entitlements:
  egress:
