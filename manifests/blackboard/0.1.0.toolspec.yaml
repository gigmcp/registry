schemaVersion: 1
name: blackboard
version: 0.1.0
baseUrl: https://institution.blackboard.com
tools:
  - name: list_courses
    description: List courses available in the Blackboard Learn instance
    method: GET
    path: /learn/api/public/v1/courses
    params:
      - {name: courseId, in: query, type: string, description: Filter by the course's courseId field}
      - {name: name, in: query, type: string, description: Filter by course name (substring match)}
      - {name: dataSourceId, in: query, type: string, description: Filter by data source ID}
      - {name: termId, in: query, type: string, description: Filter by term ID}
      - {name: offset, in: query, type: integer, description: Number of results to skip for paging}
      - {name: limit, in: query, type: integer, description: Maximum number of results to return}

  - name: get_course
    description: Retrieve details of a specific course by its ID
    method: GET
    path: /learn/api/public/v1/courses/{courseId}
    params:
      - {name: courseId, in: path, type: string, required: true, description: "The course ID (primary, externalId:, courseId:, or uuid: prefix)"}
      - {name: fields, in: query, type: string, description: Comma-delimited list of fields to include in the response}

  - name: list_course_announcements
    description: List announcements associated with a specific course
    method: GET
    path: /learn/api/public/v1/announcements
    params:
      - {name: courseId, in: query, type: string, description: Filter announcements to those scoped to this course ID}
      - {name: offset, in: query, type: integer, description: Number of results to skip for paging}
      - {name: limit, in: query, type: integer, description: Maximum number of results to return}
      - {name: fields, in: query, type: string, description: Comma-delimited list of fields to include in the response}

  - name: list_course_users
    description: List users (members/enrollments) in a specific course
    method: GET
    path: /learn/api/public/v1/courses/{courseId}/users
    params:
      - {name: courseId, in: path, type: string, required: true, description: "The course ID (primary, externalId:, courseId:, or uuid: prefix)"}
      - {name: offset, in: query, type: integer, description: Number of results to skip for paging}
      - {name: limit, in: query, type: integer, description: Maximum number of results to return}
      - {name: fields, in: query, type: string, description: Comma-delimited list of fields to include in the response}

  - name: get_user_grades
    description: Retrieve all gradebook grades for a specific user in a course
    method: GET
    path: /learn/api/public/v2/courses/{courseId}/gradebook/users/{userId}
    params:
      - {name: courseId, in: path, type: string, required: true, description: "The course ID (primary, externalId:, courseId:, or uuid: prefix)"}
      - {name: userId, in: path, type: string, required: true, description: "The user ID (primary, externalId:, or userName: prefix)"}
      - {name: offset, in: query, type: integer, description: Number of results to skip for paging}
      - {name: limit, in: query, type: integer, description: Maximum number of results to return}
      - {name: fields, in: query, type: string, description: Comma-delimited list of fields to include in the response}

  - name: create_course_announcement
    description: Create a new announcement in the Blackboard Learn system, optionally scoped to a course
    method: POST
    path: /learn/api/public/v1/announcements
    params:
      - {name: subject, in: body, type: string, required: true, description: Subject/title of the announcement}
      - {name: body, in: body, type: string, required: true, description: Body text/HTML content of the announcement}
      - {name: courseId, in: body, type: string, description: Course ID to scope the announcement to a specific course}
      - {name: showAtLogin, in: body, type: boolean, description: Whether to show the announcement when users log in}
      - {name: showInCourses, in: body, type: boolean, description: Whether to show the announcement in courses}

  - name: create_course
    description: Create a new course in the Blackboard Learn instance
    method: POST
    path: /learn/api/public/v1/courses
    params:
      - {name: courseId, in: body, type: string, description: External course identifier (e.g. MATH101)}
      - {name: name, in: body, type: string, required: true, description: Display name of the course}
      - {name: description, in: body, type: string, description: Course description}
      - {name: dataSourceId, in: body, type: string, description: Data source ID for the course}
      - {name: termId, in: body, type: string, description: Term ID to associate the course with}

  - name: update_course
    description: Update properties of an existing course
    method: PATCH
    path: /learn/api/public/v1/courses/{courseId}
    params:
      - {name: courseId, in: path, type: string, required: true, description: "The course ID (primary, externalId:, courseId:, or uuid: prefix)"}
      - {name: name, in: body, type: string, description: New display name for the course}
      - {name: description, in: body, type: string, description: New description for the course}
      - {name: dataSourceId, in: body, type: string, description: New data source ID for the course}

  - name: create_assignment
    description: Create a new Ultra assignment in a course
    method: POST
    path: /learn/api/public/v1/courses/{courseId}/contents/createAssignment
    params:
      - {name: courseId, in: path, type: string, required: true, description: "The course ID (primary, externalId:, courseId:, or uuid: prefix)"}
      - {name: title, in: body, type: string, required: true, description: Title of the assignment}
      - {name: instructions, in: body, type: string, description: Instructions or description for the assignment}
      - {name: gradeColumnName, in: body, type: string, description: Name for the associated grade column}
      - {name: points, in: body, type: number, description: Maximum points achievable on the assignment}

  - name: record_attendance
    description: Record attendance for a user at a course meeting
    method: POST
    path: /learn/api/public/v1/courses/{courseId}/meetings/{meetingId}/users
    params:
      - {name: courseId, in: path, type: string, required: true, description: "The course ID (primary, externalId:, courseId:, or uuid: prefix)"}
      - {name: meetingId, in: path, type: string, required: true, description: The meeting ID within the course}
      - {name: userId, in: body, type: string, required: true, description: "The user ID to record attendance for (primary, externalId:, or userName: prefix)"}
      - {name: status, in: body, type: string, required: true, description: "Attendance status: Present, Absent, Late, or Excused"}
