schemaVersion: 1
name: blackboard
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/blackboard-mcp
  digest: sha256:98b06ef4d39d4445493f46b0e02b18151a3b315e0f21c8bb44b1faf9e69d66c6
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: Blackboard
category: productivity
entitlements:
  egress:
    # Blackboard Learn REST API is served from the institution's tenant
    # host (Learn SaaS), which also hosts the OAuth2 token endpoint.
    - "*.blackboard.com"
credentials:
  - id: blackboard_token
    type: oauth2
    provider: blackboard
    vendor: blackboard
    scopes: [read, write, delete, offline]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_courses
    default: true
  - name: get_course
    default: true
  - name: list_course_announcements
    default: true
  - name: list_course_users
    default: true
  - name: get_user_grades
    default: true
  - name: create_course_announcement
    default: false
  - name: create_course
    default: false
  - name: update_course
    default: false
  - name: create_assignment
    default: false
  - name: record_attendance
    default: false
