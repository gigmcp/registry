schemaVersion: 1
name: googletasks
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/googletasks-mcp
  digest: sha256:45e666e87a16bde0c3f9ebc214623bdc37ee1d1605a604d6df08fb8be47ec65f
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - tasks.googleapis.com
    - www.googleapis.com
credentials:
  - id: googletasks_token
    type: oauth2
    provider: googletasks
    scopes:
      - "https://www.googleapis.com/auth/tasks"
      - "https://www.googleapis.com/auth/tasks.readonly"
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_task_lists
    default: true
  - name: get_task_list
    default: true
  - name: list_tasks
    default: true
  - name: get_task
    default: true
  - name: insert_task
    default: false
  - name: patch_task
    default: false
  - name: move_task
    default: false
  - name: delete_task
    default: false
  - name: create_task_list
    default: false
