schemaVersion: 1
name: googletasks
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/googletasks-mcp
  digest: sha256:ef016318e0da6fb05f074787729d358d3f6b9585da1de106100fbfc5f5e435d8
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: Google Tasks
category: productivity
entitlements:
  egress:
    - tasks.googleapis.com
    - www.googleapis.com
credentials:
  - id: googletasks_token
    type: oauth2
    provider: googletasks
    vendor: google
    scopes:
      - "https://www.googleapis.com/auth/tasks"
      - "https://www.googleapis.com/auth/tasks.readonly"
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_task_lists
    default: true
  - name: get_task_list
    default: true
  - name: list_tasks
    default: true
  - name: get_task
    default: true
  - name: insert_task
    default: false
  - name: patch_task
    default: false
  - name: move_task
    default: false
  - name: delete_task
    default: false
  - name: create_task_list
    default: false
