  - name: list_persons
    default: true
  - name: get_person
    default: true
  - name: list_opportunities
    default: true
  - name: get_opportunity
    default: true
  - name: list_lists
    default: true
  - name: list_list_entries
    default: true
  - name: get_list_fields
    default: true
  - name: get_current_user
    default: true
