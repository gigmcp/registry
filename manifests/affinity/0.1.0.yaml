schemaVersion: 1
name: affinity
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/affinity-mcp
  digest: sha256:95d3fa33fc493c43f15e8cd4fe0733aa07ba9cf7be79575de323b4c8c484696d
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.affinity.co
credentials:
  - id: affinity_api_key
    type: api_key
    provider: affinity
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_companies
    default: true
  - name: get_company
    default: true
  - name: list_persons
    default: true
  - name: get_person
    default: true
  - name: list_opportunities
    default: true
  - name: get_opportunity
    default: true
  - name: list_lists
    default: true
  - name: list_list_entries
    default: true
  - name: get_list_fields
    default: true
  - name: get_current_user
    default: true
