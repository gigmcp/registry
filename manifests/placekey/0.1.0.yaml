schemaVersion: 1
name: placekey
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/placekey-mcp
  digest: sha256:59ea39f0dc5ee2d4528a392702a43bcc3494e785f50415156da27e6fa28d86de
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.placekey.io
credentials:
  - id: placekey_api_key
    type: api_key
    provider: placekey
    inject:
      header: apikey
      format: "{token}"
tools:
  - name: get_placekey
    default: true
  - name: get_placekey_from_address
    default: true
  - name: get_placekeys_bulk
    default: true
  - name: get_geocode_from_address
    default: true
  - name: lineage_placekey
    default: true
