schemaVersion: 1
name: foursquare
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/foursquare-mcp
  digest: sha256:d660fa809afda34aa3e8fcea2657df458a09af6ae3210138fc7ed582f7018410
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.foursquare.com
    - places-api.foursquare.com
credentials:
  - id: foursquare_api_key
    type: api_key
    provider: foursquare
    inject:
      # Foursquare Places API v3 expects the raw API key in the
      # Authorization header (no Bearer prefix).
      header: Authorization
      format: "{token}"
tools:
  - name: search_places
    default: true
  - name: get_nearby_places
    default: true
  - name: get_place_details
    default: true
  - name: get_place_photos
    default: true
  - name: get_place_tips
    default: true
