schemaVersion: 1
name: lever
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/lever-mcp
  digest: sha256:def1b85a4291ba18da7bbf0e5fd224a88ecf256fa0cd36ca113371ebe77f445d
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: Lever
category: HR/ATS
entitlements:
  egress:
    # Lever ATS REST API plus the OAuth authorization/token host.
    - api.lever.co
    - auth.lever.co
credentials:
  - id: lever_token
    type: oauth2
    provider: lever
    vendor: lever
    scopes: [opportunities:read:admin, postings:read:admin, users:read:admin, notes:write:admin, opportunities:write:admin]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_opportunities
    default: true
  - name: get_opportunity
    default: true
  - name: list_postings
    default: true
  - name: list_stages
    default: true
  - name: list_users
    default: true
  - name: list_notes
    default: true
  - name: create_opportunity
    default: false
  - name: create_note
    default: false
  - name: add_opportunity_tags
    default: false
  - name: create_interview
    default: false
