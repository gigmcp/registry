schemaVersion: 1
name: gorgias
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/gorgias-mcp
  digest: sha256:1edffd35426f204bba6dcbee9708d8b68f765e13c4a96f75cfc42804d4b93719
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: Gorgias
category: support
icon: icons/gorgias.svg
entitlements:
  egress:
    # Gorgias serves its REST API per-account (<account>.gorgias.com/api).
    - gorgias.com
    - "*.gorgias.com"
credentials:
  - id: gorgias_token
    type: oauth2
    provider: gorgias
    vendor: gorgias
    scopes: [openid, email, profile, offline, write:all]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_tickets
    default: true
  - name: get_ticket
    default: true
  - name: list_customers
    default: true
  - name: get_customer
    default: true
  - name: list_teams
    default: true
  - name: create_ticket
    default: false
  - name: update_ticket
    default: false
  - name: create_customer
    default: false
  - name: add_ticket_tags
    default: false
  - name: merge_customers
    default: false
