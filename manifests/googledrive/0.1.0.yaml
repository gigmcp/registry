schemaVersion: 1
name: googledrive
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/googledrive-mcp
  digest: sha256:d115c5c756b98b47f35ca75bae9140fb89ef19be52a48c3a38a881e39e2d5586
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: Google Drive
category: storage
icon: icons/googledrive.svg
entitlements:
  egress:
    - www.googleapis.com
    - oauth2.googleapis.com
credentials:
  - id: googledrive_token
    type: oauth2
    provider: googledrive
    vendor: google
    scopes:
      [
        https://www.googleapis.com/auth/drive,
        https://www.googleapis.com/auth/drive.file,
        https://www.googleapis.com/auth/drive.readonly,
      ]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: find_file
    default: true
  - name: list_files
    default: true
  - name: get_file_metadata
    default: true
  - name: download_file
    default: true
  - name: list_permissions
    default: true
  - name: upload_file
    default: false
  - name: create_folder
    default: false
  - name: move_file
    default: false
  - name: copy_file
    default: false
  - name: delete_file
    default: false
