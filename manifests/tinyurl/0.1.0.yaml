schemaVersion: 1
name: tinyurl
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/tinyurl-mcp
  digest: sha256:0af8ec7ad867b316cdc1cff0d6e51ba54162d3f306eaf8eda5a705b7c3e457c8
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.tinyurl.com
credentials:
  - id: tinyurl_api_key
    type: api_key
    provider: tinyurl
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_urls
    default: true
  - name: get_url_info
    default: true
  - name: get_url_analytics
    default: true
  - name: create_short_url
    default: false
  - name: update_url
    default: false
  - name: archive_url
    default: false
