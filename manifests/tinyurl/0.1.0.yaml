schemaVersion: 1
name: tinyurl
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/tinyurl-mcp
  digest: sha256:6bb807687fce31a152fb1ef14dd429cbf03e133da8290ec701d7e6117e9f9b2d
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: TinyURL
category: dev-tools
icon: icons/tinyurl.svg
entitlements:
  egress:
    - api.tinyurl.com
credentials:
  - id: tinyurl_api_key
    type: api_key
    provider: tinyurl
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_urls
    default: true
  - name: get_url_info
    default: true
  - name: get_url_analytics
    default: true
  - name: create_short_url
    default: false
  - name: update_url
    default: false
  - name: archive_url
    default: false
