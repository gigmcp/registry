schemaVersion: 1
name: hackerrank-work
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/hackerrank-work-mcp
  digest: sha256:12190f171e316ea413e3700a5ce4408d29518a4ea1d8aad46c309c45fa31ddf9
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - www.hackerrank.com
credentials:
  - id: hackerrank_work_api_key
    type: api_key
    provider: hackerrank-work
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_companies
    default: true
  - name: get_sso_sign_on_url
    default: true
  - name: list_tests
    default: true
  - name: get_test
    default: true
  - name: list_test_candidates
    default: true
  - name: invite_test_candidate
    default: false
  - name: consume_saml_assertion
    default: false
