schemaVersion: 1
name: ynab
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/ynab-mcp
  digest: sha256:ca0d963eb410a5677aa4a08ecec91c1c53c8abb773b65ae492f2cb3dc8d22ffb
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.ynab.com
    - app.ynab.com
credentials:
  - id: ynab_token
    type: oauth2
    provider: ynab
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_budgets
    default: true
  - name: list_accounts
    default: true
  - name: list_transactions
    default: true
  - name: list_categories
    default: true
  - name: get_budget_month
    default: true
  - name: list_scheduled_transactions
    default: true
  - name: create_account
    default: false
  - name: create_scheduled_transaction
    default: false
  - name: update_payee
    default: false
