schemaVersion: 1
name: ynab
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/ynab-mcp
  digest: sha256:e45dfeee61dc08dbc839cc22bb5266a35ed14d039cca429091b9ceb57d9a3ac8
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: YNAB
category: finance
icon: icons/ynab.svg
entitlements:
  egress:
    - api.ynab.com
    - app.ynab.com
credentials:
  - id: ynab_token
    type: oauth2
    provider: ynab
    vendor: ynab
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_budgets
    default: true
  - name: list_accounts
    default: true
  - name: list_transactions
    default: true
  - name: list_categories
    default: true
  - name: get_budget_month
    default: true
  - name: list_scheduled_transactions
    default: true
  - name: create_account
    default: false
  - name: create_scheduled_transaction
    default: false
  - name: update_payee
    default: false
