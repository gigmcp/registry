schemaVersion: 1
name: smugmug
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/smugmug-mcp
  digest: sha256:361b758fc95d56c90b59230fcd30331b4c395a3e4a9d8f1544b04666e2626963
  entrypoint: /app/server
  builder: toolpack
# entrusted: SmugMug v2 API keys are passed as the APIKey query parameter,
# so header injection cannot work.
tier: entrusted
displayName: SmugMug
category: storage
icon: icons/smugmug.svg
entitlements:
  egress:
    - api.smugmug.com
credentials:
  - id: smugmug_api_key
    type: api_key
    provider: smugmug
    inject:
      env: SMUGMUG_API_KEY
tools:
  - name: get_user
    default: true
  - name: get_user_root_node
    default: true
  - name: list_child_nodes
    default: true
  - name: get_folder_albums
    default: true
  - name: get_album
    default: true
  - name: get_album_images
    default: true
  - name: get_image
    default: true
  - name: search_user_content
    default: true
  - name: unlock_album
    default: false
