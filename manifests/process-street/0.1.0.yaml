schemaVersion: 1
name: process-street
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/process-street-mcp
  digest: sha256:dbfff1ec27c37f2f0efe1243991272d02293941b3d5be71a1a64e899042a81e8
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: Process Street
category: productivity
entitlements:
  egress:
    - public-api.process.st
credentials:
  - id: process_street_api_key
    type: api_key
    provider: process-street
    inject:
      header: X-API-KEY
      format: "{token}"
tools:
  - name: list_workflows
    default: true
  - name: list_workflow_runs
    default: true
  - name: find_data_set_rows
    default: true
  - name: create_workflow_run
    default: false
  - name: complete_workflow_run
    default: false
  - name: undelete_workflow_run
    default: false
