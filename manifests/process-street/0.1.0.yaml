schemaVersion: 1
name: process-street
version: 0.1.0
source:
  repo: github.com/gigmcp/process-street-mcp
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/process-street-mcp
  # PLACEHOLDER until build-images CI emits the real digest — see README.
  digest: sha256:0e96fc013221ebde231554766daa2680441077cf2a94cdb25cc8a8df858002f8
  entrypoint: /app/server
tier: sealed
entitlements:
  egress:
