schemaVersion: 1
name: cal
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/cal-mcp
  digest: sha256:07d09223996bc3b62c4330a44dd58f393669e15cbc2d6ea9616300d2fa71c21b
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.cal.com
credentials:
  - id: cal_api_key
    type: api_key
    provider: cal
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_bookings
    default: true
  - name: get_event_types
    default: true
  - name: get_available_slots
    default: true
  - name: get_schedules
    default: true
  - name: create_booking
    default: false
  - name: cancel_booking
    default: false
  - name: confirm_booking
    default: false
  - name: create_event_type
    default: false
