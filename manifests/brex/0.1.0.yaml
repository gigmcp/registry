schemaVersion: 1
name: brex
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/brex-mcp
  digest: sha256:3340797074746c79bd806bc4aedb85b6d1d1bbf4093f9c88a07b53405baa78c1
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.brex.com
credentials:
  - id: brex_token
    type: oauth2
    provider: brex
    scopes: [transactions.card.readonly, accounts.cash.readonly, budgets.readonly, expenses.card.readonly, users.readonly]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_cards
    default: true
  - name: get_card_transactions
    default: true
  - name: get_company_cash_accounts
    default: true
  - name: list_expenses
    default: true
  - name: get_expense
    default: true
  - name: list_budgets
    default: true
  - name: list_users
    default: true
  - name: create_expense
    default: false
  - name: update_card_status
    default: false
  - name: create_card
    default: false
