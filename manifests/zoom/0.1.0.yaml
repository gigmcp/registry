schemaVersion: 1
name: zoom
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/zoom-mcp
  digest: sha256:0987763b09dec00a760af3fa90ac16ca4e3e9bc766a401cb22f590f7bb6fe20a
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.zoom.us
credentials:
  - id: zoom_token
    type: oauth2
    provider: zoom
    scopes: [meeting:read, meeting:write, recording:read, user:read, webinar:read]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_a_meeting
    default: true
  - name: create_a_meeting
    default: false
  - name: delete_a_meeting
    default: false
  - name: get_a_meeting_summary
    default: true
  - name: add_a_meeting_registrant
    default: false
  - name: get_meeting_recordings
    default: true
  - name: get_past_meeting_participants
    default: true
  - name: get_a_webinar
    default: true
  - name: get_user
    default: true
