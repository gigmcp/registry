schemaVersion: 1
name: google-analytics
version: 0.1.0
baseUrl: https://analyticsdata.googleapis.com
tools:
  - name: run_report
    description: Returns a customized report of Google Analytics event data for a property
    method: POST
    path: /v1beta/{property}:runReport
    params:
      - {name: property, in: path, type: string, required: true, description: "GA4 property identifier. Format: properties/1234"}
      - {name: dimensions, in: body, type: array, description: "Dimensions to request and display in the report"}
      - {name: metrics, in: body, type: array, description: "Metrics to request and display in the report"}
      - {name: dateRanges, in: body, type: array, description: "Date ranges for which to retrieve event data"}
      - {name: dimensionFilter, in: body, type: object, description: "Filter clause for dimensions; metrics cannot be used here"}
      - {name: metricFilter, in: body, type: object, description: "Filter clause applied after aggregation, similar to SQL HAVING clause"}
      - {name: limit, in: body, type: integer, description: "Number of rows to return (default 10000, max 250000)"}
      - {name: offset, in: body, type: integer, description: "Starting row position for pagination (first row is 0)"}
      - {name: orderBys, in: body, type: array, description: "Specifies row ordering in the response"}
      - {name: keepEmptyRows, in: body, type: boolean, description: "If true, includes rows where all metrics equal zero"}
      - {name: returnPropertyQuota, in: body, type: boolean, description: "If true, returns the current state of the property quota"}
  - name: run_realtime_report
    description: Returns a customized report of realtime event data for a Google Analytics property (present moment up to 30 minutes ago)
    method: POST
    path: /v1beta/{property}:runRealtimeReport
    params:
      - {name: property, in: path, type: string, required: true, description: "GA4 property identifier. Format: properties/1234"}
      - {name: dimensions, in: body, type: array, description: "Dimensions to request and display in the report"}
      - {name: metrics, in: body, type: array, description: "Metrics to request and display in the report"}
      - {name: dimensionFilter, in: body, type: object, description: "Filter clause for dimensions; metrics cannot be used here"}
      - {name: metricFilter, in: body, type: object, description: "Filter clause applied after aggregation"}
      - {name: limit, in: body, type: integer, description: "Number of rows to return (default 10000)"}
      - {name: minuteRanges, in: body, type: array, description: "Minute ranges of event data to read (default: last 30 minutes)"}
      - {name: orderBys, in: body, type: array, description: "Specifies row ordering in the response"}
      - {name: returnPropertyQuota, in: body, type: boolean, description: "If true, returns the current state of the property quota"}
  - name: run_pivot_report
    description: Returns a customized pivot report of Google Analytics event data for a property
    method: POST
    path: /v1beta/{property}:runPivotReport
    params:
      - {name: property, in: path, type: string, required: true, description: "GA4 property identifier. Format: properties/1234"}
      - {name: dimensions, in: body, type: array, description: "Dimensions requested; must be used in a dimensionExpression, dimensionFilter, pivot, or orderBy"}
      - {name: metrics, in: body, type: array, description: "Metrics requested; at least one metric must be specified"}
      - {name: dateRanges, in: body, type: array, description: "Date ranges for which to retrieve event data"}
      - {name: pivots, in: body, type: array, description: "Describes the visual format of dimensions in columns or rows"}
      - {name: dimensionFilter, in: body, type: object, description: "Filter clause for dimensions"}
      - {name: metricFilter, in: body, type: object, description: "Filter clause applied after aggregation"}
      - {name: keepEmptyRows, in: body, type: boolean, description: "If true, includes rows where all metrics equal zero"}
      - {name: returnPropertyQuota, in: body, type: boolean, description: "If true, returns the current state of the property quota"}
  - name: list_account_summaries
    description: Returns summaries of all Google Analytics accounts accessible by the caller
    method: GET
    path: /v1beta/accountSummaries
    baseUrl: https://analyticsadmin.googleapis.com
    params:
      - {name: pageSize, in: query, type: integer, description: "Maximum number of AccountSummary resources to return (default 50, max 200)"}
      - {name: pageToken, in: query, type: string, description: "Page token received from a previous accountSummaries.list call for pagination"}
  - name: list_properties_filtered
    description: Returns child properties under the specified parent account or filtered by a given expression
    method: GET
    path: /v1beta/properties
    baseUrl: https://analyticsadmin.googleapis.com
    params:
      - {name: filter, in: query, type: string, required: true, description: "Filter expression; eligible fields are parent:, ancestor:, or firebase_project:"}
      - {name: pageSize, in: query, type: integer, description: "Maximum number of resources to return (default 50, max 200)"}
      - {name: pageToken, in: query, type: string, description: "Page token received from a previous properties.list call for pagination"}
      - {name: showDeleted, in: query, type: boolean, description: "Whether to include soft-deleted properties in results"}
  - name: get_property
    description: Returns the specified Google Analytics property
    method: GET
    path: /v1beta/{name}
    baseUrl: https://analyticsadmin.googleapis.com
    params:
      - {name: name, in: path, type: string, required: true, description: "The name of the property to look up. Format: properties/{property_id}"}
  - name: get_metadata
    description: Returns metadata for dimensions and metrics available in Google Analytics reporting for a property
    method: GET
    path: /v1beta/{name}
    params:
      - {name: name, in: path, type: string, required: true, description: "Resource name of the metadata to retrieve. Format: properties/{propertyId}/metadata"}
  - name: check_compatibility
    description: Lists dimensions and metrics compatible with each other and with a given set of filters for Core reports
    method: POST
    path: /v1beta/{property}:checkCompatibility
    params:
      - {name: property, in: path, type: string, required: true, description: "GA4 property identifier whose events are tracked. Format: properties/1234"}
      - {name: dimensions, in: body, type: array, description: "Dimensions to check compatibility for; should match a runReport request"}
      - {name: metrics, in: body, type: array, description: "Metrics to check compatibility for; should match a runReport request"}
      - {name: dimensionFilter, in: body, type: object, description: "Dimension filter to check; should match a runReport request"}
      - {name: metricFilter, in: body, type: object, description: "Metric filter to check; should match a runReport request"}
      - {name: compatibilityFilter, in: body, type: string, description: "Filters response to dimensions and metrics matching this compatibility value"}
  - name: create_custom_dimension
    description: Creates a custom dimension for a Google Analytics property
    method: POST
    path: /v1beta/{parent}/customDimensions
    baseUrl: https://analyticsadmin.googleapis.com
    params:
      - {name: parent, in: path, type: string, required: true, description: "The property to create the custom dimension for. Format: properties/1234"}
      - {name: parameterName, in: body, type: string, required: true, description: "Tagging parameter name for this custom dimension (immutable, max 24 chars for user-scoped, 40 for event-scoped)"}
      - {name: displayName, in: body, type: string, required: true, description: "Display name for this custom dimension as shown in the Analytics UI (max 82 characters)"}
      - {name: scope, in: body, type: string, required: true, description: "The scope of this dimension (immutable). Valid values: EVENT, USER, or ITEM"}
      - {name: description, in: body, type: string, description: "Optional description for this custom dimension (max 150 characters)"}
      - {name: disallowAdsPersonalization, in: body, type: boolean, description: "If true, sets this dimension as NPA and excludes it from ads personalization (user-scoped only)"}
  - name: update_property
    description: Updates the specified Google Analytics property
    method: PATCH
    path: /v1beta/{property_name}
    baseUrl: https://analyticsadmin.googleapis.com
    params:
      - {name: property_name, in: path, type: string, required: true, description: "Resource name of this property. Format: properties/{property_id}"}
      - {name: updateMask, in: query, type: string, required: true, description: "The list of fields to be updated in snake_case FieldMask format"}
      - {name: displayName, in: body, type: string, description: "Human-readable display name for the property"}
      - {name: industryCategory, in: body, type: string, description: "Industry associated with the property"}
      - {name: timeZone, in: body, type: string, description: "Reporting time zone used for this property"}
      - {name: currencyCode, in: body, type: string, description: "The currency type used for reporting (ISO 4217 format)"}
