schemaVersion: 1
name: mailchimp
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/mailchimp-mcp
  digest: sha256:871aca0a8f65d6e78a5c07ebe87254cf816de933d592e30ec70ebdb48759c3a8
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: Mailchimp
category: marketing
entitlements:
  egress:
    - login.mailchimp.com
    - "*.api.mailchimp.com"
credentials:
  - id: mailchimp_token
    type: oauth2
    provider: mailchimp
    vendor: mailchimp
    inject:
      header: Authorization
      format: "OAuth {token}"
tools:
  - name: get_lists
    default: true
  - name: get_list_members
    default: true
  - name: get_campaigns
    default: true
  - name: get_campaign_report
    default: true
  - name: get_segments
    default: true
  - name: add_or_update_list_member
    default: false
  - name: add_member_tags
    default: false
  - name: add_campaign
    default: false
  - name: send_campaign
    default: false
  - name: batch_subscribe_or_unsubscribe
    default: false
