schemaVersion: 1
name: zoho-bigin
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/zoho-bigin-mcp
  digest: sha256:516cfab059b22a910d06243387583ae0912bb268eba78977eaa9ad7d5a89a236
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    # Zoho Bigin REST API (multi-DC: zohoapis.com/.eu/.in served via subdomains)
    # plus the accounts host for OAuth token refresh.
    - www.zohoapis.com
    - "*.zohoapis.com"
    - accounts.zoho.com
credentials:
  - id: zoho-bigin_token
    type: oauth2
    provider: zoho-bigin
    scopes: [ZohoBigin.modules.READ, ZohoBigin.modules.CREATE, ZohoBigin.settings.READ, ZohoBigin.users.READ]
    inject:
      header: Authorization
      format: "Zoho-oauthtoken {token}"
tools:
  - name: get_modules
    default: true
  - name: get_records
    default: true
  - name: get_record
    default: true
  - name: search_records
    default: true
  - name: get_related_records
    default: true
  - name: get_users
    default: true
  - name: add_records
    default: false
  - name: update_records
    default: false
  - name: upsert_records
    default: false
  - name: delete_record
    default: false
