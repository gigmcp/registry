schemaVersion: 1
name: rafflys
version: 0.1.0
baseUrl: https://app-sorteos.com
tools:
  - name: get_current_user
    description: Retrieve the authenticated user's account details
    method: GET
    path: /api/v2/users/me
  - name: list_promotions
    description: List all promotions for the authenticated account with optional pagination
    method: GET
    path: /api/v2/promotions
    params:
      - {name: page, in: query, type: integer, description: "Page number (default 1)"}
      - {name: per_page, in: query, type: integer, description: "Results per page (1-100, default 50)"}
  - name: get_promotion
    description: Retrieve details of a single promotion by its ID
    method: GET
    path: /api/v2/promotions/{id}
    params:
      - {name: id, in: path, type: string, required: true, description: The promotion ID}
  - name: list_participants
    description: List participants (leads) collected for a promotion
    method: GET
    path: /api/v2/promotions/{id}/leads
    params:
      - {name: id, in: path, type: string, required: true, description: The promotion ID}
  - name: create_promotion
    description: Create a new promotion
    method: POST
    path: /api/v2/promotions
    params:
      - {name: name, in: body, type: string, required: true, description: Name of the promotion}
