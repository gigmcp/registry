schemaVersion: 1
name: rafflys
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/rafflys-mcp
  digest: sha256:24b233d813417b24a3b4545ec5665c31c01b43cc3970a24ca5efe652979170e9
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - app-sorteos.com
credentials:
  - id: rafflys_api_key
    type: api_key
    provider: rafflys
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_current_user
    default: true
  - name: list_promotions
    default: true
  - name: get_promotion
    default: true
  - name: list_participants
    default: true
  - name: create_promotion
    default: false
