schemaVersion: 1
name: rafflys
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/rafflys-mcp
  digest: sha256:2e54bce5e4e4d097eee96d038a7c5665663ecbfb7146fa70eb52b29cd0476b26
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - app-sorteos.com
credentials:
  - id: rafflys_api_key
    type: api_key
    provider: rafflys
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_current_user
    default: true
  - name: list_promotions
    default: true
  - name: get_promotion
    default: true
  - name: list_participants
    default: true
  - name: create_promotion
    default: false
