schemaVersion: 1
name: peopledatalabs
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/peopledatalabs-mcp
  digest: sha256:82e8e0ebfedf91437e5a5ab98dad744a768f9c968e4297fe1ec404c4d4ef6b4e
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: People Data Labs
category: data
icon: icons/peopledatalabs.svg
entitlements:
  egress:
    - api.peopledatalabs.com
credentials:
  - id: peopledatalabs_api_key
    type: api_key
    provider: peopledatalabs
    inject:
      header: X-Api-Key
      format: "{token}"
tools:
  - name: enrich_person
    default: true
  - name: enrich_company
    default: true
  - name: enrich_ip
    default: true
  - name: identify_person
    default: true
  - name: person_search
    default: true
  - name: company_search
    default: true
  - name: clean_company
    default: true
  - name: clean_location
    default: true
  - name: autocomplete
    default: true
