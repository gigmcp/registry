schemaVersion: 1
name: monday
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/monday-mcp
  digest: sha256:2f057f780aba22c1d522722b29e34cfbacfb8b530a03fa2851c098fb851a4681
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: monday.com
category: productivity
icon: icons/monday.svg
entitlements:
  egress:
    - api.monday.com
credentials:
  - id: monday_token
    type: oauth2
    provider: monday
    vendor: monday
    scopes: [boards:read, boards:write, workspaces:read, users:read, updates:write]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_boards
    default: true
  - name: get_board_items
    default: true
  - name: get_workspaces
    default: true
  - name: get_users
    default: true
  - name: create_item
    default: false
  - name: create_board
    default: false
  - name: create_update
    default: false
  - name: change_column_value
    default: false
  - name: delete_item
    default: false
