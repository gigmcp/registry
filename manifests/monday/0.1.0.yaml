schemaVersion: 1
name: monday
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/monday-mcp
  digest: sha256:ae319c5bf6eafde3b0a641122dc00796004f394c93c49579ec2a7cf6cd5bd337
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.monday.com
credentials:
  - id: monday_token
    type: oauth2
    provider: monday
    scopes: [boards:read, boards:write, workspaces:read, users:read, updates:write]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_boards
    default: true
  - name: get_board_items
    default: true
  - name: get_workspaces
    default: true
  - name: get_users
    default: true
  - name: create_item
    default: false
  - name: create_board
    default: false
  - name: create_update
    default: false
  - name: change_column_value
    default: false
  - name: delete_item
    default: false
