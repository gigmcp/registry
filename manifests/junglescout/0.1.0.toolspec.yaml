schemaVersion: 1
name: junglescout
version: 0.1.0
baseUrl: https://developer.junglescout.com
tools:
  - name: query_product_database
    description: Query the Jungle Scout product database with filters to identify Amazon products matching specific criteria
    method: POST
    path: /api/product_database_query
    params:
      - {name: marketplace, in: query, type: string, required: true, description: "Amazon marketplace code (us, uk, de, in, ca, fr, it, es, mx, jp)"}
      - {name: "page[size]", in: query, type: integer, description: Number of results per page}
      - {name: "page[cursor]", in: query, type: string, description: Cursor for pagination}
      - {name: sort, in: query, type: string, description: "Field to sort by; prefix with - for descending (e.g. -revenue)"}
      - {name: include_keywords, in: body, type: array, description: Keywords that must appear in the product listing}
      - {name: exclude_keywords, in: body, type: array, description: Keywords to exclude from results}
      - {name: categories, in: body, type: array, description: Amazon product categories to filter by}
      - {name: product_tiers, in: body, type: array, description: "Product tier filters (e.g. standard, oversize)"}
      - {name: seller_types, in: body, type: array, description: "Seller type filters (e.g. fba, fbm, amazon)"}
      - {name: exclude_unavailable_products, in: body, type: boolean, description: Exclude out-of-stock or unavailable products}

  - name: get_keyword_data
    description: Retrieve keyword ideas and metrics for a seed keyword to discover keyword opportunities
    method: POST
    path: /api/keywords/keywords_by_keyword_query
    params:
      - {name: marketplace, in: query, type: string, required: true, description: "Amazon marketplace code (us, uk, de, in, ca, fr, it, es, mx, jp)"}
      - {name: "page[size]", in: query, type: integer, description: Number of results per page}
      - {name: "page[cursor]", in: query, type: string, description: Cursor for pagination}
      - {name: sort, in: query, type: string, description: "Field to sort by; prefix with - for descending"}
      - {name: search_terms, in: body, type: string, required: true, description: Seed keyword to find related keywords for}
      - {name: categories, in: body, type: array, description: Amazon categories to filter results}

  - name: get_keywords_by_asin
    description: Discover which keywords drive traffic to specific Amazon products by ASIN
    method: POST
    path: /api/keywords/keywords_by_asin_query
    params:
      - {name: marketplace, in: query, type: string, required: true, description: "Amazon marketplace code (us, uk, de, in, ca, fr, it, es, mx, jp)"}
      - {name: "page[size]", in: query, type: integer, description: Number of results per page}
      - {name: "page[cursor]", in: query, type: string, description: Cursor for pagination}
      - {name: sort, in: query, type: string, description: "Field to sort by; prefix with - for descending"}
      - {name: asins, in: body, type: array, required: true, description: "One or more ASINs to retrieve keywords for (up to 10)"}
      - {name: include_variants, in: body, type: boolean, description: Whether to include variant ASINs in the analysis}

  - name: get_historical_search_volume
    description: Retrieve weekly historical search volume data for a keyword over a specified date range
    method: GET
    path: /api/keywords/historical_search_volume
    params:
      - {name: marketplace, in: query, type: string, required: true, description: "Amazon marketplace code (us, uk, de, in, ca, fr, it, es, mx, jp)"}
      - {name: keyword, in: query, type: string, required: true, description: Keyword to retrieve historical search volume for}
      - {name: start_date, in: query, type: string, description: "Start date for the historical range (YYYY-MM-DD); max range is 366 days"}
      - {name: end_date, in: query, type: string, description: "End date for the historical range (YYYY-MM-DD)"}

  - name: get_sales_estimates
    description: Retrieve daily estimated sales, price, and rank data for a specific ASIN over a time range
    method: GET
    path: /api/sales_estimates_query
    params:
      - {name: marketplace, in: query, type: string, required: true, description: "Amazon marketplace code (us, uk, de, in, ca, fr, it, es, mx, jp)"}
      - {name: asin, in: query, type: string, required: true, description: Amazon ASIN to retrieve sales estimates for}
      - {name: start_date, in: query, type: string, description: "Start date for the estimates range (YYYY-MM-DD)"}
      - {name: end_date, in: query, type: string, description: "End date for the estimates range (YYYY-MM-DD)"}

  - name: get_share_of_voice
    description: Retrieve organic, sponsored, and combined share of voice data for a keyword across top brands and ASINs
    method: GET
    path: /api/share_of_voice
    params:
      - {name: marketplace, in: query, type: string, required: true, description: "Amazon marketplace code (us, uk, de, in, ca, fr, it, es, mx, jp)"}
      - {name: keyword, in: query, type: string, required: true, description: Keyword to retrieve share of voice data for}
