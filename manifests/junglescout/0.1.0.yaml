schemaVersion: 1
name: junglescout
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/junglescout-mcp
  digest: sha256:a7ed36261984b39c91dbd08c315b77923eb3ba7392174654a17c4bab262a9125
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - developer.junglescout.com
credentials:
  - id: junglescout_api_key
    type: api_key
    provider: junglescout
    inject:
      header: Authorization
      format: "{token}"
tools:
  - name: query_product_database
    default: true
  - name: get_keyword_data
    default: true
  - name: get_keywords_by_asin
    default: true
  - name: get_historical_search_volume
    default: true
  - name: get_sales_estimates
    default: true
  - name: get_share_of_voice
    default: true
