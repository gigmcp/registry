schemaVersion: 1
name: junglescout
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/junglescout-mcp
  digest: sha256:d9280f4388d9bd085546922e545350d9ec9437573139ba8b6cd48ad38f27b62d
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: Jungle Scout
category: e-commerce
icon: icons/junglescout.svg
entitlements:
  egress:
    - developer.junglescout.com
credentials:
  - id: junglescout_api_key
    type: api_key
    provider: junglescout
    inject:
      header: Authorization
      format: "{token}"
tools:
  - name: query_product_database
    default: true
  - name: get_keyword_data
    default: true
  - name: get_keywords_by_asin
    default: true
  - name: get_historical_search_volume
    default: true
  - name: get_sales_estimates
    default: true
  - name: get_share_of_voice
    default: true
