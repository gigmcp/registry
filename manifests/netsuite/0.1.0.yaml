schemaVersion: 1
name: netsuite
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/netsuite-mcp
  digest: sha256:10a4b1e927fed97dea4895981cc8f2144d7110c748a88fd68902afeafd32a1f3
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: NetSuite
category: finance
icon: icons/netsuite.svg
entitlements:
  egress:
    - "*.suitetalk.api.netsuite.com"
    - "*.app.netsuite.com"
    - system.netsuite.com
credentials:
  - id: netsuite_token
    type: oauth2
    provider: netsuite
    vendor: netsuite
    scopes: [rest_webservices, restlets, suite_analytics]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: run_suiteql_query
    default: true
  - name: list_records
    default: true
  - name: get_customer
    default: true
  - name: get_invoice
    default: true
  - name: get_sales_order
    default: true
  - name: get_record_metadata
    default: true
  - name: create_customer
    default: false
  - name: create_invoice
    default: false
  - name: create_sales_order
    default: false
  - name: update_customer
    default: false
