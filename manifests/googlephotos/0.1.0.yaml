schemaVersion: 1
name: googlephotos
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/googlephotos-mcp
  digest: sha256:088e01fea709c10cd6e51d246f572bf6396b501552dfa99643d1f4651c64bd56
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: Google Photos
category: storage
entitlements:
  egress:
    - photoslibrary.googleapis.com
credentials:
  - id: googlephotos_token
    type: oauth2
    provider: googlephotos
    vendor: google
    scopes:
      [
        https://www.googleapis.com/auth/photoslibrary.readonly.appcreateddata,
        https://www.googleapis.com/auth/photoslibrary.appendonly,
        https://www.googleapis.com/auth/photoslibrary.edit.appcreateddata,
      ]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_albums
    default: true
  - name: get_album
    default: true
  - name: list_media_items
    default: true
  - name: search_media_items
    default: true
  - name: batch_get_media_items
    default: true
  - name: download_media_item
    default: true
  - name: create_album
    default: false
  - name: update_album
    default: false
  - name: upload_media
    default: false
  - name: batch_create_media_items
    default: false
