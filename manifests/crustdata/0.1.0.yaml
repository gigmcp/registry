schemaVersion: 1
name: crustdata
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/crustdata-mcp
  digest: sha256:6602b2636b7dd396dfbddf6116adc1d6452eff2302e14c4dade7484c872abd3e
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.crustdata.com
credentials:
  - id: crustdata_api_key
    type: api_key
    provider: crustdata
    inject:
      header: Authorization
      format: "Token {token}"
tools:
  - name: screen_companies
    default: true
  - name: search_companies
    default: true
  - name: enrich_person
    default: true
  - name: filter_decision_makers
    default: true
  - name: get_headcount_timeseries
    default: true
  - name: get_funding_milestones
    default: true
  - name: get_job_listings
    default: true
  - name: get_web_traffic
    default: true
  - name: get_investor_portfolio
    default: true
  - name: search_linkedin_posts
    default: true
