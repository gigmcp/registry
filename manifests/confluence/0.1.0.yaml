schemaVersion: 1
name: confluence
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/confluence-mcp
  digest: sha256:efb28f505e7cb19ccb7ebe5f1f3fd289e2a7f578ff70cec24682c517ca46d093
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    # Atlassian OAuth 2.0 (3LO) gateway plus per-site Confluence Cloud hosts.
    - api.atlassian.com
    - "*.atlassian.net"
credentials:
  - id: confluence_token
    type: oauth2
    provider: confluence
    scopes: [read:confluence-content.all, write:confluence-content, read:confluence-space.summary, search:confluence, offline_access]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_pages
    default: true
  - name: get_page_by_id
    default: true
  - name: get_child_pages
    default: true
  - name: search_content
    default: true
  - name: get_spaces
    default: true
  - name: get_attachments
    default: true
  - name: create_page
    default: false
  - name: update_page
    default: false
  - name: create_footer_comment
    default: false
  - name: delete_page
    default: false
