schemaVersion: 1
name: figma
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/figma-mcp
  digest: sha256:c9ccbb0fb99d8e5f8dcc35efc8ba2cc21fb99e6b858e61719b6db4ea9daef956
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.figma.com
credentials:
  - id: figma_token
    type: oauth2
    provider: figma
    scopes: [files:read, file_comments:write, file_dev_resources:read, webhooks:write]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_file
    default: true
  - name: get_file_nodes
    default: true
  - name: get_file_comments
    default: true
  - name: add_comment
    default: false
  - name: get_team_components
    default: true
  - name: get_file_styles
    default: true
  - name: render_images_of_file_nodes
    default: true
  - name: create_webhook
    default: false
