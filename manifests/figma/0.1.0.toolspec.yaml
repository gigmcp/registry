schemaVersion: 1
name: figma
version: 0.1.0
baseUrl: https://api.figma.com
tools:
  - name: get_file
    description: Get the JSON document tree for a Figma file
    method: GET
    path: /v1/files/{key}
    params:
      - {name: key, in: path, type: string, required: true, description: File key of the Figma file to retrieve}
      - {name: version, in: query, type: string, description: Specific version ID of the file to retrieve}
      - {name: ids, in: query, type: string, description: "Comma-separated list of node IDs to retrieve; when specified only those nodes and their children are returned"}
      - {name: depth, in: query, type: integer, description: Positive integer indicating how deep into the document tree to traverse}
      - {name: geometry, in: query, type: string, description: "Set to 'paths' to export vector data"}
      - {name: plugin_data, in: query, type: string, description: Comma-separated list of plugin IDs whose data to include}
      - {name: branch_data, in: query, type: boolean, description: Return branch metadata for the main file when true}

  - name: get_file_nodes
    description: Get the JSON subtrees of specific nodes within a Figma file
    method: GET
    path: /v1/files/{key}/nodes
    params:
      - {name: key, in: path, type: string, required: true, description: File key of the Figma file}
      - {name: ids, in: query, type: string, required: true, description: Comma-separated list of node IDs to retrieve from the file}
      - {name: version, in: query, type: string, description: Specific version ID of the file}
      - {name: depth, in: query, type: integer, description: Positive integer indicating how deep into the node tree to traverse}
      - {name: geometry, in: query, type: string, description: "Set to 'paths' to export vector data"}
      - {name: plugin_data, in: query, type: string, description: Comma-separated list of plugin IDs whose data to include}

  - name: get_file_comments
    description: Get a list of comments left on a Figma file
    method: GET
    path: /v1/files/{key}/comments
    params:
      - {name: key, in: path, type: string, required: true, description: "File key to retrieve comments from; accepts file key or branch key"}
      - {name: as_md, in: query, type: boolean, description: Return comments as markdown when true}

  - name: add_comment
    description: Post a new comment on a Figma file
    method: POST
    path: /v1/files/{file_key}/comments
    params:
      - {name: file_key, in: path, type: string, required: true, description: "File key to post the comment on; accepts file key or branch key"}
      - {name: message, in: body, type: string, required: true, description: Text content of the comment}
      - {name: comment_id, in: body, type: string, description: "Root comment ID to reply to; omit to create a top-level comment"}
      - {name: client_meta, in: body, type: object, description: "Placement position for the comment (Vector, FrameOffset, Region, or FrameOffsetRegion)"}

  - name: get_team_components
    description: Get a paginated list of published components for a team
    method: GET
    path: /v1/teams/{team_id}/components
    params:
      - {name: team_id, in: path, type: string, required: true, description: Team identifier whose published components to retrieve}
      - {name: page_size, in: query, type: integer, description: "Number of items per page (default 30, max 1000)"}
      - {name: after, in: query, type: integer, description: Cursor for forward pagination through component list}
      - {name: before, in: query, type: integer, description: Cursor for backward pagination through component list}

  - name: get_file_styles
    description: Get a list of published styles within a Figma file
    method: GET
    path: /v1/files/{file_key}/styles
    params:
      - {name: file_key, in: path, type: string, required: true, description: Key of the main file whose styles to retrieve}

  - name: render_images_of_file_nodes
    description: Render images of specific nodes in a Figma file and return URLs to the rendered images
    method: GET
    path: /v1/images/{key}
    params:
      - {name: key, in: path, type: string, required: true, description: File key of the Figma file}
      - {name: ids, in: query, type: string, required: true, description: Comma-separated list of node IDs to render as images}
      - {name: scale, in: query, type: number, description: "Scale factor for the rendered image (0.01 to 4)"}
      - {name: format, in: query, type: string, description: "Image format: jpg, png, svg, or pdf (default png)"}
      - {name: svg_outline_text, in: query, type: boolean, description: Whether to render text as vector outlines in SVG output}
      - {name: svg_include_id, in: query, type: boolean, description: Whether to include id attributes on SVG elements}
      - {name: svg_include_node_id, in: query, type: boolean, description: Whether to include data-node-id attributes on SVG elements}
      - {name: svg_simplify_stroke, in: query, type: boolean, description: Whether to simplify inside/outside strokes to center strokes in SVG}
      - {name: contents_only, in: query, type: boolean, description: "When false, renders content overlapping the requested nodes (default true)"}
      - {name: use_absolute_bounds, in: query, type: boolean, description: Use the full dimensions of the node regardless of cropping}
      - {name: version, in: query, type: string, description: Specific version ID of the file to render}

  - name: create_webhook
    description: Create a webhook to receive event notifications for a Figma team, project, or file
    method: POST
    path: /v2/webhooks
    params:
      - {name: event_type, in: body, type: string, required: true, description: "Type of event that triggers the webhook (e.g. FILE_UPDATE, FILE_VERSION_UPDATE, FILE_COMMENT, PING)"}
      - {name: context, in: body, type: string, required: true, description: "Context type to subscribe to: team, project, or file"}
      - {name: context_id, in: body, type: string, required: true, description: "ID of the team, project, or file context to receive updates about"}
      - {name: endpoint, in: body, type: string, required: true, description: "HTTPS URL that will receive POST requests when the webhook fires (max 2048 chars)"}
      - {name: passcode, in: body, type: string, required: true, description: "Verification string included in webhook payloads to authenticate delivery (max 100 chars)"}
      - {name: status, in: body, type: string, description: "Initial webhook status; defaults to ACTIVE"}
      - {name: description, in: body, type: string, description: "User-friendly name for the webhook (max 150 chars)"}
