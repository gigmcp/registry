schemaVersion: 1
name: echtpost
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/echtpost-mcp
  digest: sha256:2ffc50ebcdae088f8712ffcc6cc7c275c852cc27f4b650b13c0e88a025a73f44
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.echtpost.de
credentials:
  - id: echtpost_api_key
    type: api_key
    provider: echtpost
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_templates
    default: true
  - name: list_cards
    default: true
  - name: get_card
    default: true
  - name: preview_text_fit
    default: true
  - name: create_card
    default: false
  - name: create_card_from_template
    default: false
  - name: withdraw_card
    default: false
