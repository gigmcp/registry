schemaVersion: 1
name: gmail
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/gmail-mcp
  digest: sha256:c301c5019f28cd7b2940842c8dd2f7a062d55d7f9aaec23f0dd73047ed9ba1cc
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - gmail.googleapis.com
credentials:
  - id: gmail_token
    type: oauth2
    provider: gmail
    scopes:
      [
        https://www.googleapis.com/auth/gmail.readonly,
        https://www.googleapis.com/auth/gmail.send,
        https://www.googleapis.com/auth/gmail.modify,
        https://www.googleapis.com/auth/gmail.labels,
      ]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: fetch_emails
    default: true
  - name: fetch_message_by_message_id
    default: true
  - name: list_threads
    default: true
  - name: list_labels
    default: true
  - name: get_profile
    default: true
  - name: send_email
    default: false
  - name: create_email_draft
    default: false
  - name: reply_to_thread
    default: false
  - name: add_label_to_email
    default: false
  - name: move_to_trash
    default: false
