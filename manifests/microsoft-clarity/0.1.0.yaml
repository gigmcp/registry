schemaVersion: 1
name: microsoft-clarity
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/microsoft-clarity-mcp
  digest: sha256:97638eebcdb1bbcf91f6ed0a0b3219f5836a5b92caa386ba92e84d87844e86fc
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: Microsoft Clarity
category: analytics
entitlements:
  egress:
    - www.clarity.ms
credentials:
  - id: microsoft_clarity_api_key
    type: api_key
    provider: microsoft-clarity
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
