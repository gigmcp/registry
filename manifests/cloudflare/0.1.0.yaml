schemaVersion: 1
name: cloudflare
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/cloudflare-mcp
  digest: sha256:6792fe8f0cf017b0330fe059f7a8f525c2ec048e7a0f141c086e52ad8b0301a5
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.cloudflare.com
credentials:
  - id: cloudflare_token
    type: api_key
    provider: cloudflare
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_zones
    default: true
  - name: list_dns_records
    default: true
  - name: list_accounts
    default: true
  - name: list_firewall_rules
    default: true
  - name: get_bot_management_settings
    default: true
  - name: create_dns_record
    default: false
  - name: update_dns_record
    default: false
  - name: delete_dns_record
    default: false
  - name: create_zone
    default: false
  - name: delete_zone
    default: false
