schemaVersion: 1
name: elevenlabs
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/elevenlabs-mcp
  digest: sha256:4ec773f50cc1131e749442baa6a1d177a194c2d0ca6a20737dc62d61cb6993aa
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.elevenlabs.io
credentials:
  - id: elevenlabs_api_key
    type: api_key
    provider: elevenlabs
    inject:
      header: xi-api-key
      format: "{token}"
tools:
  - name: text_to_speech
    default: false
  - name: speech_to_speech
    default: false
  - name: get_voices
    default: true
  - name: get_voice_settings
    default: true
  - name: add_voice
    default: false
  - name: delete_voice
    default: false
  - name: get_models
    default: true
  - name: get_history
    default: true
  - name: get_subscription_info
    default: true
  - name: get_user_profile
    default: true
