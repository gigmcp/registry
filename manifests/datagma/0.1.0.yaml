schemaVersion: 1
name: datagma
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/datagma-mcp
  digest: sha256:c674a13476ed06483966ddb33162db37c263ff84b1bbc044e24469e46dafba00
  entrypoint: /app/server
  builder: toolpack
# Datagma authenticates via the ?apiId= query parameter on every endpoint,
# so header injection cannot work — entrusted tier with env injection.
tier: entrusted
entitlements:
  egress:
    - gateway.datagma.net
credentials:
  - id: datagma_api_key
    type: api_key
    provider: datagma
    inject:
      env: DATAGMA_API_KEY
tools:
  - name: enrich_person_or_company
    default: true
  - name: find_work_email
    default: true
  - name: detect_job_change
    default: true
  - name: search_phone_numbers
    default: true
  - name: reverse_phone_lookup
    default: true
  - name: get_twitter_by_email
    default: true
  - name: get_twitter_by_username
    default: true
  - name: get_credits
    default: true
