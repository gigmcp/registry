schemaVersion: 1
name: webflow
version: 0.1.0
baseUrl: https://api.webflow.com
tools:
  - name: list_sites
    description: List all sites belonging to the authenticated workspace
    method: GET
    path: /v2/sites

  - name: get_site
    description: Get details of a single Webflow site by its ID
    method: GET
    path: /v2/sites/{site_id}
    params:
      - {name: site_id, in: path, type: string, required: true, description: Unique identifier for the site}

  - name: publish_site
    description: Publish a site to one or more custom domains or the Webflow subdomain
    method: POST
    path: /v2/sites/{site_id}/publish
    params:
      - {name: site_id, in: path, type: string, required: true, description: Unique identifier for the site}
      - {name: customDomains, in: body, type: array, description: Array of custom domain IDs to publish to}
      - {name: publishToWebflowSubdomain, in: body, type: boolean, description: "Whether to publish to the Webflow subdomain (default: false)"}

  - name: list_collections
    description: List all CMS collections for a given site
    method: GET
    path: /v2/sites/{site_id}/collections
    params:
      - {name: site_id, in: path, type: string, required: true, description: Unique identifier for the site}

  - name: list_collection_items
    description: List all items within a CMS collection
    method: GET
    path: /v2/collections/{collection_id}/items
    params:
      - {name: collection_id, in: path, type: string, required: true, description: Unique identifier for the collection}
      - {name: offset, in: query, type: integer, description: Offset for pagination}
      - {name: limit, in: query, type: integer, description: "Maximum number of records to return (max 100)"}
      - {name: name, in: query, type: string, description: Filter items by exact name}
      - {name: slug, in: query, type: string, description: Filter items by exact slug}
      - {name: cmsLocaleId, in: query, type: string, description: Locale identifier; supports comma-separated values for multiple locales}

  - name: create_collection_item
    description: Create one or more new items in a CMS collection (up to 100 per request)
    method: POST
    path: /v2/collections/{collection_id}/items/bulk
    params:
      - {name: collection_id, in: path, type: string, required: true, description: Unique identifier for the collection}
      - {name: fieldData, in: body, type: object, required: true, description: "Item field data; must include name and slug, plus any custom collection fields"}
      - {name: isDraft, in: body, type: boolean, description: "Whether to create the item as a draft (default: true)"}
      - {name: isArchived, in: body, type: boolean, description: "Whether to create the item as archived (default: false)"}
      - {name: cmsLocaleIds, in: body, type: array, description: Locale IDs where the item should be created; defaults to primary locale}

  - name: update_collection_item
    description: Update one or more existing items in a CMS collection (up to 100 per request)
    method: PATCH
    path: /v2/collections/{collection_id}/items
    params:
      - {name: collection_id, in: path, type: string, required: true, description: Unique identifier for the collection}
      - {name: items, in: body, type: array, required: true, description: "Array of items to update; each item must include id and fieldData with name and slug"}

  - name: list_pages
    description: List all pages for a given site
    method: GET
    path: /v2/sites/{site_id}/pages
    params:
      - {name: site_id, in: path, type: string, required: true, description: Unique identifier for the site}
      - {name: offset, in: query, type: integer, description: Offset for pagination}
      - {name: limit, in: query, type: integer, description: "Maximum number of records to return (max 100)"}
      - {name: localeId, in: query, type: string, description: Unique identifier for a specific locale}

  - name: list_orders
    description: List all ecommerce orders for a given site
    method: GET
    path: /v2/sites/{site_id}/orders
    params:
      - {name: site_id, in: path, type: string, required: true, description: Unique identifier for the site}
      - {name: status, in: query, type: string, description: "Filter orders by status (pending, unfulfilled, fulfilled, disputed, dispute-lost, refunded)"}
      - {name: offset, in: query, type: integer, description: Offset for pagination}
      - {name: limit, in: query, type: integer, description: "Maximum number of records to return (max 100)"}

  - name: fulfill_order
    description: Mark an ecommerce order as fulfilled
    method: POST
    path: /v2/sites/{site_id}/orders/{order_id}/fulfill
    params:
      - {name: site_id, in: path, type: string, required: true, description: Unique identifier for the site}
      - {name: order_id, in: path, type: string, required: true, description: Unique identifier for the order}
      - {name: sendOrderFulfilledEmail, in: body, type: boolean, description: "Whether to send the order fulfillment notification email to the customer (default: false)"}
