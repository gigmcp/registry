schemaVersion: 1
name: close
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/close-mcp
  digest: sha256:47ec6444a3623d11e5628ad66bf0e7104bcc02e98850ed0d375529cef1f6ba8e
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.close.com
credentials:
  - id: close_api_key
    type: basic
    provider: close
    inject:
      header: Authorization
      format: "Basic {token}"
tools:
