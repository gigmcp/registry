schemaVersion: 1
name: launchdarkly
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/launchdarkly-mcp
  digest: sha256:515ed181305c956c765693f04dfc87366b2483fffdef789cefd6d593ffdf37c6
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - app.launchdarkly.com
credentials:
  - id: launchdarkly_api_key
    type: api_key
    provider: launchdarkly
    inject:
      header: Authorization
      format: "{token}"
tools:
  - name: list_feature_flags
    default: true
  - name: get_feature_flag
    default: true
  - name: list_environments
    default: true
  - name: list_segments
    default: true
  - name: get_audit_log_entries
    default: true
  - name: create_feature_flag
    default: false
  - name: patch_feature_flag
    default: false
  - name: delete_feature_flag
    default: false
  - name: create_segment
    default: false
