schemaVersion: 1
name: launchdarkly
version: 0.1.0
baseUrl: https://app.launchdarkly.com
tools:
  - name: list_feature_flags
    description: List all feature flags in a project
    method: GET
    path: /api/v2/flags/{projectKey}
    params:
      - {name: projectKey, in: path, type: string, required: true, description: The project key}
      - {name: env, in: query, type: string, description: Filter configurations by environment key}
      - {name: tag, in: query, type: string, description: Filter feature flags by tag}
      - {name: limit, in: query, type: integer, description: "The number of feature flags to return. Defaults to 20, max 100."}
      - {name: offset, in: query, type: integer, description: Pagination offset for retrieving subsequent items}
      - {name: filter, in: query, type: string, description: "A comma-separated list of filters of the form field:value"}
      - {name: sort, in: query, type: string, description: Comma-separated sort fields with optional dash prefix for descending order}

  - name: get_feature_flag
    description: Get a single feature flag by key
    method: GET
    path: /api/v2/flags/{projectKey}/{featureFlagKey}
    params:
      - {name: projectKey, in: path, type: string, required: true, description: The project key}
      - {name: featureFlagKey, in: path, type: string, required: true, description: The feature flag key}
      - {name: env, in: query, type: string, description: Filter configurations by environment key}
      - {name: expand, in: query, type: string, description: "Comma-separated fields to expand in the response (evaluation, migrationSettings)"}

  - name: list_environments
    description: List environments for a project
    method: GET
    path: /api/v2/projects/{projectKey}/environments
    params:
      - {name: projectKey, in: path, type: string, required: true, description: The project key}
      - {name: limit, in: query, type: integer, description: "The number of environments to return. Defaults to 20."}
      - {name: offset, in: query, type: integer, description: Where to start in the list for pagination}
      - {name: filter, in: query, type: string, description: "A comma-separated list of filters of the form field:value"}
      - {name: sort, in: query, type: string, description: "Comma-separated sort fields (createdOn, critical, name); prefix with dash for descending"}

  - name: list_segments
    description: List segments in a project environment
    method: GET
    path: /api/v2/segments/{projectKey}/{environmentKey}
    params:
      - {name: projectKey, in: path, type: string, required: true, description: The project key}
      - {name: environmentKey, in: path, type: string, required: true, description: The environment key}
      - {name: limit, in: query, type: integer, description: "The number of segments to return. Defaults to 20."}
      - {name: offset, in: query, type: integer, description: Pagination offset; skips items and returns subsequent entries up to the limit}
      - {name: sort, in: query, type: string, description: "Comma-separated sort fields (creationDate, name, lastModified); prefix with dash for descending"}
      - {name: filter, in: query, type: string, description: "Filter by excludedKeys, external, includedKeys, query, tags, unbounded, view"}

  - name: get_audit_log_entries
    description: Get a list of audit log entries
    method: GET
    path: /api/v2/auditlog
    params:
      - {name: before, in: query, type: integer, description: "A timestamp filter (Unix epoch in ms); returns entries that occurred before this time"}
      - {name: after, in: query, type: integer, description: "A timestamp filter (Unix epoch in ms); returns entries that occurred after this time"}
      - {name: q, in: query, type: string, description: "Text to search for; matches full or partial name of the resource"}
      - {name: limit, in: query, type: integer, description: "Max number of audit log entries to return. Set between 1 and 20. Default is 10."}
      - {name: spec, in: query, type: string, description: A resource specifier that filters audit log listings by resource}

  - name: create_feature_flag
    description: Create a new feature flag in a project
    method: POST
    path: /api/v2/flags/{projectKey}
    params:
      - {name: projectKey, in: path, type: string, required: true, description: The project key}
      - {name: name, in: body, type: string, required: true, description: A human-friendly name for the feature flag}
      - {name: key, in: body, type: string, required: true, description: A unique key used to reference the flag in your code}
      - {name: description, in: body, type: string, description: Description of the feature flag}
      - {name: temporary, in: body, type: boolean, description: Whether the flag is temporary}
      - {name: tags, in: body, type: array, description: Tags for the feature flag}
      - {name: variations, in: body, type: array, description: An array of possible variations for the flag}

  - name: patch_feature_flag
    description: Update a feature flag using semantic patch, JSON patch, or JSON merge patch
    method: PATCH
    path: /api/v2/flags/{projectKey}/{featureFlagKey}
    params:
      - {name: projectKey, in: path, type: string, required: true, description: The project key}
      - {name: featureFlagKey, in: path, type: string, required: true, description: The feature flag key}
      - {name: ignoreConflicts, in: query, type: boolean, description: "If true, apply patch even if it causes a pending scheduled change or approval request to fail"}
      - {name: patch, in: body, type: object, required: true, description: "Patch document: semantic patch (instructions array), JSON patch (array of ops), or JSON merge patch"}

  - name: delete_feature_flag
    description: "Delete a feature flag in all environments. Use with caution: only delete flags your application no longer uses."
    method: DELETE
    path: /api/v2/flags/{projectKey}/{featureFlagKey}
    params:
      - {name: projectKey, in: path, type: string, required: true, description: The project key}
      - {name: featureFlagKey, in: path, type: string, required: true, description: The feature flag key}

  - name: create_segment
    description: Create a new segment in a project environment
    method: POST
    path: /api/v2/segments/{projectKey}/{environmentKey}
    params:
      - {name: projectKey, in: path, type: string, required: true, description: The project key}
      - {name: environmentKey, in: path, type: string, required: true, description: The environment key}
      - {name: name, in: body, type: string, required: true, description: A human-friendly name for the segment}
      - {name: key, in: body, type: string, required: true, description: A unique key used to reference the segment}
      - {name: description, in: body, type: string, description: Description of the segment}
      - {name: tags, in: body, type: array, description: Tags for the segment}
      - {name: unbounded, in: body, type: boolean, description: "Whether to create a big segment, which can have more than 15,000 targets"}
