schemaVersion: 1
name: calendly
version: 0.1.0
source:
  repo: github.com/gigmcp/calendly-mcp
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/calendly-mcp
  # PLACEHOLDER until build-images CI emits the real digest — see README.
  digest: sha256:22b8c2cabf9e1dbf6b5a45d3aa7ca910f6f4a5cb72e0811df8b33942414492a0
  entrypoint: /app/server
tier: sealed
entitlements:
  egress:
    - api.calendly.com
    - auth.calendly.com
credentials:
  - id: calendly_token
    type: oauth2
    provider: calendly
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_user
    default: true
  - name: list_scheduled_events
    default: true
  - name: list_event_types
    default: true
  - name: list_event_invitees
    default: true
  - name: get_user_availability_schedule
    default: true
  - name: list_user_busy_times
    default: true
  - name: create_scheduling_link
    default: false
  - name: cancel_scheduled_event
    default: false
  - name: mark_invitee_as_no_show
    default: false
