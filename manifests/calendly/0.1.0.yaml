schemaVersion: 1
name: calendly
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/calendly-mcp
  digest: sha256:38877cfde6e6353c1b66326e8d30106471dc6e71f31581338377ede36350e55b
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.calendly.com
    - auth.calendly.com
credentials:
  - id: calendly_token
    type: oauth2
    provider: calendly
    vendor: calendly
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_user
    default: true
  - name: list_scheduled_events
    default: true
  - name: list_event_types
    default: true
  - name: list_event_invitees
    default: true
  - name: get_user_availability_schedule
    default: true
  - name: list_user_busy_times
    default: true
  - name: create_scheduling_link
    default: false
  - name: cancel_scheduled_event
    default: false
  - name: mark_invitee_as_no_show
    default: false
