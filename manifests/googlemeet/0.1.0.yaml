schemaVersion: 1
name: googlemeet
version: 0.1.0
source:
  repo: github.com/gigmcp/googlemeet-mcp
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/googlemeet-mcp
  # PLACEHOLDER until build-images CI emits the real digest — see README.
  digest: sha256:d789cb89f9cd0a6ba86b4accb5e41e41947750e622ae66d33b4101bd63a18783
  entrypoint: /app/server
tier: sealed
entitlements:
  egress:
    - meet.googleapis.com
    - oauth2.googleapis.com
credentials:
  - id: googlemeet_token
    type: oauth2
    provider: googlemeet
    scopes: [https://www.googleapis.com/auth/meetings.space.created, https://www.googleapis.com/auth/meetings.space.readonly]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_meet
    default: true
  - name: list_conference_records
    default: true
  - name: list_participants
    default: true
  - name: list_recordings
    default: true
  - name: get_transcript
    default: true
  - name: list_transcript_entries
    default: true
  - name: create_meet
    default: false
  - name: update_space
    default: false
  - name: end_active_conference
    default: false
