schemaVersion: 1
name: googlemeet
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/googlemeet-mcp
  digest: sha256:b9578a649be0e87ca7323cc479e99eb86486e90e193d8bb2f9e874681ebcc7c3
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: Google Meet
category: comms
entitlements:
  egress:
    - meet.googleapis.com
    - oauth2.googleapis.com
credentials:
  - id: googlemeet_token
    type: oauth2
    provider: googlemeet
    vendor: google
    scopes: [https://www.googleapis.com/auth/meetings.space.created, https://www.googleapis.com/auth/meetings.space.readonly]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_meet
    default: true
  - name: list_conference_records
    default: true
  - name: list_participants
    default: true
  - name: list_recordings
    default: true
  - name: get_transcript
    default: true
  - name: list_transcript_entries
    default: true
  - name: create_meet
    default: false
  - name: update_space
    default: false
  - name: end_active_conference
    default: false
