schemaVersion: 1
name: gong
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/gong-mcp
  digest: sha256:e619c77cac9658403b6cd25ff96b97f80144ef4a8a01702a9c1dd7aeccbae570
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: Gong
category: CRM
icon: icons/gong.svg
entitlements:
  egress:
    - api.gong.io
    - "*.api.gong.io"
credentials:
  - id: gong_token
    type: oauth2
    provider: gong
    vendor: gong
    scopes: [api:calls:read, api:calls:create, api:users:read, api:stats:user-actions, api:flows:read]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: list_calls
    default: true
  - name: get_call_transcripts
    default: true
  - name: retrieve_call_data
    default: true
  - name: add_new_call
    default: false
  - name: list_users
    default: true
  - name: get_user_activity_stats
    default: true
  - name: list_flows
    default: true
  - name: assign_prospects_to_flow
    default: false
  - name: list_library_folders
    default: true
  - name: list_scorecards
    default: true
