schemaVersion: 1
name: gong
version: 0.1.0
baseUrl: https://api.gong.io
tools:
  - name: list_calls
    description: List calls that took place during a specified date range
    method: GET
    path: /v2/calls
    params:
      - {name: fromDateTime, in: query, type: string, required: true, description: "Start of date range in ISO-8601 format (e.g. 2021-08-01T00:00:00-07:00)"}
      - {name: toDateTime, in: query, type: string, required: true, description: "End of date range in ISO-8601 format; max 90-day window"}
      - {name: workspaceId, in: query, type: string, description: "Workspace identifier; if omitted returns calls from all workspaces"}
      - {name: cursor, in: query, type: string, description: Cursor for next page of results}

  - name: get_call_transcripts
    description: Retrieve transcripts for calls that match the specified filter
    method: POST
    path: /v2/calls/transcript
    params:
      - {name: filter, in: body, type: object, required: true, description: "Filter object with fromDateTime, toDateTime, and optional callIds array"}

  - name: retrieve_call_data
    description: Retrieve detailed call data including metadata and participants using a filter
    method: POST
    path: /v2/calls/extensive
    params:
      - {name: filter, in: body, type: object, required: true, description: "Filter object with fromDateTime, toDateTime, and optional callIds or workspaceId"}
      - {name: contentSelector, in: body, type: object, description: "Selector specifying which fields to include in the response"}

  - name: add_new_call
    description: Add a new call recorded by an external system to Gong
    method: POST
    path: /v2/calls
    params:
      - {name: actualStart, in: body, type: string, required: true, description: "Actual start time of the call in ISO-8601 format"}
      - {name: direction, in: body, type: string, required: true, description: "Call direction: Inbound, Outbound, or Conference"}
      - {name: primaryUser, in: body, type: string, required: true, description: "Gong internal user ID of the team member who hosted the call (retrieve IDs via list_users)"}
      - {name: parties, in: body, type: array, required: true, description: "Array of call participant objects"}
      - {name: clientUniqueId, in: body, type: string, required: true, description: "Unique identifier for the call in the client system"}
      - {name: title, in: body, type: string, description: Call title}
      - {name: scheduledStart, in: body, type: string, description: "Scheduled start time of the call in ISO-8601 format"}
      - {name: scheduledEnd, in: body, type: string, description: "Scheduled end time of the call in ISO-8601 format"}
      - {name: duration, in: body, type: integer, description: Duration of the call in seconds}
      - {name: downloadMediaUrl, in: body, type: string, description: "URL for Gong to download the call recording; required if not uploading media separately"}
      - {name: workspaceId, in: body, type: string, description: Workspace to associate the call with}
      - {name: languageCode, in: body, type: string, description: "BCP-47 language code for the call (e.g. en-US)"}

  - name: list_users
    description: List all users in the Gong account
    method: GET
    path: /v2/users
    params:
      - {name: cursor, in: query, type: string, description: Cursor for next page of results}
      - {name: includeAvatars, in: query, type: boolean, description: "Whether to include avatar image data for each user in the response"}

  - name: get_user_activity_stats
    description: Retrieve aggregated activity statistics for multiple users within a defined period
    method: POST
    path: /v2/stats/activity/aggregate
    params:
      - {name: filter, in: body, type: object, required: true, description: "Filter object containing fromDate (YYYY-MM-DD, required), toDate (YYYY-MM-DD, required), and optional userIds array of Gong user IDs"}

  - name: list_flows
    description: List all Gong Engage flows available to the company
    method: GET
    path: /v2/flows
    params:
      - {name: workspaceId, in: query, type: string, description: "Workspace identifier to filter flows"}

  - name: assign_prospects_to_flow
    description: Assign up to 100 prospects to a Gong Engage flow
    method: POST
    path: /v2/flows/prospects/assign
    params:
      - {name: flowId, in: body, type: string, required: true, description: "Gong unique identifier of the flow to assign prospects to"}
      - {name: flowInstanceOwnerEmail, in: body, type: string, required: true, description: "Email address of the Gong user who set up the flow instance and is assigned to the flow to-dos"}
      - {name: crmProspectIds, in: body, type: array, required: true, description: "Array of CRM prospect IDs (contacts or leads) to assign to the flow (up to 100)"}

  - name: list_library_folders
    description: Retrieve public library folders in the Gong account
    method: GET
    path: /v2/library/folders
    params:
      - {name: workspaceId, in: query, type: string, description: "Workspace identifier to filter folders"}

  - name: list_scorecards
    description: Retrieve all scorecards defined in the Gong system
    method: GET
    path: /v2/settings/scorecards
