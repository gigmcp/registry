schemaVersion: 1
name: finage
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/finage-mcp
  digest: sha256:6dd999b1f8b679d442229b3cff6c2fe4e3de925d4bdb875b15300b2ee05a3eec
  entrypoint: /app/server
  builder: toolpack
# Finage authenticates exclusively via the ?apikey= query parameter, so
# header injection cannot work — entrusted tier with env injection.
tier: entrusted
displayName: Finage
category: finance
entitlements:
  egress:
    - api.finage.co.uk
credentials:
  - id: finage_api_key
    type: api_key
    provider: finage
    inject:
      env: FINAGE_API_KEY
tools:
  - name: get_stock_last_quote
    default: true
  - name: get_stock_previous_close
    default: true
  - name: get_stock_market_aggregates
    default: true
  - name: get_stock_market_news
    default: true
  - name: get_technical_indicators
    default: true
  - name: get_crypto_last_trade
    default: true
  - name: get_forex_last_quote
    default: true
  - name: convert_currency
    default: true
  - name: search_market
    default: true
