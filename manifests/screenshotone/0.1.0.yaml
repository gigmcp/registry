schemaVersion: 1
name: screenshotone
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/screenshotone-mcp
  digest: sha256:1ba27146ced34fd0da83714812e1c75a70c7928a468697098ebcd1086c012b7f
  entrypoint: /app/server
  builder: toolpack
tier: entrusted
entitlements:
  egress:
    - api.screenshotone.com
credentials:
  - id: screenshotone_api_key
    type: api_key
    provider: screenshotone
    inject:
      env: SCREENSHOTONE_API_KEY
tools:
  - name: get_usage
    default: true
  - name: list_devices
    default: true
  - name: take_screenshot
    default: false
  - name: take_animated_screenshot
    default: false
  - name: take_bulk_screenshots
    default: false
