schemaVersion: 1
name: salesforce
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/salesforce-mcp
  digest: sha256:d719f0ec7d76b120dc169fc6d33b778c2cdc42b00a0d39ad32712bf61468ec0d
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - login.salesforce.com
    - "*.salesforce.com"
    - "*.my.salesforce.com"
credentials:
  - id: salesforce_token
    type: oauth2
    provider: salesforce
    scopes: [api, refresh_token, offline_access]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: execute_soql_query
    default: true
  - name: get_account
    default: true
  - name: get_contact
    default: true
  - name: create_account
    default: false
  - name: create_contact
    default: false
  - name: create_lead
    default: false
  - name: create_opportunity
    default: false
  - name: create_task
    default: false
  - name: delete_record
    default: false
