schemaVersion: 1
name: exist
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/exist-mcp
  digest: sha256:3f7ba8a81cfe0d2cf82809e5f5207147c145d368b6cf5955345cce141b5d4834
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: Exist
category: analytics
icon: icons/exist.svg
entitlements:
  egress:
    - exist.io
credentials:
  - id: exist_token
    type: oauth2
    provider: exist
    vendor: exist
    scopes: [activity_read, productivity_read, mood_read, manual_write]
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_user_profile
    default: true
  - name: get_user_attributes
    default: true
  - name: get_attributes_with_values
    default: true
  - name: get_attribute_templates
    default: true
  - name: get_averages
    default: true
  - name: get_correlations
    default: true
  - name: get_insights
    default: true
  - name: acquire_attribute_ownership
    default: false
  - name: increment_attribute_values
    default: false
  - name: release_attribute_ownership
    default: false
