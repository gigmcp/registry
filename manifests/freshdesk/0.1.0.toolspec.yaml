schemaVersion: 1
name: freshdesk
version: 0.1.0
# Freshdesk is a per-tenant SaaS: each account lives at <domain>.freshdesk.com.
# The baseUrl below uses a representative subdomain that satisfies the *.freshdesk.com
# egress allowlist; the runtime engine substitutes the actual tenant domain.
baseUrl: https://yourcompany.freshdesk.com
tools:
  - name: list_tickets
    description: List tickets in the Freshdesk account, optionally filtered and sorted
    method: GET
    path: /api/v2/tickets
    params:
      - {name: filter, in: query, type: string, description: "Predefined filter: new_and_my_open, watching, spam, or deleted"}
      - {name: requester_id, in: query, type: integer, description: "Filter tickets by requester ID"}
      - {name: email, in: query, type: string, description: "Filter tickets by requester email address (URL-encoded)"}
      - {name: company_id, in: query, type: integer, description: "Filter tickets by company ID"}
      - {name: updated_since, in: query, type: string, description: "ISO 8601 timestamp; return only tickets updated after this time"}
      - {name: order_by, in: query, type: string, description: "Sort field: created_at, due_by, updated_at, or status"}
      - {name: order_type, in: query, type: string, description: "Sort direction: asc or desc (default desc)"}
      - {name: include, in: query, type: string, description: "Comma-separated sideloads: stats, requester, description"}
      - {name: page, in: query, type: integer, description: "Page number for pagination (default 1)"}
      - {name: per_page, in: query, type: integer, description: "Results per page, max 100 (default 30)"}

  - name: get_ticket
    description: Retrieve a single Freshdesk ticket by ID, with optional sideloads
    method: GET
    path: /api/v2/tickets/{id}
    params:
      - {name: id, in: path, type: integer, required: true, description: "Ticket ID"}
      - {name: include, in: query, type: string, description: "Comma-separated sideloads: conversations, requester, company, stats"}

  - name: search_tickets
    description: Search tickets using a query expression (field:value pairs joined by AND/OR)
    method: GET
    path: /api/v2/search/tickets
    params:
      - {name: query, in: query, type: string, required: true, description: "Search expression, e.g. \"(status:2 AND priority:1)\" — URL-encode before sending"}
      - {name: page, in: query, type: integer, description: "Page number (max 10)"}

  - name: list_contacts
    description: List contacts in the Freshdesk account with optional filters and pagination
    method: GET
    path: /api/v2/contacts
    params:
      - {name: email, in: query, type: string, description: "Filter by contact email address"}
      - {name: unique_external_id, in: query, type: string, description: "Filter by external identifier"}
      - {name: company_id, in: query, type: integer, description: "Filter by associated company ID"}
      - {name: state, in: query, type: string, description: "Filter by state: verified, unverified, blocked, or deleted"}
      - {name: updated_since, in: query, type: string, description: "ISO 8601 timestamp; return only contacts updated after this time"}
      - {name: page, in: query, type: integer, description: "Page number for pagination (default 1)"}
      - {name: per_page, in: query, type: integer, description: "Results per page, max 100 (default 30)"}

  - name: list_agents
    description: List support agents in the Freshdesk account
    method: GET
    path: /api/v2/agents
    params:
      - {name: page, in: query, type: integer, description: "Page number for pagination (default 1)"}
      - {name: per_page, in: query, type: integer, description: "Results per page, max 100 (default 30)"}
      - {name: email, in: query, type: string, description: "Filter agents by email address"}
      - {name: state, in: query, type: string, description: "Filter by agent type: fulltime or occasional"}

  - name: list_ticket_conversations
    description: List all conversations (replies and notes) on a ticket
    method: GET
    path: /api/v2/tickets/{id}/conversations
    params:
      - {name: id, in: path, type: integer, required: true, description: "Ticket ID"}
      - {name: page, in: query, type: integer, description: "Page number for pagination (default 1)"}
      - {name: per_page, in: query, type: integer, description: "Results per page, max 100 (default 30)"}

  - name: create_ticket
    description: Create a new support ticket in Freshdesk
    method: POST
    path: /api/v2/tickets
    params:
      - {name: email, in: body, type: string, description: "Requester email address (required if no requester_id, phone, or facebook_id)"}
      - {name: requester_id, in: body, type: integer, description: "ID of an existing contact as the requester"}
      - {name: phone, in: body, type: string, description: "Requester phone number (used if no email or requester_id)"}
      - {name: name, in: body, type: string, description: "Requester name (used when creating a new requester by email/phone)"}
      - {name: subject, in: body, type: string, description: "Subject line of the ticket"}
      - {name: description, in: body, type: string, description: "HTML-formatted ticket body"}
      - {name: status, in: body, type: integer, description: "Ticket status: 2=Open, 3=Pending, 4=Resolved, 5=Closed (default 2)"}
      - {name: priority, in: body, type: integer, description: "Ticket priority: 1=Low, 2=Medium, 3=High, 4=Urgent (default 1)"}
      - {name: type, in: body, type: string, description: "Issue category type (account-defined)"}
      - {name: responder_id, in: body, type: integer, description: "ID of the agent to assign the ticket to"}
      - {name: group_id, in: body, type: integer, description: "ID of the group to assign the ticket to"}
      - {name: source, in: body, type: integer, description: "Channel source: 1=Email, 2=Portal, 3=Phone, 7=Chat, 9=Widget, 10=Outbound"}
      - {name: tags, in: body, type: array, description: "Array of tag strings to attach to the ticket"}
      - {name: cc_emails, in: body, type: array, description: "Array of email addresses to CC on the ticket"}
      - {name: company_id, in: body, type: integer, description: "Company ID to associate with the ticket"}

  - name: update_ticket
    description: Update fields of an existing Freshdesk ticket
    method: PUT
    path: /api/v2/tickets/{id}
    params:
      - {name: id, in: path, type: integer, required: true, description: "Ticket ID to update"}
      - {name: subject, in: body, type: string, description: "Updated subject line"}
      - {name: description, in: body, type: string, description: "Updated HTML-formatted ticket body"}
      - {name: status, in: body, type: integer, description: "Ticket status: 2=Open, 3=Pending, 4=Resolved, 5=Closed"}
      - {name: priority, in: body, type: integer, description: "Ticket priority: 1=Low, 2=Medium, 3=High, 4=Urgent"}
      - {name: type, in: body, type: string, description: "Issue category type (account-defined)"}
      - {name: responder_id, in: body, type: integer, description: "ID of the agent to assign the ticket to"}
      - {name: group_id, in: body, type: integer, description: "ID of the group to assign the ticket to"}
      - {name: tags, in: body, type: array, description: "Array of tag strings to attach to the ticket"}
      - {name: due_by, in: body, type: string, description: "ISO 8601 datetime for ticket due date"}

  - name: reply_to_ticket
    description: Post a public reply on a Freshdesk ticket (visible to the requester)
    method: POST
    path: /api/v2/tickets/{id}/reply
    params:
      - {name: id, in: path, type: integer, required: true, description: "Ticket ID to reply to"}
      - {name: body, in: body, type: string, required: true, description: "HTML-formatted reply body"}
      - {name: cc_emails, in: body, type: array, description: "Array of email addresses to CC on the reply"}
      - {name: bcc_emails, in: body, type: array, description: "Array of email addresses to BCC on the reply"}

  - name: create_contact
    description: Create a new contact in the Freshdesk account
    method: POST
    path: /api/v2/contacts
    params:
      - {name: name, in: body, type: string, required: true, description: "Full name of the contact"}
      - {name: email, in: body, type: string, description: "Email address (required if no phone, mobile, twitter_id, or facebook_id)"}
      - {name: phone, in: body, type: string, description: "Phone number of the contact"}
      - {name: mobile, in: body, type: string, description: "Mobile phone number of the contact"}
      - {name: twitter_id, in: body, type: string, description: "Twitter handle of the contact"}
      - {name: unique_external_id, in: body, type: string, description: "External identifier for the contact"}
      - {name: company_id, in: body, type: integer, description: "ID of the company to associate with this contact"}
      - {name: description, in: body, type: string, description: "Short description of the contact"}
      - {name: address, in: body, type: string, description: "Address of the contact"}
      - {name: tags, in: body, type: array, description: "Array of tag strings to attach to the contact"}
