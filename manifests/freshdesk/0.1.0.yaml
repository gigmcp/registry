schemaVersion: 1
name: freshdesk
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/freshdesk-mcp
  digest: sha256:00bdf81a3187df992b024010daa867e3e99180e95dabb8601da6255a06c17f87
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    # Per-tenant Freshdesk API v2 hosts (<domain>.freshdesk.com/api/v2).
    - "*.freshdesk.com"
credentials:
  - id: freshdesk_api_key
    type: basic
    provider: freshdesk
    inject:
      # Freshdesk uses HTTP Basic with the API key as username ("apikey:X"),
      # pre-encoded as base64 in the injected token.
      header: Authorization
      format: "Basic {token}"
tools:
  - name: list_tickets
    default: true
  - name: get_ticket
    default: true
  - name: search_tickets
    default: true
  - name: list_contacts
    default: true
  - name: list_agents
    default: true
  - name: list_ticket_conversations
    default: true
  - name: create_ticket
    default: false
  - name: update_ticket
    default: false
  - name: reply_to_ticket
    default: false
  - name: create_contact
    default: false
