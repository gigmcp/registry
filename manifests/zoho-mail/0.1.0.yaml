schemaVersion: 1
name: zoho-mail
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/zoho-mail-mcp
  digest: sha256:e449f20824f6a6dbff3d03e43a75c63f388d193ecd3e5ef29452cbaa92dcead5
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - mail.zoho.com
    - accounts.zoho.com
credentials:
  - id: zoho-mail_token
    type: oauth2
    provider: zoho-mail
    scopes: [ZohoMail.accounts.READ, ZohoMail.messages.READ, ZohoMail.messages.CREATE, ZohoMail.folders.READ]
    inject:
      header: Authorization
      format: "Zoho-oauthtoken {token}"
tools:
  - name: list_accounts
    default: true
  - name: list_emails
    default: true
  - name: get_message_content
    default: true
  - name: search_messages
    default: true
  - name: get_all_bookmarks
    default: true
  - name: send_email
    default: false
  - name: reply_to_email
    default: false
  - name: create_email_draft
    default: false
  - name: delete_group
    default: false
