schemaVersion: 1
name: formsite
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/formsite-mcp
  digest: sha256:8b2460c94bd06b09cb6b3ddb8e992778b32fd79811d478bf68e85b13734e41f2
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: Formsite
category: productivity
icon: icons/formsite.svg
entitlements:
  egress:
    - "*.formsite.com"
credentials:
  - id: formsite_api_key
    type: api_key
    provider: formsite
    inject:
      header: Authorization
      format: "bearer {token}"
tools:
  - name: list_all_forms
    default: true
  - name: get_form
    default: true
  - name: get_form_items
    default: true
  - name: get_form_results
    default: true
  - name: get_webhooks
    default: true
