schemaVersion: 1
name: formsite
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/formsite-mcp
  digest: sha256:bae5c2ecbd88abe6f98d0c9bcb91ce83b5177cace796925c7819447f3516b4a6
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - "*.formsite.com"
credentials:
  - id: formsite_api_key
    type: api_key
    provider: formsite
    inject:
      header: Authorization
      format: "bearer {token}"
tools:
  - name: list_all_forms
    default: true
  - name: get_form
    default: true
  - name: get_form_items
    default: true
  - name: get_form_results
    default: true
  - name: get_webhooks
    default: true
