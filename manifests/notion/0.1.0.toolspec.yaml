schemaVersion: 1
name: notion
version: 0.1.0
baseUrl: https://api.notion.com
tools:
  - name: search_notion_pages
    description: Search Notion pages and databases by title or full-text query
    method: POST
    path: /v1/search
    params:
      - {name: query, in: body, type: string, description: "Text to search for in page/database titles"}
      - {name: filter, in: body, type: object, description: "Limit results to pages or databases ({property: 'object', value: 'page'|'database'})"}
      - {name: sort, in: body, type: object, description: "Sort order ({direction: 'ascending'|'descending', timestamp: 'last_edited_time'})"}
      - {name: start_cursor, in: body, type: string, description: Cursor returned by a previous response to fetch the next page of results}
      - {name: page_size, in: body, type: integer, description: "Maximum number of results to return (default 100, max 100)"}

  - name: retrieve_page
    description: Retrieve a Notion page object by its ID
    method: GET
    path: /v1/pages/{page_id}
    params:
      - {name: page_id, in: path, type: string, required: true, description: The ID of the page to retrieve}
      - {name: filter_properties, in: query, type: string, description: "Property IDs to include in the response; repeat the parameter for multiple values"}

  - name: query_database
    description: Query a Notion database and filter or sort its pages
    method: POST
    path: /v1/databases/{database_id}/query
    params:
      - {name: database_id, in: path, type: string, required: true, description: The ID of the database to query}
      - {name: filter, in: body, type: object, description: "Filter conditions applied to database properties"}
      - {name: sorts, in: body, type: array, description: "Sort criteria applied to database properties or page timestamps"}
      - {name: start_cursor, in: body, type: string, description: Cursor returned by a previous response to fetch the next page of results}
      - {name: page_size, in: body, type: integer, description: "Maximum number of results to return per response"}

  - name: fetch_block_contents
    description: Retrieve the children blocks of a Notion block or page
    method: GET
    path: /v1/blocks/{block_id}/children
    params:
      - {name: block_id, in: path, type: string, required: true, description: The ID of the block whose children to retrieve}
      - {name: start_cursor, in: query, type: string, description: Cursor returned by a previous response to fetch the next page of results}
      - {name: page_size, in: query, type: integer, description: "Maximum number of child blocks to return"}

  - name: list_users
    description: List all users in the Notion workspace
    method: GET
    path: /v1/users
    params:
      - {name: start_cursor, in: query, type: string, description: Cursor returned by a previous response to fetch the next page of results}
      - {name: page_size, in: query, type: integer, description: "Maximum number of users to return"}

  - name: create_notion_page
    description: Create a new Notion page as a child of an existing page or workspace
    method: POST
    path: /v1/pages
    params:
      - {name: parent, in: body, type: object, required: true, description: "Parent of the new page (e.g. {page_id: '...'} or {workspace: true})"}
      - {name: properties, in: body, type: object, description: "Property values for the page; for page parents only the title property is supported"}
      - {name: children, in: body, type: array, description: "Block objects to append as page content (max 100 items)"}
      - {name: icon, in: body, type: object, description: "Page icon (emoji or external file object)"}
      - {name: cover, in: body, type: object, description: "Page cover image (external file object)"}

  - name: update_page
    description: Update properties, icon, cover, or archived state of a Notion page
    method: PATCH
    path: /v1/pages/{page_id}
    params:
      - {name: page_id, in: path, type: string, required: true, description: The ID of the page to update}
      - {name: properties, in: body, type: object, description: "Property values to update on the page"}
      - {name: icon, in: body, type: object, description: "New page icon (emoji or external file object, or null to clear)"}
      - {name: cover, in: body, type: object, description: "New page cover image (external file object, or null to clear)"}
      - {name: in_trash, in: body, type: boolean, description: "Set to true to move the page to trash, false to restore it"}

  - name: insert_row_database
    description: Insert a new row (page) into a Notion database with property values
    method: POST
    path: /v1/pages
    params:
      - {name: parent, in: body, type: object, required: true, description: "Database parent specifying the target database (e.g. {database_id: '...'})"}
      - {name: properties, in: body, type: object, required: true, description: "Property values for the new row conforming to the database schema"}
      - {name: children, in: body, type: array, description: "Block objects to append as page content (max 100 items)"}
      - {name: icon, in: body, type: object, description: "Page icon (emoji or external file object)"}
      - {name: cover, in: body, type: object, description: "Page cover image (external file object)"}

  - name: create_comment
    description: Create a comment on a Notion page or within an existing discussion thread
    method: POST
    path: /v1/comments
    params:
      - {name: parent, in: body, type: object, description: "Page or block to attach the comment to (e.g. {page_id: '...'} or {block_id: '...'})"}
      - {name: discussion_id, in: body, type: string, description: "Existing discussion thread ID to reply to (mutually exclusive with parent)"}
      - {name: rich_text, in: body, type: array, description: "Comment content as rich text objects (max 100 items)"}

  - name: archive_notion_page
    description: Move a Notion page to trash (archive it)
    method: PATCH
    path: /v1/pages/{page_id}
    params:
      - {name: page_id, in: path, type: string, required: true, description: The ID of the page to archive}
      - {name: in_trash, in: body, type: boolean, required: true, description: "Set to true to move the page to trash"}
