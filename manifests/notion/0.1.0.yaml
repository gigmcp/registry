schemaVersion: 1
name: notion
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/notion-mcp
  digest: sha256:a1cab9e0a9b4cb27f036b385ac4517bfbe6e779c62b077931cbb66f5a9e33d3f
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: Notion
category: productivity
entitlements:
