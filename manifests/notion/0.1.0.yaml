    default: true
  - name: query_database
    default: true
  - name: fetch_block_contents
    default: true
  - name: list_users
    default: true
  - name: create_notion_page
    default: false
  - name: update_page
    default: false
  - name: insert_row_database
    default: false
  - name: create_comment
    default: false
  - name: archive_notion_page
    default: false
