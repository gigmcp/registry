schemaVersion: 1
name: text-to-pdf
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/text-to-pdf-mcp
  digest: sha256:7332c35e2546db6d3d15dbdf23e62e613765f083d0cf2659f03e3455111feb96
  entrypoint: /app/server
  builder: toolpack
tier: sealed
displayName: Text to PDF
category: documents
entitlements:
  egress:
    - v2.convertapi.com
credentials:
  - id: text_to_pdf_api_key
    type: api_key
    provider: convertapi
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: download_file
    default: true
  - name: get_async_job_status
    default: true
  - name: convert_text_to_pdf
    default: false
  - name: start_async_conversion
    default: false
  - name: upload_file
    default: false
  - name: delete_file
    default: false
  - name: delete_async_job
    default: false
