schemaVersion: 1
name: humanloop
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/humanloop-mcp
  digest: sha256:03fb3cee1ca0a42869897aaddf261f6fd2b41ac44835177168089a0b212e46b8
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.humanloop.com
credentials:
  - id: humanloop_api_key
    type: api_key
    provider: humanloop
    inject:
      header: X-API-KEY
      format: "{token}"
tools:
  - name: list_projects
    default: true
  - name: create_project
    default: false
  - name: delete_project
    default: false
  - name: list_experiments
    default: true
  - name: list_sessions
    default: true
  - name: list_datasets
    default: true
  - name: get_project_config
    default: true
