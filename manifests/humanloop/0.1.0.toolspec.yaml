schemaVersion: 1
name: humanloop
version: 0.1.0
baseUrl: https://api.humanloop.com
tools:
  - name: list_projects
    description: Get a paginated list of projects in the organization
    method: GET
    path: /v4/projects
    params:
      - {name: page, in: query, type: integer, description: "Page offset for pagination (default: 0)"}
      - {name: size, in: query, type: integer, description: "Number of projects per page (default: 10)"}
      - {name: filter, in: query, type: string, description: "Case-insensitive filter for project name"}
      - {name: sort_by, in: query, type: string, description: "Field to sort by: created_at, updated_at, or name"}
      - {name: order, in: query, type: string, description: "Sort direction: asc or desc"}
  - name: create_project
    description: Create a new project in Humanloop
    method: POST
    path: /v4/projects
    params:
      - {name: name, in: body, type: string, required: true, description: "Unique project name"}
  - name: delete_project
    description: Delete a specific project from the organization
    method: DELETE
    path: /v4/projects/{id}
    params:
      - {name: id, in: path, type: string, required: true, description: "String ID of project to delete. Starts with pr_."}
  - name: list_experiments
    description: Retrieve experiments associated with a specific project
    method: GET
    path: /v4/projects/{project_id}/experiments
    params:
      - {name: project_id, in: path, type: string, required: true, description: "String ID of project. Starts with pr_."}
  - name: list_sessions
    description: Get a paginated list of sessions for a specific project
    method: GET
    path: /v4/sessions
    params:
      - {name: project_id, in: query, type: string, required: true, description: "String ID of project to return sessions for. Starts with pr_."}
      - {name: page, in: query, type: integer, description: "Page offset for pagination (default: 1)"}
      - {name: size, in: query, type: integer, description: "Number of sessions per page (default: 10)"}
  - name: list_datasets
    description: Get all datasets for a specific project
    method: GET
    path: /v4/projects/{project_id}/datasets
    params:
      - {name: project_id, in: path, type: string, required: true, description: "String ID of project to list datasets for. Starts with pr_."}
  - name: get_project_config
    description: Get the active model configuration deployed to a project environment
    method: GET
    path: /v4/projects/{id}/active-config
    params:
      - {name: id, in: path, type: string, required: true, description: "String ID of project. Starts with pr_."}
      - {name: environment, in: query, type: string, description: "Environment name (e.g. production). Returns default environment config if not provided."}
