schemaVersion: 1
name: flutterwave
version: 0.1.0
source:
  repo: github.com/gigmcp/toolpack
  tag: v0.1.0
image:
  ref: ghcr.io/gigmcp/flutterwave-mcp
  digest: sha256:924f41022c63a8c2a1a999a3064ce3f217d484bd2fb56080cfb031bba495657a
  entrypoint: /app/server
  builder: toolpack
tier: sealed
entitlements:
  egress:
    - api.flutterwave.com
credentials:
  - id: flutterwave_api_key
    type: api_key
    provider: flutterwave
    inject:
      header: Authorization
      format: "Bearer {token}"
tools:
  - name: get_all_transactions
    default: true
  - name: verify_transaction_by_reference
    default: true
  - name: get_transaction
    default: true
  - name: create_payment_link
    default: false
  - name: create_refund
    default: false
  - name: get_refund
    default: true
  - name: list_transfers
    default: true
  - name: get_banks_by_country
    default: true
  - name: resolve_bank_account
    default: true
  - name: create_payment_plan
    default: false
