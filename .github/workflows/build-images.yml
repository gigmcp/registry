name: build-images
on:
  workflow_dispatch:
    inputs:
      name: {description: 'server name (manifests/<name>)', required: true}
      version: {description: 'manifest version to build (default: latest)', required: false, default: ''}
permissions:
  packages: write
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      # QEMU covers any emulated RUN steps (node/python builders); the Go
      # builders cross-compile natively and don't need it. setup-buildx gives a
      # docker-container builder, required to push a multi-platform image index.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve build args
        env:
          NAME: ${{ inputs.name }}
          VERSION: ${{ inputs.version }}
        run: |
          TARGET="manifests/$NAME"
          if [ -n "$VERSION" ]; then TARGET="manifests/$NAME/$VERSION.yaml"; fi
          go run ./cmd/registryctl build-args "$TARGET" >> "$GITHUB_ENV"
      - name: Build and push
        run: |
          # Multi-arch: amd64 + arm64 published as an OCI image index, so the
          # pinned digest resolves per host architecture (arm64 dev boxes such
          # as Apple Silicon can exec their native binary inside the sandbox).
          # --provenance=false keeps the index to exactly the two arch entries —
          # no unknown/unknown attestation manifests — so the index digest is
          # stable and is the digest we pin.
          docker buildx build --provenance=false --push \
            --platform linux/amd64,linux/arm64 \
            -f "images/${BUILDER}/Dockerfile" \
            --build-arg SOURCE_REPO="$SOURCE_REPO" \
            --build-arg SOURCE_TAG="$SOURCE_TAG" \
            --build-arg PACKAGE="$PACKAGE" \
            --build-arg NAME="$NAME" \
            --build-arg VERSION="$VERSION" \
            -t "ghcr.io/gigmcp/${NAME}-mcp:${VERSION}" \
            --metadata-file /tmp/build-meta.json \
            .
      - name: Report digest to pin
        run: |
          # The OCI image-index digest — pin this in manifests/$NAME/<version>.yaml.
          # The gateway resolves it to the matching per-arch image manifest at pull time.
          DIGEST=$(jq -r '."containerimage.digest"' /tmp/build-meta.json)
          echo "Pin this multi-arch image-index digest in manifests/$NAME/<version>.yaml:"
          echo "$DIGEST"
